<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KGS Pay Slip Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--n9:#0a1628;--n8:#0f1f3d;--n7:#162a4a;--s4:#8b9dc3;--s3:#a8b8d8;--s2:#c8d4ea;--g5:#d4943a;--g4:#e8a84c;--grn:#38a169;--red:#c53030;--wa:#25D366;--vte:#4299e1;--khm:#9f7aea;--sf:rgba(255,255,255,0.04);--bd:rgba(255,255,255,0.08);--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans Lao','DM Sans',sans-serif;background:var(--n9);color:var(--s2);min-height:100vh;overflow:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 20% 0%,rgba(212,148,58,.06)0,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(42,74,127,.1)0,transparent 50%)}

.hdr{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(0,0,0,.35);border-bottom:1px solid var(--bd);backdrop-filter:blur(12px);flex-wrap:wrap;gap:8px}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--g5),var(--g4));display:flex;align-items:center;justify-content:center;font:800 18px 'DM Sans',sans-serif;color:#fff;box-shadow:0 4px 14px rgba(212,148,58,.3)}
.hdr h1{font:700 16px/1.2 'DM Sans',sans-serif;color:#f1f5f9;letter-spacing:-.02em}
.hdr small{font-size:11px;color:var(--s4)}
.ft-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font:700 11px 'DM Sans',sans-serif;letter-spacing:.05em;margin-left:6px;vertical-align:middle;display:none}
.ft-badge.vte{background:rgba(66,153,225,.2);color:#90cdf4;border:1px solid rgba(66,153,225,.35)}
.ft-badge.khm{background:rgba(159,122,234,.2);color:#d6bcfa;border:1px solid rgba(159,122,234,.35)}

.btn{padding:8px 16px;border-radius:10px;border:none;font:600 13px/1 inherit;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{transform:translateY(-1px)}.btn:disabled{opacity:.3;pointer-events:none;transform:none}
.bp{background:linear-gradient(135deg,#4299e1,#667eea);color:#fff}
.bg{background:linear-gradient(135deg,var(--g5),var(--g4));color:#fff}
.bw{background:var(--wa);color:#fff}
.bh{background:var(--sf);color:var(--s2);border:1px solid var(--bd)}
.bi{width:34px;height:34px;padding:0;justify-content:center;border-radius:8px}
.bs{padding:7px 12px;font-size:12px}

.app{display:flex;height:calc(100vh - 68px);position:relative;z-index:1}

/* LEFT */
.lp{width:350px;min-width:350px;display:flex;flex-direction:column;background:rgba(0,0,0,.2);border-right:1px solid var(--bd);transition:.25s}
.lp.off{width:0;min-width:0;overflow:hidden;border:none}
.tog{position:absolute;left:349px;top:12px;z-index:20;width:22px;height:42px;border-radius:0 6px 6px 0;border:none;background:rgba(66,153,225,.25);color:#93c5fd;cursor:pointer;font-size:11px;transition:left .25s;backdrop-filter:blur(6px)}
.lp.off~.tog{left:-1px}

.flt{padding:12px 14px;border-bottom:1px solid var(--bd)}
.flt input,.flt select{width:100%;padding:9px 13px;border-radius:10px;border:1px solid var(--bd);background:var(--sf);color:var(--s2);font:13px inherit;outline:none;transition:.15s}
.flt input:focus,.flt select:focus{border-color:rgba(66,153,225,.5)}.flt input{margin-bottom:7px}.flt select{cursor:pointer}
.flt option{background:var(--n8)}

.el{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
.ei{padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.025);border-left:3px solid transparent;transition:.1s}
.ei:hover{background:rgba(255,255,255,.03)}.ei.on{background:rgba(66,153,225,.12);border-left-color:#4299e1}
.ei .r{display:flex;justify-content:space-between;align-items:center}
.en{font-size:13px;font-weight:600;color:var(--s2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:195px}
.em{font-size:10.5px;color:var(--s4);margin-top:2px}
.ea{font:600 13px 'JetBrains Mono',monospace;color:#68d391;text-align:right}
.ea small{display:block;font:400 9px sans-serif;color:var(--s4)}

.pf{padding:10px 14px;border-top:1px solid var(--bd);background:rgba(0,0,0,.2);font-size:11px;color:var(--s4)}

/* RIGHT */
.rp{flex:1;overflow-y:auto;padding:18px 22px}

.es{text-align:center;padding:70px 20px}
.es .ic{font-size:60px;margin-bottom:14px}.es h2{font:700 22px inherit;color:#f1f5f9;margin-bottom:8px}.es p{color:var(--s4);font-size:14px;margin-bottom:24px}
.dz{border:2px dashed rgba(212,148,58,.35);border-radius:16px;padding:44px 20px;cursor:pointer;background:rgba(212,148,58,.03);max-width:400px;margin:0 auto;transition:.2s}
.dz:hover{border-color:var(--g4);background:rgba(212,148,58,.06)}

.sa{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.ng{display:flex;align-items:center;gap:5px}
.nc{font-size:13px;color:var(--s4);min-width:60px;text-align:center}
.ag{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.pi{padding:7px 11px;border-radius:8px;border:1px solid var(--bd);background:var(--sf);color:var(--s2);font:12px inherit;width:115px;outline:none}
.pi:focus{border-color:rgba(37,211,102,.5)}

/* SLIP CARD */
.sc{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 16px 50px rgba(0,0,0,.45);color:#1a202c;max-width:800px;margin:0 auto;animation:su .3s}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.sh{padding:20px 24px;color:#fff;text-align:center;position:relative;overflow:hidden}
.sh.vte-sh{background:linear-gradient(135deg,#122244,#1e3a5f 50%,#2a4a7f)}
.sh.khm-sh{background:linear-gradient(135deg,#2d1b69,#4c1d95 50%,#6d28d9)}
.sh::before{content:'';position:absolute;top:-50%;right:-20%;width:300px;height:300px;background:radial-gradient(circle,rgba(212,148,58,.1),transparent 70%)}
.sh h2{font:700 21px 'DM Sans',sans-serif;position:relative;letter-spacing:.01em}.sh .pr{font-size:14px;opacity:.8;margin-top:3px;position:relative}
.sh .br-tag{position:absolute;top:10px;right:14px;padding:3px 10px;border-radius:20px;font:700 10px 'DM Sans',sans-serif;letter-spacing:.06em}
.sh .br-tag.vte{background:rgba(66,153,225,.3);color:#bee3f8}
.sh .br-tag.khm{background:rgba(196,181,253,.25);color:#ddd6fe}

.si{padding:12px 22px;background:#f0f4f8;border-bottom:2px solid #dde3ed;display:flex;flex-wrap:wrap;gap:5px 26px}
.if label{font:500 9px/1 inherit;color:#8896ab;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:2px}
.if .v{font-weight:700;font-size:14px;color:#1a365d}.if .vn{font-size:15px}.if .ve{font-size:11px;color:#718096;font-weight:400}.if .vd{color:var(--red)}

.cols{display:flex;flex-wrap:wrap}
.col{flex:1;min-width:260px}.col.ec{border-right:1px solid #e2e8f0}
.ch{padding:7px 16px;font-weight:700;font-size:12px;border-bottom:1px solid;display:flex;justify-content:space-between}
.ch.eh{background:#ebf8ff;color:#2b6cb0;border-color:#bee3f8}.ch.dh{background:#fff5f5;color:var(--red);border-color:#fed7d7}

.sr{display:flex;justify-content:space-between;padding:4px 16px;font-size:11.5px;border-bottom:1px solid #f0f2f5}
.sr:nth-child(odd){background:#fafbfd}
.sr.in{padding-left:28px;font-size:10.5px}.sr.in .lb{color:#718096}.sr.in .lb::before{content:'• ';color:#b8c4d4}
.sr.bo .lb{font-weight:600;color:#2d3748}
.sr .lb{color:#4a5568}.sr .am{font:500 11.5px 'JetBrains Mono',monospace;color:#2d3748}.sr .am.z{color:#d0d5dc}.sr .am.rd{color:var(--red)}
.sr.dr:nth-child(odd){background:#fffbfb}

.ct{display:flex;justify-content:space-between;padding:8px 16px;font-weight:700;font-size:13px}
.ct.et{background:#ebf8ff;color:#2b6cb0;border-top:2px solid #bee3f8}.ct.dt{background:#fff5f5;color:var(--red);border-top:2px solid #fed7d7}
.ct .am{font-family:'JetBrains Mono',monospace}

.sn{margin:16px 20px 18px;padding:16px 20px;border-radius:12px;text-align:center;color:#fff}
.sn.vte-sn{background:linear-gradient(135deg,#276749,var(--grn));box-shadow:0 4px 18px rgba(56,161,105,.3)}
.sn.khm-sn{background:linear-gradient(135deg,#4c1d95,#7c3aed);box-shadow:0 4px 18px rgba(124,58,237,.3)}
.sn .nl{font-size:13px;opacity:.85;margin-bottom:3px}.sn .na{font:800 30px 'JetBrains Mono',monospace;letter-spacing:.02em}

.sf{padding:7px 20px 10px;border-top:1px solid #e8ecf1;text-align:center;font-size:10px;color:#a0aec0}

/* Modal */
.mo{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center}
.mo.show{display:flex}
.md{background:var(--n8);border-radius:14px;padding:24px;max-width:440px;width:90%;border:1px solid var(--bd);box-shadow:0 16px 50px rgba(0,0,0,.5)}
.md h3{font-size:17px;font-weight:700;color:#f1f5f9;margin-bottom:6px}.md p{font-size:13px;color:var(--s4);margin-bottom:14px}
.pb{height:5px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden;margin-bottom:10px}
.pb div{height:100%;background:var(--wa);border-radius:3px;transition:width .3s}
.ms{font-size:12px;color:var(--s4);margin-bottom:14px}
.ma{display:flex;gap:8px;justify-content:flex-end}

@media(max-width:768px){
  .lp{width:100%;min-width:100%;position:absolute;z-index:15;height:100%}.lp.off{width:0;min-width:0}
  .tog{left:calc(100% - 1px)}.lp.off~.tog{left:-1px}
  .rp{padding:10px 12px}.sh{padding:14px 16px}.sh h2{font-size:17px}
  .sr{padding:3px 12px;font-size:10.5px}.sn .na{font-size:24px}
  .hdr{padding:10px 14px}.hdr h1{font-size:14px}
}
@media print{
  body{background:#fff!important}.hdr,.lp,.tog,.sa{display:none!important}
  .rp{padding:0!important;overflow:visible!important}.app{height:auto!important}
  .sc{box-shadow:none!important;border:2px solid #1a365d!important;max-width:100%!important}
}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">K</div>
    <div>
      <h1>Khammany General Service <span class="ft-badge" id="ftb"></span></h1>
      <small id="hm">ລະບົບໃບເງິນເດືອນ</small>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="btn bg" onclick="$('fi').click()">📂 <span id="ubt">ອັບໂຫລດ Excel</span></button>
    <input type="file" id="fi" accept=".xlsx,.xls" style="display:none" onchange="onFile(this)">
  </div>
</div>

<div class="app">
  <div class="lp" id="lp">
    <div class="flt">
      <input type="text" id="sq" placeholder="🔍 ຄົ້ນຫາ ຊື່ / ລະຫັດ..." oninput="rl()">
      <select id="bs" onchange="rl()"><option value="ALL">ທຸກໜ່ວຍງານ</option></select>
    </div>
    <div class="el" id="el"></div>
    <div class="pf" id="pf">0 ຄົນ</div>
  </div>
  <button class="tog" id="tg" onclick="tp()">◀</button>
  <div class="rp" id="rp">
    <div class="es" id="es">
      <div class="ic">📊</div>
      <h2>ອັບໂຫລດໄຟລ໌ Salary Tracking</h2>
      <p>ຮອງຮັບທັງ VTE ແລະ KHM — ລະບົບຈະກວດສອບໂຕເອງ</p>
      <div class="dz" onclick="$('fi').click()" id="dz">
        <div style="font-size:40px;margin-bottom:8px">📂</div>
        <div style="font-size:15px;font-weight:600;color:var(--g4)">ກົດເພື່ອເລືອກໄຟລ໌</div>
        <div style="font-size:12px;color:var(--s4);margin-top:3px">Salary_*.xlsx / KHM_Salary_*.xlsx</div>
      </div>
    </div>
    <div id="sp" style="display:none;text-align:center;padding:70px 20px;color:var(--s4)">
      <div style="font-size:44px;margin-bottom:12px">👈</div><div style="font-size:14px">ເລືອກພະນັກງານ</div>
    </div>
    <div id="sv" style="display:none">
      <div class="sa">
        <div class="ng">
          <button class="btn bh bi" id="pb" onclick="nav(-1)">◀</button>
          <span class="nc" id="nc">1/1</span>
          <button class="btn bh bi" id="nb" onclick="nav(1)">▶</button>
        </div>
        <div class="ag">
          <button class="btn bw bs" onclick="wa()" id="wab">📸 WhatsApp</button>
          <button class="btn bh bs" onclick="di()">📥 ດາວໂຫລດ</button>
          <button class="btn bh bs" onclick="window.print()">🖨️</button>
          <button class="btn bp bs" onclick="sm()">📦 ດາວໂຫລດທັງໝົດ</button>
        </div>
      </div>
      <div id="sk"></div>
    </div>
  </div>
</div>

<div class="mo" id="bm">
  <div class="md">
    <h3>📦 ດາວໂຫລດຮູບ Slip ທັງໝົດ</h3>
    <p id="bd"></p>
    <div class="pb"><div id="bp" style="width:0%"></div></div>
    <div class="ms" id="bst">ພ້ອມສົ່ງ</div>
    <div class="ma">
      <button class="btn bh bs" onclick="cm()">ປິດ</button>
      <button class="btn bw bs" id="bb" onclick="sb()">ເລີ່ມສົ່ງ</button>
    </div>
  </div>
</div>

<canvas id="cv" style="display:none"></canvas>

<script>
const $=id=>document.getElementById(id);

/* ─── VTE Column Definitions ─── */
const EVTE=[
  {c:6, l:"ເງິນເດືອນ",b:1},
  {c:14,l:"ລວມເງິນຮັບຜິດຊອບ",b:1},
  {c:7, l:"ເງິນໜ້າທີ່ຮັບຜິດຊອບ",i:1},{c:8,l:"ເງິນວິຊາສະເພາະ",i:1},
  {c:9, l:"ເງິນນ້ຳມັນລົດ",i:1},{c:10,l:"ເງິນໂທລະສັບ",i:1},
  {c:11,l:"ເງິນປ່ຽນກະເຮັດວຽກ",i:1},{c:12,l:"ເງິນເຮັດວຽກວັນເສົາໝົດມື້",i:1},
  {c:13,l:"ເຮັດວຽກທົດແທນ",i:1},
  {c:17,l:"ລວມເງິນອຸດໜູນທາດເບື່ອ",b:1},
  {c:15,l:"ເງິນປ້ອງກັນສານເຄມີ",i:1},{c:16,l:"ເງິນກັນເປື້ອນ",i:1},
  {c:18,l:"ເງິນອັດຕາກີນ"},{c:19,l:"ເງິນໂອທີ"},
  {c:20,l:"ລາຍຮັບກ່ອນວັນລາງານ"},{c:21,l:"ຄືນເງິນຍ້ອນຫລັງ"},{c:22,l:"ຄືນເງິນສະສົມ"}
];
const DVTE=[
  {c:24,l:"ມາຊ້າ"},{c:25,l:"ກັບກ່ອນ"},{c:26,l:"ລາງານ"},
  {c:27,l:"ຂາດວຽກ/ຕັດເງິນຮັບຜິດຊອບ"},{c:28,l:"ຕັດເງິນລາພັກວຽກ"},{c:29,l:"ຫັກເງິນຜິດລະບຽບ"},
  {c:30,l:"ຄ່ານ້ຳ"},{c:31,l:"ຄ່າເຊົ່າຫ້ອງພັກ"},{c:32,l:"ຄ່າໄຟຟ້າ"},
  {c:33,l:"ສົ່ງເງິນຄືນບໍລິສັດ"},{c:34,l:"ຄ່າປະກັນສັງຄົມ"},{c:35,l:"ພາສີ"},
  {c:38,l:"ຫັກຄ່າເຄື່ອງພະນັກງານ"},{c:39,l:"ຍືມເງິນຊຳລະເປັນງວດ"},
  {c:40,l:"ເບີກເງິນກາງເດືອນ"},{c:41,l:"ກອງທຶນພະນັກງານ"}
];

/* ─── KHM Column Definitions ─── */
const EKHM=[
  {c:7, l:"ເງິນເດືອນ",b:1},
  {c:14,l:"Allowances ລວມ",b:1},
  {c:8, l:"ເງິນກັນເປື້ອນ",i:1},{c:9,l:"ເງິນນ້ຳມັນລົດ",i:1},
  {c:10,l:"ເງິນຄ່າອາຫານ",i:1},{c:11,l:"ເງິນໂທລະສັບ",i:1},
  {c:12,l:"ເງິນປ້ອງກັນສານເຄມີ",i:1},{c:13,l:"ເງິນຮັບຜິດຊອບ",i:1},
  {c:18,l:"Bonus / OT ລວມ",b:1},
  {c:15,l:"ເງິນຂະຫຍັນ",i:1},{c:16,l:"ເງິນເຮັດວຽກຢູ່ນາກາຍແດັມ",i:1},{c:17,l:"ເງິນໂອທີ",i:1},
  {c:21,l:"Additional ລວມ",b:1},
  {c:19,l:"ຄືນເງິນຍ້ອນຫລັງ",i:1},{c:20,l:"ຄືນເງິນສະສົມ",i:1}
];
const DKHM=[
  {c:23,l:"ຂາດງານ"},{c:24,l:"ຕັດເງິນຮັບຜິດຊອບ/Allowances"},
  {c:25,l:"ຕັດເງິນຂະຫຍັນ"},{c:26,l:"ຫັກຜິດລະບຽບ"},
  {c:27,l:"ຄ່ານ້ຳ"},{c:28,l:"ຄ່າເຊົ່າຫ້ອງພັກ"},{c:29,l:"ຄ່າໄຟຟ້າ"},
  {c:30,l:"ຄ່າປະກັນສັງຄົມ"},{c:31,l:"ພາສີ"},
  {c:34,l:"ຕັດຄ່າເຄື່ອງພະນັກງານ"},{c:35,l:"ສົ່ງເງິນຄືນບໍລິສັດ"},
  {c:36,l:"ຍືມເງິນຊຳລະເປັນງວດ"},{c:37,l:"ກອງທຶນສະສົມ"},{c:38,l:"ເບີກເງິນລວງໜ້າ"}
];

const ME=["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const ML=["","ມັງກອນ","ກຸມພາ","ມີນາ","ເມສາ","ພຶດສະພາ","ມິຖຸນາ","ກໍລະກົດ","ສິງຫາ","ກັນຍາ","ຕຸລາ","ພະຈິກ","ທັນວາ"];

let all=[],fl=[],si=-1,pM="",pY="",ph={},br=false,bt=null,fileType="VTE";
try{ph=JSON.parse(localStorage.getItem('kgs_ph')||'{}')}catch(e){}

function fm(v){const n=Math.round(Number(v)||0);return n===0?"-":n.toLocaleString("en-US")}
function fn(v){return Math.round(Number(v)||0)}
function curE(){return fileType==='VTE'?EVTE:EKHM}
function curD(){return fileType==='VTE'?DVTE:DKHM}

function parse(buf){
  const wb=XLSX.read(buf,{type:"array"}),ws=wb.Sheets[wb.SheetNames[0]],rg=XLSX.utils.decode_range(ws["!ref"]);
  const gc=(r,c)=>{const a=XLSX.utils.encode_cell({r:r-1,c:c-1}),cl=ws[a];return cl?cl.v:null};

  /* ── Auto-detect file type ── */
  const r2c2=String(gc(2,2)||"");
  fileType=r2c2.includes("ຊື່ ແລະ")?"KHM":"VTE";

  /* ── Month / Year from title row ── */
  const t=String(gc(1,1)||"");
  pM="";pY="";
  const pm=t.match(/(\d{1,2})\s*[\/\-]\s*(\d{4})/);
  if(pm){pM=pm[1];pY=pm[2]}
  if(!pM){for(let i=1;i<=12;i++){if(t.includes(ML[i])){pM=String(i);break}}}
  if(!pY){const ym=t.match(/(\d{4})/);if(ym)pY=ym[1]}

  const salC=fileType==="VTE"?6:7;   // salary column to detect data/branch rows
  const teC =fileType==="VTE"?23:22; // total earnings column
  const nsC =fileType==="VTE"?42:39; // net salary column

  const es=[];let branch=fileType==="KHM"?"KHM":"Head Office";
  for(let r=4;r<=rg.e.r+1;r++){
    const c1=gc(r,1),cS=gc(r,salC);
    if(!c1)continue;
    if(!cS){branch=String(c1).trim();continue}

    let nl,ne;
    if(fileType==="VTE"){ne=String(gc(r,2)||"").trim();nl=String(gc(r,3)||"").trim()}
    else               {nl=String(gc(r,2)||"").trim();ne=String(gc(r,3)||"").trim()}

    const E_=curE(),D_=curD();
    const e={id:String(c1).trim(),ne,nl,br:branch,
      wd:fn(gc(r,4)),ab:fn(gc(r,5)),er:{},de:{},
      te:fn(gc(r,teC)),td:0,ns:fn(gc(r,nsC))};

    E_.forEach(({c})=>{e.er[c]=fn(gc(r,c))});
    let td=0;D_.forEach(({c})=>{const v=fn(gc(r,c));e.de[c]=v;td+=v});
    e.td=td;es.push(e);
  }
  return es;
}

function onFile(inp){
  const f=inp.files&&inp.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=e=>{try{all=parse(e.target.result);if(!all.length){alert("ບໍ່ພົບຂໍ້ມູນ");return}init()}catch(er){alert("Error: "+er.message)}};
  rd.readAsArrayBuffer(f);
}

document.addEventListener('DOMContentLoaded',()=>{
  const dz=$('dz');if(!dz)return;
  dz.ondragover=e=>{e.preventDefault();dz.style.borderColor='var(--g4)'};
  dz.ondragleave=()=>{dz.style.borderColor=''};
  dz.ondrop=e=>{e.preventDefault();dz.style.borderColor='';if(e.dataTransfer.files[0]){$('fi').files=e.dataTransfer.files;onFile($('fi'))}};
});

function init(){
  const m=Number(pM);
  const ftb=$('ftb');
  ftb.textContent=fileType;
  ftb.className='ft-badge '+(fileType==='VTE'?'vte':'khm');
  ftb.style.display='inline-flex';
  $('hm').textContent=`ລະບົບໃບເງິນເດືອນ • ${ML[m]||pM} ${pY} • ${all.length} ຄົນ`;
  $('ubt').textContent='ປ່ຽນໄຟລ໌';
  $('es').style.display='none';$('sp').style.display='block';$('sv').style.display='none';
  const brs=[...new Set(all.map(e=>e.br))];
  const sel=$('bs');sel.innerHTML=`<option value="ALL">ທຸກໜ່ວຍງານ (${all.length})</option>`;
  brs.forEach(b=>{const n=all.filter(e=>e.br===b).length;sel.innerHTML+=`<option value="${b}">${b} (${n})</option>`});
  $('sq').value='';si=-1;rl();
}

function rl(){
  const q=$('sq').value.toLowerCase().trim(),bv=$('bs').value;
  fl=all.filter(e=>{
    if(bv!=="ALL"&&e.br!==bv)return false;
    if(q&&!(e.nl.toLowerCase().includes(q)||e.ne.toLowerCase().includes(q)||e.id.toLowerCase().includes(q)))return false;
    return true;
  });
  const c=$('el');
  c.innerHTML=fl.map((e,i)=>`<div class="ei${i===si?' on':''}" onclick="se(${i})"><div class="r"><div style="flex:1;min-width:0"><div class="en">${e.nl||e.ne}</div><div class="em">${e.id} • ${e.br}</div></div><div class="ea">${fm(e.ns)}<small>₭</small></div></div></div>`).join('');
  $('pf').textContent=`${fl.length} / ${all.length} ຄົນ`;
  if(fl.length===0)c.innerHTML='<div style="padding:20px;text-align:center;color:var(--s4);font-size:13px">ບໍ່ພົບ</div>';
}

function se(i){si=i;rl();rs();if(window.innerWidth<=768)tp()}
function nav(d){const n=si+d;if(n>=0&&n<fl.length)se(n)}

function rs(){
  if(si<0||si>=fl.length)return;
  const e=fl[si],m=Number(pM);
  const isKHM=fileType==="KHM";
  const E_=curE(),D_=curD();

  $('sp').style.display='none';$('sv').style.display='block';
  $('nc').textContent=`${si+1}/${fl.length}`;
  $('pb').disabled=si===0;$('nb').disabled=si>=fl.length-1;
  $('pi').value=ph[e.id]||'';

  const shCls=isKHM?"khm-sh":"vte-sh";
  const tagCls=isKHM?"khm":"vte";
  const snCls=isKHM?"khm-sn":"vte-sn";

  let h=`<div class="sc">`;
  h+=`<div class="sh ${shCls}"><span class="br-tag ${tagCls}">${fileType}</span>`;
  h+=`<h2>Khammany General Service</h2><div class="pr">Pay Slip for the Month of ${ME[m]}, ${pY}</div></div>`;
  h+=`<div class="si"><div class="if"><label>Emp ID</label><div class="v">${e.id}</div></div>`;
  h+=`<div class="if" style="flex:1;min-width:130px"><label>Emp Name</label><div class="v vn">${e.nl}</div><div class="ve">${e.ne}</div></div>`;
  h+=`<div class="if"><label>ໜ່ວຍງານ</label><div class="v">${e.br}</div></div>`;
  h+=`<div class="if"><label>ມື້ເຮັດ</label><div class="v">${e.wd}</div></div>`;
  h+=`<div class="if"><label>ຂາດ</label><div class="v${e.ab>0?' vd':''}">${e.ab}</div></div></div>`;

  h+=`<div class="cols"><div class="col ec"><div class="ch eh"><span>Earnings</span><span>Amount</span></div>`;
  E_.forEach(({c,l,b,i})=>{
    const v=e.er[c],cls=`sr${i?' in':''}${b?' bo':''}`;
    h+=`<div class="${cls}"><span class="lb">${l}</span><span class="am${v===0?' z':''}">${fm(v)}</span></div>`;
  });
  h+=`<div class="ct et"><span>Total Earnings</span><span class="am">${fm(e.te)}</span></div></div>`;

  h+=`<div class="col"><div class="ch dh"><span>Deductions</span><span>Amount</span></div>`;
  D_.forEach(({c,l})=>{
    const v=e.de[c];
    h+=`<div class="sr dr"><span class="lb">${l}</span><span class="am${v>0?' rd':' z'}">${fm(v)}</span></div>`;
  });
  h+=`<div class="ct dt"><span>Total Deductions</span><span class="am">${fm(e.td)}</span></div></div></div>`;

  h+=`<div class="sn ${snCls}"><div class="nl">Net Salary / ເງິນສຸດທິ</div><div class="na">${fm(e.ns)} ₭</div></div>`;
  h+=`<div class="sf">ເອກະສານນີ້ສ້າງໂດຍລະບົບຄອມພິວເຕີ — This is a computer-generated document</div></div>`;
  $('sk').innerHTML=h;
}

/* ─── Canvas Drawing ─── */
function drawOnCanvas(e, cv){
  const W=820,H=1080;
  cv.width=W*2;cv.height=H*2;
  const x=cv.getContext("2d");x.scale(2,2);
  const m=Number(pM),F="'Noto Sans Lao',sans-serif";
  const isKHM=fileType==="KHM";
  const E_=curE(),D_=curD();

  x.fillStyle="#fff";x.fillRect(0,0,W,H);
  x.strokeStyle="#1a365d";x.lineWidth=2;x.strokeRect(8,8,W-16,H-16);

  const hg=x.createLinearGradient(0,10,0,80);
  if(isKHM){hg.addColorStop(0,"#2d1b69");hg.addColorStop(1,"#6d28d9")}
  else{hg.addColorStop(0,"#122244");hg.addColorStop(1,"#2a4a7f")}
  x.fillStyle=hg;x.fillRect(10,10,W-20,68);

  x.fillStyle=isKHM?"rgba(196,181,253,.3)":"rgba(66,153,225,.3)";
  x.beginPath();x.roundRect(W-64,16,48,18,9);x.fill();
  x.fillStyle=isKHM?"#ddd6fe":"#bee3f8";x.textAlign="center";
  x.font=`bold 9px 'DM Sans',sans-serif`;x.fillText(fileType,W-40,29);

  x.fillStyle="#fff";x.textAlign="center";
  x.font=`bold 20px 'DM Sans',${F}`;x.fillText("Khammany General Service",W/2,38);
  x.font=`14px ${F}`;x.fillText(`Pay Slip for the Month of ${ME[m]}, ${pY}`,W/2,60);

  let y=92;
  x.fillStyle="#f0f4f8";x.fillRect(10,y,W-20,52);x.strokeStyle="#dde3ed";x.lineWidth=.5;x.strokeRect(10,y,W-20,52);
  x.textAlign="left";x.fillStyle="#1a365d";x.font=`bold 12px sans-serif`;x.fillText(`Emp ID: ${e.id}`,22,y+17);
  x.font=`bold 15px ${F}`;x.fillText(e.nl,22,y+37);
  x.textAlign="right";x.fillStyle="#4a5568";x.font=`11px ${F}`;x.fillText(e.br,W-22,y+17);
  x.fillText(`ມື້ເຮັດ: ${e.wd}  ຂາດ: ${e.ab}`,W-22,y+37);

  y=158;const lW=(W-24)/2-1,rX=12+lW+2,rH=19;
  x.fillStyle="#ebf8ff";x.fillRect(12,y,lW,22);x.fillStyle="#2b6cb0";x.textAlign="center";x.font=`bold 11px ${F}`;x.fillText("ລາຍຮັບ / Earnings",12+lW/2,y+15);
  x.fillStyle="#fff5f5";x.fillRect(rX,y,lW,22);x.fillStyle="#c53030";x.fillText("ລາຍຫັກ / Deductions",rX+lW/2,y+15);y+=24;

  let ey=y;
  E_.forEach(({c:col,l,b,i:ind},idx)=>{
    x.fillStyle=idx%2===0?"#fafbfd":"#fff";x.fillRect(12,ey,lW,rH);x.strokeStyle="#edf0f3";x.lineWidth=.3;x.strokeRect(12,ey,lW,rH);
    x.fillStyle=ind?"#718096":"#2d3748";x.textAlign="left";x.font=`${b?"bold ":""}${ind?9.5:10.5}px ${F}`;
    x.fillText(`${ind?" • ":""}${l}`,16,ey+13);
    x.textAlign="right";x.font=`${b?"bold ":""}10.5px 'JetBrains Mono',monospace`;x.fillStyle=e.er[col]>0?"#2d3748":"#d0d5dc";
    x.fillText(fm(e.er[col]),12+lW-6,ey+13);ey+=rH;
  });
  x.fillStyle="#ebf8ff";x.fillRect(12,ey,lW,22);x.fillStyle="#2b6cb0";x.textAlign="left";x.font=`bold 11px ${F}`;
  x.fillText("Total Earnings",16,ey+15);x.textAlign="right";x.font="bold 11px 'JetBrains Mono',monospace";
  x.fillText(fm(e.te)+" ₭",12+lW-6,ey+15);const ee=ey+22;

  let dy=y;
  D_.forEach(({c:col,l},idx)=>{
    x.fillStyle=idx%2===0?"#fffbfb":"#fff";x.fillRect(rX,dy,lW,rH);x.strokeStyle="#edf0f3";x.lineWidth=.3;x.strokeRect(rX,dy,lW,rH);
    x.fillStyle="#2d3748";x.textAlign="left";x.font=`10.5px ${F}`;x.fillText(l,rX+4,dy+13);
    x.textAlign="right";x.font="10.5px 'JetBrains Mono',monospace";x.fillStyle=e.de[col]>0?"#c53030":"#d0d5dc";
    x.fillText(fm(e.de[col]),rX+lW-6,dy+13);dy+=rH;
  });
  while(dy<ee){x.fillStyle="#fff";x.fillRect(rX,dy,lW,rH);x.strokeStyle="#edf0f3";x.strokeRect(rX,dy,lW,rH);dy+=rH}
  x.fillStyle="#fff5f5";x.fillRect(rX,ee-22,lW,22);x.fillStyle="#c53030";x.textAlign="left";x.font=`bold 11px ${F}`;
  x.fillText("Total Deductions",rX+4,ee-7);x.textAlign="right";x.font="bold 11px 'JetBrains Mono',monospace";
  x.fillText(fm(e.td)+" ₭",rX+lW-6,ee-7);

  const ny=ee+18;
  const ng=x.createLinearGradient(12,ny,W-12,ny);
  if(isKHM){ng.addColorStop(0,"#4c1d95");ng.addColorStop(1,"#7c3aed")}
  else{ng.addColorStop(0,"#276749");ng.addColorStop(1,"#38a169")}
  x.fillStyle=ng;x.beginPath();x.roundRect(12,ny,W-24,48,8);x.fill();
  x.fillStyle="#fff";x.textAlign="center";x.font=`13px ${F}`;x.fillText("Net Salary / ເງິນສຸດທິ",W/2,ny+18);
  x.font="bold 22px 'JetBrains Mono',monospace";x.fillText(`${fm(e.ns)} ₭`,W/2,ny+42);
  x.fillStyle="#a0aec0";x.font="9px sans-serif";x.fillText("Computer-generated document",W/2,ny+66);
}

/* Returns a Blob of the slip image for employee e */
function makeBlob(e){
  return new Promise(resolve=>{
    const cv=$('cv');
    drawOnCanvas(e,cv);
    cv.toBlob(blob=>resolve(blob),'image/png');
  });
}

/* ─── WhatsApp: share image via Web Share API ─── */
async function wa(){
  if(si<0)return;
  const e=fl[si];
  const btn=$('wab');
  const orig=btn.textContent;
  btn.disabled=true;btn.textContent='⏳';
  try{
    const blob=await makeBlob(e);
    const fname=`PaySlip_${fileType}_${e.id}_${pM}-${pY}.png`;
    const file=new File([blob],fname,{type:'image/png'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:`ໃບເງິນເດືອນ ${e.nl||e.ne}`});
    } else {
      /* Desktop fallback: download image */
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=fname;a.click();
      setTimeout(()=>URL.revokeObjectURL(url),2000);
    }
  }catch(err){if(err.name!=='AbortError')console.error(err)}
  finally{btn.disabled=false;btn.textContent=orig}
}

/* ─── Download single image ─── */
async function di(){
  if(si<0)return;
  const e=fl[si];
  const blob=await makeBlob(e);
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download=`PaySlip_${fileType}_${e.id}_${pM}-${pY}.png`;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),2000);
}

/* ─── Bulk: download all images sequentially ─── */
function sm(){
  $('bm').classList.add('show');
  $('bd').textContent=`ດາວໂຫລດຮູບ Slip ${fl.length} ຄົນ (ໃຊ້ເວລາໜ້ອຍໜຶ່ງ)`;
  $('bp').style.width='0%';$('bst').textContent='ພ້ອມ';$('bb').disabled=false;$('bb').textContent='ເລີ່ມ';
}
function cm(){$('bm').classList.remove('show');br=false;if(bt)clearTimeout(bt)}

function sb(){
  if(br)return;br=true;let idx=0;const tot=fl.length;$('bb').disabled=true;
  async function nx(){
    if(idx>=tot||!br){
      br=false;$('bst').textContent=`✅ ດາວໂຫລດຄົບ ${idx} ຮູບ`;$('bb').textContent='ສຳເລັດ';return;
    }
    const e=fl[idx];
    $('bp').style.width=`${((idx+1)/tot)*100}%`;
    $('bst').textContent=`⏳ ${idx+1}/${tot} — ${e.nl||e.ne}`;
    const blob=await makeBlob(e);
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    a.download=`PaySlip_${fileType}_${e.id}_${pM}-${pY}.png`;a.click();
    setTimeout(()=>URL.revokeObjectURL(url),3000);
    idx++;bt=setTimeout(nx,800);
  }
  nx();
}

function tp(){const p=$('lp'),t=$('tg');p.classList.toggle('off');t.textContent=p.classList.contains('off')?'▶':'◀'}
</script>
