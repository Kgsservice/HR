}

function pwSelectAll(checked){
  const allEmps = DATA.users.filter(u=>u.role==='employee'&&u.active);
  _pw.selectedEmpIds = checked ? allEmps.map(u=>u.id) : [];
  el('content').innerHTML = pgSalary();
}

function pw1Filter(){
  const q = (el('pw1Search')?.value||'').toLowerCase();
  const dept = el('pw1Dept')?.value||'';
  document.querySelectorAll('#pw1Table tr').forEach(row=>{
    const txt = row.textContent.toLowerCase();
    const deptMatch = !dept || txt.includes(dept.toLowerCase());
    row.style.display = (txt.includes(q)&&deptMatch)?'':'none';
  });
}

function pw1Next(){
  if(!_pw.selectedEmpIds.length){ toast('ເລືອກພະນັກງານກ່ອນ','warning'); return; }
  pwGo(2);
}

function pwSetVar(empId, itemId, val){
  if(!_pw.varItems[empId]) _pw.varItems[empId]={};
  _pw.varItems[empId][itemId] = parseFloat(val)||0;
}

function pw2AutoFill(){
  const mo = _pw.month;
  const emps = _pw.selectedEmpIds.map(id=>DATA.users.find(u=>u.id===id)).filter(Boolean);
  emps.forEach(u=>{
    if(!_pw.varItems[u.id]) _pw.varItems[u.id]={};
    const base = u.fixedEarnings?.e_base||0;
    // OT Fixed
    const otPay = calcOTFixed(u.id, mo, base, u.siteId);
    if(otPay>0) _pw.varItems[u.id]['e_site_ot']=otPay;
    // Late/Absent from attendance
    const att = DATA.attendance.filter(a=>a.empId===u.id&&a.date.startsWith(mo));
    const late = att.filter(a=>a.status==='late').length;
    const abs  = att.filter(a=>a.status==='absent').length;
    const dailyRate = base/26;
    if(late)  _pw.varItems[u.id]['d_late']  = late*10000;
    if(abs)   _pw.varItems[u.id]['d_absent']= Math.round(abs*dailyRate);
  });
  toast('⚡ ດຶງ OT Fixed + ໝາຍຊ້າ/ຂາດ Auto ສຳເລັດ');
  el('content').innerHTML=pgSalary();
}

function pw2ClearAll(){
  if(!confirm('ລ້າງ Variable Items ທັງໝົດ?')) return;
  _pw.varItems={};
  el('content').innerHTML=pgSalary();
}

function pw2Refresh(){
  // Re-render Step 2 with latest config (keeps varItems data)
  el('content').innerHTML=pgSalary();
  toast('🔄 Refresh ຖັນຈາກ Config ຫຼ້າສຸດ');
}

function pw2Next(){
  pwGo(3);
}

function pw3Save(){
  const mo = _pw.month;
  const cfg = getPayrollConfig();
  const emps = _pw.selectedEmpIds.map(id=>DATA.users.find(u=>u.id===id)).filter(Boolean);
  let added=0, updated=0;

  emps.forEach(u=>{
    const vals={};
    cfg.earnings.filter(i=>i.active!==false).forEach(i=>{
      vals[i.id] = i.fixed ? (u.fixedEarnings?.[i.id]||0) : (_pw.varItems[u.id]?.[i.id]||0);
    });
    cfg.deductions.filter(i=>i.active!==false&&!i.auto).forEach(i=>{
      vals[i.id] = i.fixed ? (u.fixedDeductions?.[i.id]||0) : (_pw.varItems[u.id]?.[i.id]||0);
    });
    // Auto attendance deductions
    ['d_late','d_absent','d_early'].forEach(k=>{ vals[k]=_pw.varItems[u.id]?.[k]||0; });

    const result = calcPayroll(u.id, mo, vals, u.ssoBase||1600000);
    const rec = buildSalaryRecord(result, vals);
    const idx = DATA.salary.findIndex(s=>s.empId===u.id&&s.month===mo);
    if(idx>=0){ DATA.salary[idx]={...rec,id:DATA.salary[idx].id}; updated++; }
    else { DATA.salary.push(rec); added++; }
  });

  lsSave('salary');
  FB.saveArray('salary',DATA.salary);
  addAudit('Payroll Wizard','salary',`Save ${mo}: ${added} new, ${updated} updated`);
  toast(`✅ ບັນທຶກ ${added+updated} ຄົນ ສຳເລັດ`);
  // Reset wizard
  pwReset(mo);
  el('content').innerHTML=pgSalary();
}

                  <span style="font-size:.78rem;font-weight:600;color:#2e7d32">${fmtMoney(v)}</span>
                </div>`;
              }).join('')}
              <div style="display:flex;justify-content:space-between;padding:6px 0;margin-top:4px;border-top:2px solid #2e7d32">
                <span style="font-size:.8rem;font-weight:700">ລວມ</span>
                <span style="font-size:.88rem;font-weight:800;color:#2e7d32">${fmtMoney(r.totalEarnings||r.baseSalary||0)}</span>
              </div>
            </div>

            <!-- Deductions -->
            <div>
              <div style="font-size:.74rem;font-weight:700;color:#c62828;margin-bottom:6px;display:flex;align-items:center;gap:4px">
                <span style="background:#ffebee;border-radius:4px;padding:2px 6px">📉 ລາຍຫັກ</span>
              </div>
              <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f5f5f5">
                <span style="font-size:.78rem;color:var(--t2)">ປະກັນສັງຄົມ (5.5%)</span>
                <span style="font-size:.78rem;font-weight:600;color:#7b1fa2">-${fmtMoney(r.ssoEmployee||0)}</span>
              </div>
              <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f5f5f5">
                <span style="font-size:.78rem;color:var(--t2)">ພາສີລາຍໄດ້</span>
                <span style="font-size:.78rem;font-weight:600;color:#c62828">-${fmtMoney(r.tax||0)}</span>
              </div>
              ${cfg.deductions.map(i=>{
                const v = r.deductions?.[i.id]||0;
                if(!v) return '';
                return `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f5f5f5">
                  <span style="font-size:.78rem;color:var(--t2)">${i.name}</span>
                  <span style="font-size:.78rem;font-weight:600;color:#c62828">-${fmtMoney(v)}</span>
                </div>`;
              }).join('')}
              <div style="display:flex;justify-content:space-between;padding:6px 0;margin-top:4px;border-top:2px solid #c62828">
                <span style="font-size:.8rem;font-weight:700">ລວມຫັກ</span>
                <span style="font-size:.88rem;font-weight:800;color:#c62828">-${fmtMoney(r.totalDeductions||r.deduction||0)}</span>
              </div>
            </div>
          </div>

          <!-- Attendance summary for this month -->
          ${(()=>{
            const att = DATA.attendance.filter(a=>a.empId===u.id&&a.date.startsWith(r.month));
            const worked = att.filter(a=>a.checkIn).length;
            const late   = att.filter(a=>a.status==='late').length;
            const absent = att.filter(a=>a.status==='absent').length;
            const hours  = att.reduce((s,a)=>s+parseFloat(a.hours||0),0).toFixed(1);
            return `<div style="background:#f8f9fa;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-around;text-align:center">
              <div><div style="font-size:1.1rem;font-weight:700;color:#2e7d32">${worked}</div><div style="font-size:.68rem;color:var(--t3)">ວັນມາ</div></div>
              <div><div style="font-size:1.1rem;font-weight:700;color:#1565c0">${hours}</div><div style="font-size:.68rem;color:var(--t3)">ຊ.ມ. ທຳງານ</div></div>
              <div><div style="font-size:1.1rem;font-weight:700;color:#e65100">${late}</div><div style="font-size:.68rem;color:var(--t3)">ຊ້າ</div></div>
              <div><div style="font-size:1.1rem;font-weight:700;color:#c62828">${absent}</div><div style="font-size:.68rem;color:var(--t3)">ຂາດ</div></div>
            </div>`;
          })()}

          <!-- Net salary -->
          <div style="background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#fff;border-radius:12px;padding:14px;text-align:center;margin-bottom:12px">
            <div style="font-size:.72rem;opacity:.7;letter-spacing:1px">NET SALARY</div>
            <div style="font-size:2rem;font-weight:900;margin:4px 0">${fmtMoney(r.total)} ₭</div>
            <div style="font-size:.74rem;opacity:.8">
              ລາຍຮັບ ${fmtMoney(r.totalEarnings||0)} − ຫັກ ${fmtMoney(r.totalDeductions||r.deduction||0)}
            </div>
          </div>

          <!-- Status + tax note -->
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:10px">
            <span class="chip ${r.paid?'cg':'cy'}" style="font-size:.78rem">
              ${r.paid?'✅ ຈ່າຍແລ້ວ':'⏳ ລໍ CEO Approve'}
            </span>
            <div style="font-size:.72rem;color:var(--t3)">
              ເສຍພາສີ: ${fmtMoney(r.taxableEarnings||0)} · ຍົກເວັ້ນ: ${fmtMoney(r.nonTaxableEarnings||0)}
            </div>
          </div>

          <!-- Print button -->
          <button onclick="printMyPayslip('${r.id}')"
            style="width:100%;padding:12px;background:#1a237e;color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
            🖨️ ພິມ / ດາວໂຫຼດ Payslip
          </button>
        </div>
      </div>

      <!-- History list -->
      <div class="card" style="margin-top:14px">
        <div class="card-t" style="margin-bottom:8px">📋 ປະຫວັດ Payslip</div>
        ${mySalary.slice(0,12).map(s=>`
          <div onclick="window._myPsMo='${s.month}';el('content').innerHTML=pgMyPayslip()"
            style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;
            border-bottom:1px solid var(--bdr2);cursor:pointer;
            ${s.month===defaultMo?'background:#f1f8e9;margin:0 -4px;padding:9px 4px;border-radius:6px':''}">
            <div>
              <div style="font-size:.84rem;font-weight:${s.month===defaultMo?700:500}">${s.month}</div>
              <div style="font-size:.7rem;color:var(--t3)">${s.paid?'✅ ຈ່າຍແລ້ວ':'⏳ ລໍ'}</div>
            </div>
            <div style="text-align:right">
              <div style="font-weight:700;color:var(--green);font-size:.9rem">${fmtMoney(s.total)}</div>
              <div style="font-size:.7rem;color:var(--t3)">SSO ${fmtMoney(s.ssoEmployee||0)}</div>
            </div>
          </div>`).join('')}
      </div>
    `}
  </div>`;
}

function printMyPayslip(id){
  const r = DATA.salary.find(x=>x.id===id); if(!r) return;
  const emp = getUserById(r.empId)||{name:'?',empId:'?',dept:'?'};
  const cfg = getPayrollConfig();
  const earnRows = cfg.earnings.map(i=>{
    const v=r.earnings?.[i.id]||0; if(!v) return '';
    return `<tr><td>${i.name}</td><td style="text-align:right;color:#2e7d32;font-weight:600">${fmtMoney(v)} ₭</td></tr>`;
  }).join('');
  const dedRows = cfg.deductions.map(i=>{
    const v=r.deductions?.[i.id]||0; if(!v) return '';
    return `<tr><td>${i.name}</td><td style="text-align:right;color:#c62828">- ${fmtMoney(v)} ₭</td></tr>`;
  }).join('');
  const att = DATA.attendance.filter(a=>a.empId===emp.id&&a.date.startsWith(r.month));
  const worked = att.filter(a=>a.checkIn).length;
  const w = window.open('','_blank','width=420,height=700');
  if(!w) return;
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>Payslip ${emp.name} ${r.month}</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Noto Sans Lao','Segoe UI',Arial,sans-serif;padding:20px;font-size:13px;color:#222}
    .hdr{background:linear-gradient(135deg,#1a237e,#1565c0);color:#fff;padding:16px;text-align:center;border-radius:10px;margin-bottom:14px}
    .hdr h2{font-size:15px;margin-bottom:2px}
    .hdr p{font-size:11px;opacity:.8}
    .emp-row{display:flex;justify-content:space-between;padding:4px 0;font-size:11px;color:#666;margin-bottom:10px}
    .section-title{font-weight:700;font-size:11px;margin-bottom:4px;padding:4px 8px;border-radius:4px}
    .earn-title{background:#e8f5e9;color:#1b5e20}
    .ded-title{background:#ffebee;color:#c62828}
    table{width:100%;border-collapse:collapse;margin-bottom:8px}
    td{padding:4px 2px;border-bottom:1px solid #f0f0f0;font-size:12px}
    .total-row td{font-weight:700;border-top:2px solid #ccc;padding-top:6px}
    .net{background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#fff;border-radius:8px;padding:12px;text-align:center;margin:10px 0}
    .net .amount{font-size:22px;font-weight:900;margin-top:4px}
    .att-row{display:flex;justify-content:space-around;background:#f8f9fa;border-radius:8px;padding:8px;margin-bottom:10px;text-align:center}
    .att-row div{font-size:11px}
    .att-row b{display:block;font-size:15px}
    .status{text-align:center;padding:5px;font-size:11px;border-radius:5px;margin-top:6px;
      background:${r.paid?'#e8f5e9':'#fff8e1'};color:${r.paid?'#2e7d32':'#f57f17'}}
    .footer{font-size:10px;color:#999;text-align:center;margin-top:12px;border-top:1px solid #eee;padding-top:8px}
    @media print{body{padding:10px}}
  </style></head>
  <body onload="window.print()">
    <div class="hdr">
      <h2>${DATA.settings.companyName||'KGS'}</h2>
      <p>Pay Slip · ${r.month}</p>
    </div>
    <div class="emp-row">
      <span><b>${emp.name}</b></span>
      <span>${emp.empId} · ${emp.dept||'—'}</span>
      <span>ກະ: ${getShiftById(emp.shiftId)?.name||'—'}</span>
    </div>
    <div class="att-row">
      <div><b style="color:#2e7d32">${worked}</b>ວັນມາ</div>
      <div><b style="color:#1565c0">${att.reduce((s,a)=>s+parseFloat(a.hours||0),0).toFixed(1)}</b>ຊ.ມ.</div>
      <div><b style="color:#e65100">${att.filter(a=>a.status==='late').length}</b>ຊ້າ</div>
      <div><b style="color:#c62828">${att.filter(a=>a.status==='absent').length}</b>ຂາດ</div>
    </div>
    <div class="section-title earn-title">📈 ລາຍຮັບ</div>
    <table>${earnRows}
      <tr class="total-row"><td>ລວມລາຍຮັບ</td><td style="text-align:right;color:#2e7d32">${fmtMoney(r.totalEarnings||r.baseSalary||0)} ₭</td></tr>
    </table>
    <div class="section-title ded-title">📉 ລາຍຫັກ</div>
    <table>
      <tr><td>ປະກັນສັງຄົມ (5.5%)</td><td style="text-align:right;color:#7b1fa2">- ${fmtMoney(r.ssoEmployee||0)} ₭</td></tr>
      <tr><td>ພາສີລາຍໄດ້</td><td style="text-align:right;color:#c62828">- ${fmtMoney(r.tax||0)} ₭</td></tr>
      ${dedRows}
      <tr class="total-row"><td>ລວມຫັກ</td><td style="text-align:right;color:#c62828">- ${fmtMoney(r.totalDeductions||r.deduction||0)} ₭</td></tr>
    </table>
    <div class="net">
      <div>NET SALARY</div>
      <div class="amount">${fmtMoney(r.total)} ₭</div>
    </div>
    <div class="status">${r.paid?'✅ ຈ່າຍແລ້ວ':'⏳ ລໍ CEO Approve'}</div>
    <div class="footer">
      ເອກະສານນີ້ຜະລິດໂດຍ TimeTrack by KGS · ${new Date().toLocaleDateString('lo-LA')}
    </div>
  </body></html>`);
  w.document.close();
}

</script>
</body>
</html>
