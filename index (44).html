async function captureWatermarkedSelfie(lat, lng, siteName){
  const vid = el('camVid');
  if(!vid) return null;
  const canvas = document.createElement('canvas');
  canvas.width = vid.videoWidth || 640;
  canvas.height = vid.videoHeight || 480;
  const ctx = canvas.getContext('2d');
  // Draw video frame
  ctx.drawImage(vid, 0, 0, canvas.width, canvas.height);
  // Watermark bar at bottom
  const barH = Math.round(canvas.height * 0.13);
  ctx.fillStyle = 'rgba(0,0,0,0.62)';
  ctx.fillRect(0, canvas.height - barH, canvas.width, barH);
  // Text settings
  const fsize = Math.max(12, Math.round(canvas.height * 0.035));
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${fsize}px "Segoe UI", Arial, sans-serif`;
  const now = new Date();
  const dtStr = now.toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'numeric'}) +
                ' ' + now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const gpsStr = lat ? `GPS: ${lat.toFixed(5)}, ${lng.toFixed(5)}` : 'GPS: ບໍ່ໄດ້';
  const pad = Math.round(canvas.width * 0.025);
  const lineH = fsize + 6;
  const y1 = canvas.height - barH + lineH + 4;
  // Company / site name
  ctx.font = `bold ${fsize}px "Segoe UI", Arial, sans-serif`;
  ctx.fillText(`📍 ${siteName || DATA.settings.companyName}`, pad, y1);
  ctx.font = `${fsize - 2}px "Segoe UI", Arial, sans-serif`;
  ctx.fillText(dtStr, pad, y1 + lineH);
  ctx.fillText(gpsStr, pad, y1 + lineH * 2);
  // Emp name top-left badge
  const u = DATA.currentUser;
  if(u){
    ctx.fillStyle = 'rgba(26,35,126,0.75)';
    const badgeW = ctx.measureText(`👤 ${u.name}  ${u.empId}`).width + 24;
    ctx.fillRect(0, 0, badgeW, fsize + 16);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${fsize - 1}px "Segoe UI", Arial, sans-serif`;
    ctx.fillText(`👤 ${u.name}  ${u.empId}`, 10, fsize + 6);
  }
  return canvas.toDataURL('image/jpeg', 0.82);
}

function startQRScan(){
  const vid = el('qrVid'); if(!vid) return;
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false})
    .then(s=>{
      cameraStream = s;
      vid.srcObject = s;
      vid.style.display = 'block';
      el('qrPh').style.display = 'none';
      el('qrOverlay').style.display = 'block';
      el('qrStartBtn').disabled = true;
      el('qrStopBtn').disabled = false;
      qrScanning = true;
      scanQRFrame();
    }).catch(()=>toast('ບໍ່ສາມາດເຂົ້າກ້ອງ','error'));
}

function stopQRScan(){
  qrScanning = false;
  if(qrAnimFrame){ cancelAnimationFrame(qrAnimFrame); qrAnimFrame=null; }
  if(cameraStream){ cameraStream.getTracks().forEach(t=>t.stop()); cameraStream=null; }
  const vid=el('qrVid'); if(vid) vid.style.display='none';
  const ph=el('qrPh'); if(ph) ph.style.display='block';
  const ov=el('qrOverlay'); if(ov) ov.style.display='none';
  const sb=el('qrStartBtn'); if(sb) sb.disabled=false;
  const stb=el('qrStopBtn'); if(stb) stb.disabled=true;
}

function scanQRFrame(){
  if(!qrScanning) return;
  const vid=el('qrVid'), canvas=el('qrCanvas');
  if(!vid||!canvas||vid.readyState<2){ qrAnimFrame=requestAnimationFrame(scanQRFrame); return; }
  canvas.width=vid.videoWidth||640; canvas.height=vid.videoHeight||480;
  const ctx=canvas.getContext('2d');
  ctx.drawImage(vid,0,0,canvas.width,canvas.height);
  try{
    const imgData=ctx.getImageData(0,0,canvas.width,canvas.height);

    // ── Method 1: jsQR (best cross-platform support) ──
    if(window.jsQR){
      const result = jsQR(imgData.data, imgData.width, imgData.height, {inversionAttempts:'dontInvert'});
      if(result && result.data){
        handleQRResult(result.data);
        return;
      }
      qrAnimFrame=requestAnimationFrame(scanQRFrame);
      return;
    }

    // ── Method 2: BarcodeDetector API (Chrome Android) ──
    if(window.BarcodeDetector){
      window._qrDetector = window._qrDetector || new BarcodeDetector({formats:['qr_code']});
      window._qrDetector.detect(canvas).then(codes=>{
        if(codes.length) handleQRResult(codes[0].rawValue);
        else qrAnimFrame=requestAnimationFrame(scanQRFrame);
      }).catch(()=>{ qrAnimFrame=requestAnimationFrame(scanQRFrame); });
      return;
    }

    // ── No decoder available ──
    const ov=el('qrOverlay');
    if(ov) ov.innerHTML='<div style="color:#fff;text-align:center;padding:20px;font-size:.85rem">⚠️ Browser ບໍ່ຮອງຮັບ QR Scan<br>ໃຊ້ Chrome (Android) ຫຼື ໃສ່ລະຫັດ QR ດ້ານລຸ່ມ</div>';
    qrAnimFrame=requestAnimationFrame(scanQRFrame);
  } catch(e){ qrAnimFrame=requestAnimationFrame(scanQRFrame); }
}

function useQRSite(siteId){
  // Set site and auto check-in via QR
  navigate('checkin');
  setTimeout(async ()=>{
    const sel=el('ciSite'); if(sel) sel.value=siteId;
    // Try GPS first, then auto-checkin
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(
        pos=>{
          ciGPS={status:'ok',lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:Math.round(pos.coords.accuracy)};
          const site=getSiteById(siteId)||DATA.sites[0];
          ciGPS.dist=Math.round(haversine(ciGPS.lat,ciGPS.lng,site.lat,site.lng));
          doQRCheckin(siteId);
        },
        ()=>{
          // GPS failed — check-in without GPS
          ciGPS={status:'ok',lat:null,lng:null,dist:0,accuracy:0};
          doQRCheckin(siteId);
        },
        {timeout:5000,maximumAge:30000}
      );
    } else {
      ciGPS={status:'ok',lat:null,lng:null,dist:0,accuracy:0};
      doQRCheckin(siteId);
    }
  },300);
}

async function doQRCheckin(siteId){
  const u = DATA.currentUser;
  const site = getSiteById(siteId)||DATA.sites[0];
  const t = nowT();
  const shift = getShiftById(u.shiftId)||DATA.shifts[0];
  const cfg = DATA.settings;
  const todayRec = DATA.attendance.find(a=>a.empId===u.id&&a.date===today());
  const hasCheckedIn = todayRec&&todayRec.checkIn;

  if(!hasCheckedIn){
    // CHECK-IN
    const [sh,sm] = (shift?.startTime||'08:00').split(':').map(Number);
    const [th,tm] = t.split(':').map(Number);
    const diffMin = (th*60+tm)-(sh*60+sm);
    const inZone  = ciGPS.dist!==null ? ciGPS.dist<=site.radius : true;
    const status  = !inZone?'outOfZone':diffMin>cfg.lateMin?'late':'normal';

    let rec;
    if(todayRec&&!todayRec.checkIn){
      const idx=DATA.attendance.findIndex(a=>a.id===todayRec.id);
      rec={...todayRec,checkIn:t,siteId:site.id,siteName:site.name,
        lat:ciGPS.lat,lng:ciGPS.lng,selfieUrl:'',status};
      DATA.attendance[idx]=rec;
    } else {
      rec={id:uid2(),empId:u.id,date:today(),checkIn:t,checkOut:'',
        siteId:site.id,siteName:site.name,lat:ciGPS.lat,lng:ciGPS.lng,
        selfieUrl:'',status,hours:'0.00',qrCheckin:true};
      DATA.attendance.push(rec);
    }
    lsSave('attendance');FB.push('attendance',rec);
    addAudit('QR Check-in','attendance',`${u.name} QR Check-in ${site.name}`);
    showCheckinResult('in',t,site,status);

  } else if(!todayRec.checkOut){
    // CHECK-OUT
    const [eh,em] = (shift?.endTime||'17:00').split(':').map(Number);
    const [th,tm] = t.split(':').map(Number);
    const diffMin = (eh*60+em)-(th*60+tm);
    if(diffMin>cfg.earlyMin&&todayRec.status==='normal') todayRec.status='earlyLeave';
    todayRec.checkOut=t;
    todayRec.hours=calcH(todayRec.checkIn,t);
    lsSave('attendance');FB.update('attendance',todayRec.id,todayRec);
    addAudit('QR Check-out','attendance',`${u.name} QR Check-out ${site.name}`);
    showCheckinResult('out',t,site,todayRec);

  } else {
    // Already done
    toast('✅ ລົງເວລາຄົບແລ້ວ — '+todayRec.checkIn+' → '+todayRec.checkOut);
    navigate('checkin');
  }
}

function initDashCharts(){

  const days7=[]; for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days7.push(d.toISOString().split('T')[0]);}
  const labels7=days7.map(d=>new Date(d+'T00:00').toLocaleDateString('th-TH',{weekday:'short',day:'numeric'}));
  const presentData=days7.map(d=>DATA.attendance.filter(a=>a.date===d&&a.checkIn).length);
  const lateData=days7.map(d=>DATA.attendance.filter(a=>a.date===d&&a.status==='late').length);
  const outData=days7.map(d=>DATA.attendance.filter(a=>a.date===d&&a.status==='outOfZone').length);
  // Monthly hours per employee (last 30 days)
  const empUsers=DATA.users.filter(x=>x.role==='employee');
  const empLabels=empUsers.map(e=>e.name.split(' ')[0]);
  const empHours=empUsers.map(e=>{
    const mo=today().slice(0,7);
    return parseFloat(DATA.attendance.filter(a=>a.empId===e.id&&a.date.startsWith(mo)).reduce((s,a)=>s+parseFloat(a.hours||0),0).toFixed(1));
  });
  // Leave breakdown donut
  const lvTypes=['sick','annual','personal','maternity'];
  const lvTypeLbls=['ລາເຈັບ','ລາພັກ','ລາກິດ','ລາຄລອດ'];
  const lvCounts=lvTypes.map(t=>DATA.leaves.filter(l=>l.type===t&&l.status==='approved').length);
  const lvColors=['#1976d2','#43a047','#f57c00','#7b1fa2'];

    if(!window.Chart) return;
    Chart.defaults.font.family="'Segoe UI',Tahoma,sans-serif";
    Chart.defaults.font.size=11;
    // Attendance bar
    const ac=document.getElementById('attChart');
    if(ac) new Chart(ac,{type:'bar',data:{labels:labels7,datasets:[
      {label:'ເຂົ້າ',data:presentData,backgroundColor:'#43a047',borderRadius:4},
      {label:'ມາຊ້າ',data:lateData,backgroundColor:'#f57c00',borderRadius:4},
      {label:'ນອກ',data:outData,backgroundColor:'#e53935',borderRadius:4}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:10,font:{size:10}}}},scales:{x:{stacked:false,ticks:{font:{size:10}}},y:{beginAtZero:true,ticks:{stepSize:1,font:{size:10}}}}}});
    // Hours horizontal bar
    const hc=document.getElementById('hoursChart');
    if(hc) new Chart(hc,{type:'bar',data:{labels:empLabels,datasets:[{label:'ຊ.ມ.',data:empHours,backgroundColor:['#1976d2','#43a047','#f57c00','#7b1fa2','#00897b'],borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{font:{size:10}}},y:{ticks:{font:{size:10}}}}}});
    // Leave donut
    const lc2=document.getElementById('lvChart');
    if(lc2) new Chart(lc2,{type:'doughnut',data:{labels:lvTypeLbls,datasets:[{data:lvCounts,backgroundColor:lvColors,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false}}}});

    // Turnover Rate (last 12 months)
    const now=new Date();
    const tvLabels=[],tvData=[],tvResignCounts=[];
    for(let i=11;i>=0;i--){
      const d=new Date(now.getFullYear(),now.getMonth()-i,1);
      const mo=d.toISOString().slice(0,7);
      const lbl=String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getFullYear()).slice(2);
      tvLabels.push(lbl);
      const resigned=DATA.users.filter(u=>u.resignDate&&u.resignDate.startsWith(mo)).length;
      const total=Math.max(DATA.users.filter(u=>u.role==='employee').length,1);
      tvData.push(parseFloat((resigned/total*100).toFixed(1)));
      tvResignCounts.push(resigned);
    }
    const tc=document.getElementById('turnoverChart');
    if(tc) new Chart(tc,{type:'line',data:{labels:tvLabels,datasets:[{
      label:'Turnover %',data:tvData,
      borderColor:'#e53935',backgroundColor:'rgba(229,57,53,.08)',
      borderWidth:2.5,pointRadius:5,pointBackgroundColor:tvData.map(v=>v>0?'#e53935':'#bbb'),
      fill:true,tension:.3
    }]},options:{responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:ctx=>`Turnover: ${ctx.parsed.y}% (${tvResignCounts[ctx.dataIndex]} ຄົນ)`}}
      },
      scales:{
        y:{beginAtZero:true,max:Math.max(...tvData,5)+2,
           ticks:{callback:v=>v+'%',font:{size:10}},
           grid:{color:'rgba(0,0,0,.06)'}},
        x:{ticks:{font:{size:9}},grid:{display:false}}
      }}});
}

DATA.swapRequests = DATA.swapRequests||lsLoad('swapRequests')||[];
['swapRequests'].forEach(key=>{
  const orig=DATA[key];
  orig._push=orig.push.bind(orig);orig.push=function(...a){const r=orig._push(...a);lsSave(key);return r};
  orig._splice=orig.splice.bind(orig);orig.splice=function(...a){const r=orig._splice(...a);lsSave(key);return r};
});

function pgShiftSwap(){
  const u=DATA.currentUser;
  const isHR=u.role==='admin'||u.role==='supervisor';
  const swaps=[...DATA.swapRequests].sort((a,b)=>b.created.localeCompare(a.created));
  const mySwaps=swaps.filter(s=>s.requesterId===u.id||s.targetId===u.id);
  const empUsers=DATA.users.filter(e=>e.role==='employee'&&e.id!==u.id&&e.active);
  const days7=[]; for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()+i);days7.push(d.toISOString().split('T')[0]);}
  return `
  <div style="max-width:860px">
    <div class="phb"><div><h2>🔄 ຂໍແລກກະ (Shift Swap)</h2><p>ພະນັກງານສາມາດຂໍແລກກະກັນໄດ້</p></div></div>
    ${!isHR?`
    <div class="card">
      <div class="card-t">📝 ຍື່ນຄຳຂໍແລກກະ</div>
      <div class="fr">
        <div class="fg"><label>ວັນທີຂອງຂ້ອຍ (ທີ່ຕ້ອງການໃຫ້)</label><input type="date" id="swMyDate" min="${today()}" value="${days7[1]}"></div>
        <div class="fg"><label>ພະນັກງານທີ່ຕ້ອງການແລກ</label><select id="swTarget">${empUsers.map(e=>`<option value="${e.id}">${e.name} (${getShiftById(e.shiftId)?.name||'?'})</option>`).join('')}</select></div>
      </div>
      <div class="fr">
        <div class="fg"><label>ວັນທີຂອງຄູ່ (ທີ່ຕ້ອງການ)</label><input type="date" id="swTgDate" min="${today()}" value="${days7[2]}"></div>
        <div class="fg"><label>ເຫດຜົນ</label><input id="swReason" placeholder="ອະທິບາຍ..."></div>
      </div>
      <button class="btn btn-p btn-sm" onclick="submitSwap()">📤 ສົ່ງຄຳຂໍ</button>
    </div>`:''}
    ${isHR?`
    <div class="card">
      <div class="card-t">📋 ທຸກຄຳຂໍ (Admin view)</div>
      ${swaps.length?swaps.map(s=>swapCard(s,true)).join(''):'<div class="empty"><div class="ei">🔄</div><p>ບໍ່ມີ</p></div>'}
    </div>`:`
    <div class="card">
      <div class="card-t">📜 ຄຳຂໍຂອງຂ້ອຍ</div>
      ${mySwaps.length?mySwaps.map(s=>swapCard(s,false)).join(''):'<div class="empty"><div class="ei">🔄</div><p>ຍັງບໍ່ມີ</p></div>'}
    </div>`}
  </div>`;
}

function swapCard(s,isAdmin){
  const req=getUserById(s.requesterId)||{name:'?'};
  const tgt=getUserById(s.targetId)||{name:'?'};
  const reqShift=getShiftById(s.requesterShiftId)||{name:'?'};
  const tgtShift=getShiftById(s.targetShiftId)||{name:'?'};
  const sc={pending:'<span class="chip cy">⏳ ລໍຖ້າ</span>',approved:'<span class="chip cg">✅ ອະນຸມັດ</span>',rejected:'<span class="chip cr">❌ ປະຕິເສດ</span>'};
  return `<div style="border:1px solid var(--bdr);border-radius:10px;padding:14px;margin-bottom:10px;${s.status==='pending'?'border-left:4px solid var(--orange)':''}">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap">
      <div>
        <div style="font-weight:600;font-size:.88rem">${req.name} 🔄 ${tgt.name}</div>
        <div style="font-size:.8rem;color:var(--t2);margin-top:3px">${fmtDate(s.requesterDate)} (${reqShift.name}) ↔ ${fmtDate(s.targetDate)} (${tgtShift.name})</div>
        <div style="font-size:.79rem;color:var(--t3)">${s.reason} · ${fmtDatetime(s.created)}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        ${sc[s.status]||''}
        ${s.status==='pending'&&(isAdmin||DATA.currentUser.id===s.targetId)?`<div style="display:flex;gap:6px">
          <button class="btn btn-s btn-sm" onclick="actSwap('${s.id}','approved')">✅</button>
          <button class="btn btn-d btn-sm" onclick="actSwap('${s.id}','rejected')">❌</button>
        </div>`:''}
      </div>
    </div>
  </div>`;
}

function submitSwap(){
  const myDate=el('swMyDate').value,tgId=el('swTarget').value,tgDate=el('swTgDate').value,reason=(el('swReason').value||'').trim();
  if(!myDate||!tgId||!tgDate||!reason){toast('ຕື່ມຂໍ້ມູນ','error');return}
  const u=DATA.currentUser;const tgt=getUserById(tgId);
  DATA.swapRequests.push({id:uid2(),requesterId:u.id,targetId:tgId,requesterDate:myDate,targetDate:tgDate,requesterShiftId:u.shiftId,targetShiftId:tgt?.shiftId||'',reason,status:'pending',created:new Date().toISOString()});
  addNotif(tgId,`${u.name} ຂໍແລກກະ ວັນ ${fmtDate(myDate)} ↔ ${fmtDate(tgDate)}`,'swap');
  toast('✅ ສົ່ງຄຳຂໍ Shift Swap');el('content').innerHTML=pgShiftSwap();
}

function actSwap(id,action){
  const s=DATA.swapRequests.find(x=>x.id===id);if(!s)return;
  s.status=action;s.approvedBy=DATA.currentUser.id;
  if(action==='approved'){
    // Swap shifts in schedule records
    const req=getUserById(s.requesterId);const tgt=getUserById(s.targetId);
    if(req&&tgt){
      addNotif(s.requesterId,`ຄຳຂໍ Shift Swap ຂອງທ່ານ ໄດ້ຮັບການ${action==='approved'?'ອະນຸມັດ':'ປະຕິເສດ'}`,'swap');
    }
  }
  lsSave('swapRequests');toast(action==='approved'?'✅ ອະນຸມັດ':'❌ ປະຕິເສດ');el('content').innerHTML=pgShiftSwap();
}

const _pgRepOrig=pgReport;
pgReport=function(){
  const base=_pgRepOrig();
  return base.replace(/<tbody>([\s\S]*?)<\/tbody>/,(_,rows)=>{
    const yr=window._rptYear||new Date().getFullYear();
    const mo=window._rptMonth!==undefined?window._rptMonth:new Date().getMonth();
    const moStr=String(yr)+'-'+String(mo+1).padStart(2,'0');
    const emps=DATA.users.filter(u=>u.role==='employee');
    const newRows=emps.map(emp=>{
      const att=DATA.attendance.filter(a=>a.empId===emp.id&&a.date.startsWith(moStr));
      const worked=att.length;const totalH=att.reduce((s,a)=>s+parseFloat(a.hours||0),0).toFixed(1);
      const late=att.filter(a=>a.status==='late').length;const early=att.filter(a=>a.status==='earlyLeave').length;
      const outZ=att.filter(a=>a.status==='outOfZone').length;
      const lvUsed=DATA.leaves.filter(l=>l.empId===emp.id&&l.status==='approved'&&l.startDate.startsWith(moStr)).reduce((s,l)=>s+(l.days||1),0);
      const otH=DATA.ots.filter(o=>o.empId===emp.id&&o.status==='approved'&&o.date.startsWith(moStr)).reduce((s,o)=>s+parseFloat(o.hours||0),0);
      return `<tr>
        <td><div style="display:flex;align-items:center;gap:7px"><div class="uav">${emp.name.charAt(0)}</div><div><b style="font-size:.86rem">${emp.name}</b><div style="font-size:.74rem;color:var(--t2)">${emp.empId}</div></div></div></td>
        <td>${emp.dept}</td><td><b>${worked}</b></td><td><b>${totalH}</b></td>
        <td style="color:var(--orange)"><b>${otH.toFixed(1)}</b></td>
        <td style="color:var(--purple)"><b>${lvUsed}</b></td>
        <td style="color:${late?'var(--orange)':'var(--t3)'}"><b>${late}</b></td>
        <td style="color:${early?'var(--purple)':'var(--t3)'}"><b>${early}</b></td>
        <td style="color:${outZ?'var(--red)':'var(--t3)'}"><b>${outZ}</b></td>
        <td><button class="btn btn-g btn-sm" onclick="printAttReport('${emp.id}','${moStr}')">🖨️</button></td>
      </tr>`;
    }).join('')||'<tr><td colspan="10"><div class="empty"><div class="ei">📊</div><p>ບໍ່ມີ</p></div></td></tr>';
    return `<tbody>${newRows}</tbody>`;
  });
};

const SYNC_KEY = 'ttp_sync_queue';

function getSyncQueue(){ try{return JSON.parse(localStorage.getItem(SYNC_KEY)||'[]')}catch{return[]} }
function setSyncQueue(q){ localStorage.setItem(SYNC_KEY,JSON.stringify(q)) }
function addToSyncQueue(op){ const q=getSyncQueue(); q.push({...op,queuedAt:new Date().toISOString()}); setSyncQueue(q); updateOfflineUI(); }

function updateOfflineUI(){
  const banner=el('offlineBanner');
  const dot=document.querySelector('.online-dot');

  const q=getSyncQueue();
  if(!isOnline){
    if(banner)banner.classList.add('show');
    if(dot)dot.style.background='#f57c00';
    if(onlTxt)onlTxt.textContent='ອອຟລາຍ';
    // Adjust content top padding for banner
    const c=el('content');if(c)c.style.marginTop='0';
    const sc=el('syncCount');
    if(sc&&q.length){sc.style.display='';sc.textContent=q.length+' ລາຍການ'}
    else if(sc)sc.style.display='none';
  } else {
    if(banner)banner.classList.remove('show');
    if(dot)dot.style.background='var(--green,#43a047)';
    if(onlTxt)onlTxt.textContent='ອອນລາຍ';
    if(q.length) processSyncQueue();
  }
}

async function processSyncQueue(){
  const q=getSyncQueue();
  if(!q.length||!isOnline)return;
  let processed=0;
  const remaining=[];
  for(const op of q){
    try{
      if(op.type==='checkin'){
        // Apply to DATA (Firebase: await addDoc(collection(db,'attendance'),op.data))
        const exists=DATA.attendance.find(a=>a.id===op.data.id);
        if(!exists){ DATA.attendance.push(op.data); lsSave('attendance'); }
        processed++;
      } else if(op.type==='checkout'){
        const idx=DATA.attendance.findIndex(a=>a.id===op.data.id);
        if(idx>=0){ DATA.attendance[idx]={...DATA.attendance[idx],...op.data}; lsSave('attendance'); }
        processed++;
      } else { remaining.push(op); }
    } catch(e){ remaining.push(op); }
  }
  setSyncQueue(remaining);
  if(processed>0){
    toast('☁️ Sync '+processed+' ລາຍການ ສຳເລັດ');
    addAudit('Sync','attendance','Sync '+processed+' offline records');
    if(currentPage==='checkin'||currentPage==='attendance') renderPage();
  }
  updateOfflineUI();
}

function manualSync(){ if(isOnline)processSyncQueue(); else toast('ຍັງ Offline ຢູ່','warning'); }

window.addEventListener('online',()=>{ isOnline=true; updateOfflineUI(); toast('🌐 Online ແລ້ວ — Syncing...'); setTimeout(processSyncQueue,800); });

    const site=getSiteById(siteId)||DATA.sites[0];
    const todayRec=DATA.attendance.find(a=>a.empId===u.id&&a.date===today());
    const t=nowT();

    } else if(!todayRec.checkOut){
      todayRec.checkOut=t; todayRec.hours=calcH(todayRec.checkIn,t); lsSave('attendance');

function checkPwStrength(){
  const pw=el('rpNew')?.value||'';
  const bar=el('pwStrength');if(!bar)return;
  let score=0,label='',color='';
  if(pw.length>=4)score++;
  if(pw.length>=8)score++;
  if(/[0-9]/.test(pw)&&/[a-zA-Z]/.test(pw))score++;
  if(/[^a-zA-Z0-9]/.test(pw))score++;
  if(score<=1){label='ອ່ອນ';color='var(--red)'}
  else if(score===2){label='ພໍໃຊ້';color='var(--orange)'}
  else{label='ແຂງແຮງ';color='var(--green)'}
  if(pw.length===0){bar.innerHTML='';return}
  bar.innerHTML=`<div style="display:flex;align-items:center;gap:6px">
    <div style="flex:1;height:4px;background:#eee;border-radius:4px;overflow:hidden">
      <div style="width:${score*25}%;height:100%;background:${color};transition:.3s;border-radius:4px"></div>
    </div>
    <span style="font-size:.72rem;color:${color};font-weight:600">${label}</span>
  </div>`;
}

function pgCalendar(){
  const u=DATA.currentUser;
  const isHR=u.role==='admin'||u.role==='supervisor';
  const yr=window._calY||new Date().getFullYear();
  const mo=window._calM!==undefined?window._calM:new Date().getMonth();
  const empF=window._calEmp||(isHR?'all':u.id);
  const emps=DATA.users.filter(x=>x.role==='employee'&&x.active);
  const moStr=String(yr)+'-'+String(mo+1).padStart(2,'0');
  const firstDay=new Date(yr,mo,1).getDay();
  const daysInMo=new Date(yr,mo+1,0).getDate();
  const dayNames=['ອາທິດ','ຈັນ','ອັງຄານ','ພຸດ','ພະຫັດ','ສຸກ','ເສົາ'];
  const moNames=['ມັງກອນ','ກຸມພາ','ມີນາ','ເມສາ','ພຶດສະພາ','ມິຖຸນາ','ກໍລະກົດ','ສິງຫາ','ກັນຍາ','ຕຸລາ','ພະຈິກ','ທັນວາ'];

  const attData=DATA.attendance.filter(a=>{
    if(empF==='all')return a.date.startsWith(moStr);
    return a.empId===empF&&a.date.startsWith(moStr);
  });
  const holidays=DATA.holidays.filter(h=>h.date.startsWith(moStr));

  // Summary stats
  const totalDays=attData.filter(a=>a.checkIn).length;
  const lateCount=attData.filter(a=>a.status==='late').length;
  const outCount=attData.filter(a=>a.status==='outOfZone').length;
  const totalHrs=attData.reduce((s,a)=>s+parseFloat(a.hours||0),0).toFixed(1);

  function getDayInfo(d){
    const ds=moStr+'-'+String(d).padStart(2,'0');
    const hd=holidays.find(h=>h.date===ds);
    const dayAtt=attData.filter(a=>a.date===ds);
    const dow=new Date(ds+'T00:00').getDay();
    const isWknd=dow===0||dow===6;
    return{ds,hd,dayAtt,isWknd};
  }

  const cells=[];
  for(let i=0;i<(firstDay||7)%7;i++)cells.push(null);
  for(let d=1;d<=daysInMo;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);

  // Prev/Next month helpers
  const prevMo=mo===0?11:mo-1, prevYr=mo===0?yr-1:yr;
  const nextMo=mo===11?0:mo+1, nextYr=mo===11?yr+1:yr;

  return `

        <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3)" onclick="window._calY=${new Date().getFullYear()};window._calM=${new Date().getMonth()};loadCal()">ວັນນີ້</button>

    <div class="fbar" style="margin-bottom:12px">
      <div class="fg"><label>ປີ</label><input type="number" id="calY" value="${yr}" min="2024" max="2030" style="max-width:80px" oninput="loadCal()"></div>
      <div class="fg"><label>ເດືອນ</label>
        <select id="calM" oninput="loadCal()">${moNames.map((m,i)=>`<option value="${i}" ${mo===i?'selected':''}>${m}</option>`).join('')}</select>

      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--bdr)">

const FB_COLLECTIONS = [
  'users','sites','shifts','attendance','leaves','ots',
  'fixreqs','holidays','leavequota','schedules','salary',
  'notifications','swapRequests','auditLog'
];

const FB = {
  db: null,
  ready: false,
  listeners: {},
  _initAttempted: false,

  // ──────────────────────────────────────────
  // INIT: ໃຊ້ config ຈາກ DATA.settings
  // ──────────────────────────────────────────
  init(){
    const s = DATA.settings;
    if(!s.firebaseKey || !s.firebaseProject || !s.firebaseDbUrl) return false;
    if(this.ready) return true;
    try {
      const app = typeof firebase !== 'undefined'
        ? (firebase.apps.length ? firebase.app() : firebase.initializeApp({
            apiKey:      s.firebaseKey,
            authDomain:  s.firebaseProject + '.firebaseapp.com',
            databaseURL: s.firebaseDbUrl,
            projectId:   s.firebaseProject,
          }))
        : null;
      if(!app){ console.warn('Firebase SDK not loaded'); return false; }
      this.db    = firebase.database();
      this.ready = true;
      fbUpdateTopbarDot(true);
      return true;
    } catch(e){
      console.error('FB.init error', e);
      fbUpdateTopbarDot(false);
      return false;
    }
  },

  // ──────────────────────────────────────────
  // READ ALL — ດຶງ 14 collections ຈາກ cloud
  // ──────────────────────────────────────────
  async loadAll(){
    if(!this.ready) return;
    const promises = FB_COLLECTIONS.map(async key => {
      try {
        const snap = await this.db.ref(key).once('value');
        const val  = snap.val();
        if(val && typeof val === 'object'){
          const arr = Object.values(val).filter(Boolean);
          if(arr.length){
            DATA[key] = arr;
            lsSave(key);
          }
        }
      } catch(e){ console.warn('FB.loadAll fail:', key, e); }
    });
    // settings ແຍກ (object ບໍ່ແມ່ນ array)
    promises.push((async()=>{
      try {
        const snap = await this.db.ref('settings').once('value');
        const val  = snap.val();
        if(val){ Object.assign(DATA.settings, val); lsSave('settings'); }
      } catch(e){}
    })());
    await Promise.all(promises);
    console.log('✅ FB.loadAll complete');
  },

  // ──────────────────────────────────────────
  // REAL-TIME LISTENERS
  // ──────────────────────────────────────────
  listenAttendance(){
    if(this.listeners.attendance || !this.ready) return;
    this.listeners.attendance = this.db.ref('attendance').on('value', snap => {
      const val = snap.val();
      if(!val) return;
      const incoming = Object.values(val).filter(Boolean);
      // merge: ບໍ່ overwrite ຖ້າ ຂໍ້ມູນທ້ອງຖິ່ນໃໝ່ກວ່າ
      incoming.forEach(rec => {
        const idx = DATA.attendance.findIndex(a => a.id === rec.id);
        if(idx < 0) DATA.attendance.push(rec);
        else DATA.attendance[idx] = rec;
      });
      lsSave('attendance');
      if(['checkin','attendance','dashboard'].includes(currentPage)) renderPage();
    });
  },

  listenNotifications(){
    if(this.listeners.notif || !this.ready) return;
    const uid = DATA.currentUser?.id;
    if(!uid) return;
    this.listeners.notif = this.db.ref('notifications').on('child_added', snap => {
      const n = snap.val();
      if(!n || n.toUserId !== uid) return;
      if(!DATA.notifications.find(x => x.id === n.id)){
        DATA.notifications.unshift(n);
        lsSave('notifications');
        updateNotifBadge();
      }
    });
  },

  stopListeners(){
    try {
      if(this.listeners.attendance) this.db.ref('attendance').off('value', this.listeners.attendance);
      if(this.listeners.notif)      this.db.ref('notifications').off('child_added', this.listeners.notif);
    } catch(e){}
    this.listeners = {};
  },

  // ──────────────────────────────────────────
  // WRITE HELPERS
  // ──────────────────────────────────────────
  async push(col, record){
    if(!this.ready || !record?.id) return;
    try { await this.db.ref(`${col}/${record.id}`).set(record); }
    catch(e){ console.warn('FB.push fail:', col, e); }
  },

  async update(col, id, data){
    if(!this.ready || !id) return;
    try { await this.db.ref(`${col}/${id}`).update(data); }
    catch(e){ console.warn('FB.update fail:', col, id, e); }
  },

  async remove(col, id){
    if(!this.ready || !id) return;
    try { await this.db.ref(`${col}/${id}`).remove(); }
    catch(e){ console.warn('FB.remove fail:', col, id, e); }
  },

  async saveArray(col, arr){
    if(!this.ready || !arr?.length) return;
    try {
      const obj = {};
      arr.forEach(item => { if(item?.id) obj[item.id] = item; });
      await this.db.ref(col).set(obj);
    } catch(e){ console.warn('FB.saveArray fail:', col, e); }
  },

  async saveSettings(){
    if(!this.ready) return;
    try { await this.db.ref('settings').set(DATA.settings); }
    catch(e){ console.warn('FB.saveSettings fail:', e); }
  },
};

  requireAdminPwd('Push All → Cloud','Overwrite ຂໍ້ມູນທັງໝົດໃນ Firebase — ຈະ Undo ບໍ່ໄດ້',async()=>{
  if(!FB.ready){toast('Firebase ຍັງບໍ່ເຊື່ອມ','error');return}
  toast('☁️ ກຳລັງ Push...','warning');
  const all = FB_COLLECTIONS.map(col => FB.saveArray(col, DATA[col]||[]));
  all.push(FB.saveSettings());
  await Promise.all(all);
  toast('✅ Push ທຸກ Collection ຂຶ້ນ Cloud ສຳເລັດ');
  addAudit('FB Push','firebase','Push all data to Firebase');
  });
}

async function fbPullAll(){
  requireAdminPwd('Pull All ← Cloud','ດຶງຂໍ້ມູນຈາກ Firebase — ຈະ Overwrite ຂໍ້ມູນ Local',async()=>{
  if(!FB.ready){toast('Firebase ຍັງບໍ່ເຊື່ອມ','error');return}
  toast('⬇️ ກຳລັງ Pull...','warning');
  await FB.loadAll();
  toast('✅ Pull ຂໍ້ມູນຈາກ Cloud ສຳເລັດ');
  renderPage();
  addAudit('FB Pull','firebase','Pull all data from Firebase');
  });
}

function fbShowTopbarPill(){
  if(el('fbPill')) return;

  if(!tbr) return;
  const pill = document.createElement('div');
  pill.id = 'fbPill';
  pill.style.cssText = 'display:flex;align-items:center;gap:4px;font-size:.72rem;font-weight:600;padding:2px 9px;border-radius:20px;cursor:pointer;' +
    (FB.ready ? 'background:#e8f5e9;color:#2e7d32' : 'background:#fff3e0;color:#e65100');
  pill.innerHTML = (FB.ready ? '🔥 FB Live' : '💾 Local');
  pill.title = FB.ready ? 'Firebase Connected' : 'Using localStorage — Configure Firebase in Settings';
  pill.onclick = ()=>navigate('settings');

}

// ── Data Init ──────────────────────────────────────────
DATA.courses       = DATA.courses       || lsLoad('courses')       || [];
DATA.lessons       = DATA.lessons       || lsLoad('lessons')       || [];
DATA.quizQuestions = DATA.quizQuestions || lsLoad('quizQuestions') || [];
DATA.courseProgress= DATA.courseProgress|| lsLoad('courseProgress')|| [];
DATA.certificates  = DATA.certificates  || lsLoad('certificates')  || [];

['courses','lessons','quizQuestions','courseProgress','certificates'].forEach(key=>{
  const o=DATA[key];
  o._push=o.push.bind(o); o.push=function(...a){const r=o._push(...a);lsSave(key);return r};
  o._splice=o.splice.bind(o); o.splice=function(...a){const r=o._splice(...a);lsSave(key);return r};
});

// ── Helpers ─────────────────────────────────────────────
const EL_CATS=['ຄວາມປອດໄພ','ທັກສະວຽກ','ກົດລະບຽບ','ການບໍລິການ','IT','ອື່ນໆ'];
const EL_COLS=['#1a237e','#2e7d32','#b71c1c','#e65100','#4a148c','#006064'];
const EL_COLNAMES=['Navy','Green','Red','Orange','Purple','Teal'];

function getCourse(id){return DATA.courses.find(c=>c.id===id)}
function getCourseLessons(cid){return DATA.lessons.filter(l=>l.courseId===cid).sort((a,b)=>a.order-b.order)}
function getCourseProgress(empId,cid){return DATA.courseProgress.find(p=>p.empId===empId&&p.courseId===cid)}
function getOrCreateProgress(empId,cid){
  let p=getCourseProgress(empId,cid);
  if(!p){p={id:uid2(),empId,courseId:cid,lessonsCompleted:[],quizScores:{},totalScore:0,pct:0,status:'not_started',startedAt:'',completedAt:''};DATA.courseProgress.push(p);}
  return p;
}
function calcCoursePct(empId,cid){
  const ls=getCourseLessons(cid);if(!ls.length)return 0;
  const p=getCourseProgress(empId,cid);if(!p)return 0;
  return Math.round(p.lessonsCompleted.length/ls.length*100);
}
function getAssignedCourses(empId){return DATA.courses.filter(c=>c.active&&(c.assignedTo.includes('all')||c.assignedTo.includes(empId)))}
function getCertificate(empId,cid){return DATA.certificates.find(c=>c.empId===empId&&c.courseId===cid)}

        ${emps.map(e=>`<option value="${e.id}" ${assigned.includes(e.id)&&!assigned.includes('all')?'selected':''}>${e.name}</option>`).join('')}

    </div>
    <div class="tog-row"><div><b>ເປີດໃຊ້ງານ</b></div><label class="tog"><input type="checkbox" id="ecActive" ${c?.active!==false?'checked':''}><span class="tsl"></span></label></div>

function saveCourse(existId){
  const title=(el('ecTitle').value||'').trim();
  if(!title){toast('ໃສ່ຊື່ Course','error');return}
  const av=el('ecAssign').value;
  const obj={id:existId||uid2(),title,desc:el('ecDesc').value.trim(),category:el('ecCat').value,coverColor:el('ecColor').value,passScore:parseInt(el('ecPass').value)||70,deadline:el('ecDead').value,assignedTo:av==='all'?['all']:[av],active:el('ecActive').checked,createdBy:DATA.currentUser.id,createdAt:existId?getCourse(existId)?.createdAt:new Date().toISOString()};
  if(existId){const i=DATA.courses.findIndex(c=>c.id===existId);if(i>=0)DATA.courses[i]=obj;}
  else{DATA.courses.push(obj);const targets=av==='all'?DATA.users.filter(u=>u.role==='employee'&&u.active):DATA.users.filter(u=>u.id===av);targets.forEach(u=>addNotif(u.id,`📚 ມີ Course ໃໝ່: "${obj.title}" — ກະລຸນາຮຽນ`,'elearning'));}
  lsSave('courses');FB.saveArray('courses',DATA.courses);
  closeModal();toast('✅ ບັນທຶກ Course');el('content').innerHTML=pgEAdmin();
}

function deleteCourse(id){
  if(!confirm('ລຶບ Course ນີ້? ຂໍ້ມູນ Progress ຈະຖືກລຶບດ້ວຍ'))return;
  const ci=DATA.courses.findIndex(c=>c.id===id);if(ci>=0)DATA.courses.splice(ci,1);
  [...DATA.lessons.filter(l=>l.courseId===id)].forEach(l=>{const li=DATA.lessons.findIndex(x=>x.id===l.id);if(li>=0)DATA.lessons.splice(li,1);});
  [...DATA.courseProgress.filter(p=>p.courseId===id)].forEach(p=>{const pi=DATA.courseProgress.findIndex(x=>x.id===p.id);if(pi>=0)DATA.courseProgress.splice(pi,1);});
  lsSave('courses');lsSave('lessons');lsSave('courseProgress');
  FB.remove('courses',id);toast('🗑️ ລຶບ Course');el('content').innerHTML=pgEAdmin();
}

function elToggle(){
  const t=el('elType')?.value||'video';
  [['elVF','video'],['elPF','pdf'],['elTF','text'],['elQN','quiz']].forEach(([id,tp])=>{const d=el(id);if(d)d.style.display=t===tp?'block':'none'});
}

function saveLesson(cid,eid){
  const title=(el('elTitle').value||'').trim();
  if(!title){toast('ໃສ່ຊື່ Lesson','error');return}
  const type=el('elType').value;
  const obj={id:eid||uid2(),courseId:cid,title,type,videoUrl:el('elVU')?.value||'',pdfUrl:el('elPU')?.value||'',content:el('elCT')?.value||'',order:parseInt(el('elOrd').value)||1};
  if(eid){const i=DATA.lessons.findIndex(l=>l.id===eid);if(i>=0)DATA.lessons[i]=obj;}else DATA.lessons.push(obj);
  lsSave('lessons');FB.saveArray('lessons',DATA.lessons);
  closeModal();toast('✅ ບັນທຶກ Lesson');el('content').innerHTML=pgECourse();
}

function deleteLesson(id){
  if(!confirm('ລຶບ Lesson?'))return;
  const i=DATA.lessons.findIndex(l=>l.id===id);if(i>=0)DATA.lessons.splice(i,1);
  [...DATA.quizQuestions.filter(q=>q.lessonId===id)].forEach(q=>{const qi=DATA.quizQuestions.findIndex(x=>x.id===q.id);if(qi>=0)DATA.quizQuestions.splice(qi,1);});
  lsSave('lessons');lsSave('quizQuestions');toast('🗑️ ລຶບ Lesson');el('content').innerHTML=pgECourse();
}

        ${[0,1,2,3].map(i=>`<input id="qbO${i}" placeholder="${['A','B','C','D'][i]}..." style="font-size:.82rem;border:1px solid var(--bdr);border-radius:6px;padding:7px 10px">`).join('')}
      </div>

}

function addQ(lid){
  const q=(el('qbQ').value||'').trim();
  const opts=[0,1,2,3].map(i=>(el('qbO'+i)?.value||'').trim());
  if(!q||opts.some(o=>!o)){toast('ຕື່ມຄຳຖາມ + 4 ຕອບ','error');return}
  const cid=DATA.lessons.find(l=>l.id===lid)?.courseId||'';
  DATA.quizQuestions.push({id:uid2(),lessonId:lid,courseId:cid,question:q,options:opts,correct:parseInt(el('qbC').value),points:parseInt(el('qbP').value)||10,order:DATA.quizQuestions.filter(x=>x.lessonId===lid).length+1});
  lsSave('quizQuestions');FB.saveArray('quizQuestions',DATA.quizQuestions);
  toast('✅ ເພີ່ມ');showQuizBuilder(lid);
}

function delQ(id,lid){
  const i=DATA.quizQuestions.findIndex(q=>q.id===id);if(i>=0)DATA.quizQuestions.splice(i,1);
  lsSave('quizQuestions');showQuizBuilder(lid);
}

function pgELesson(){

function markDoneLesson(lid,cid){

// ── Quiz Engine ──────────────────────────────────────────
let _qA={};
function pgQuiz(lid,cid){
  const lesson=DATA.lessons.find(l=>l.id===lid);const course=getCourse(cid);
  const qs=DATA.quizQuestions.filter(q=>q.lessonId===lid).sort((a,b)=>a.order-b.order);
  const totalPts=qs.reduce((s,q)=>s+q.points,0);
  const u=DATA.currentUser;const prog=getOrCreateProgress(u.id,cid);
  const alreadyDone=prog.quizScores[lid]!==undefined;
  if(alreadyDone){
    const scored=prog.quizScores[lid];const pct2=totalPts?Math.round(scored/totalPts*100):0;
    return`<div style="max-width:680px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;cursor:pointer" onclick="window._ecId='${cid}';window._ecStudent=true;navigate('ecourse')"><span style="color:var(--t3);font-size:1.1rem">←</span><span style="font-size:.84rem;color:var(--t2)">${course.title}</span></div>
      <div class="card" style="text-align:center;padding:36px 24px">
        <div style="font-size:3.5rem;margin-bottom:12px">${pct2>=course.passScore?'🎉':'😔'}</div>
        <div style="font-size:1.2rem;font-weight:700;margin-bottom:6px">${pct2>=course.passScore?'ຜ່ານ Quiz!':'ຍັງບໍ່ຜ່ານ'}</div>
        <div style="font-size:2.5rem;font-weight:700;color:${pct2>=course.passScore?'var(--green)':'var(--red)'};margin:10px 0">${scored}/${totalPts}</div>
        <div style="font-size:1rem;color:var(--t2);margin-bottom:6px">${pct2}% · ເກນຜ່ານ ${course.passScore}%</div>
        <div style="display:flex;gap:8px;justify-content:center;margin-top:20px">
          <button class="btn btn-g btn-sm" onclick="retakeQuiz('${lid}','${cid}')">🔁 ເຮັດຄືນ</button>
          <button class="btn btn-p btn-sm" onclick="window._ecId='${cid}';window._ecStudent=true;navigate('ecourse')">← ກັບ Course</button>
        </div>
      </div>
    </div>`;
  }
  _qA={};
  return`<div style="max-width:680px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;cursor:pointer" onclick="window._ecId='${cid}';window._ecStudent=true;navigate('ecourse')"><span style="color:var(--t3);font-size:1.1rem">←</span><span style="font-size:.84rem;color:var(--t2)">${course.title}</span></div>
    <div style="background:${course.coverColor||'#1a237e'};border-radius:14px;padding:18px 22px;color:#fff;margin-bottom:16px">
      <div style="font-size:.74rem;opacity:.75">❓ Quiz</div>
      <div style="font-size:1rem;font-weight:700;margin-top:3px">${lesson?.title||''}</div>
      <div style="font-size:.8rem;opacity:.8;margin-top:2px">${qs.length} ຄຳຖາມ · ${totalPts} pts · ເກນ ${course.passScore}%</div>
    </div>
    ${qs.map((q,i)=>`
    <div class="card" style="margin-bottom:12px">
      <div style="font-size:.88rem;font-weight:600;margin-bottom:12px;line-height:1.5">${i+1}. ${q.question} <span style="font-size:.72rem;color:var(--t3);font-weight:400">(${q.points} pts)</span></div>
      ${q.options.map((o,oi)=>`<div id="qo_${q.id}_${oi}" onclick="pickA('${q.id}',${oi},${q.options.length})" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:6px;border:1.5px solid var(--bdr);transition:.15s">
        <div id="qr_${q.id}_${oi}" style="width:18px;height:18px;border-radius:50%;border:2px solid var(--bdr);flex-shrink:0;transition:.15s"></div>
        <span style="font-size:.86rem">${o}</span>
      </div>`).join('')}
    </div>`).join('')}
    <button class="btn btn-p btn-bl" style="height:46px;font-size:.95rem" onclick='submitQuiz("${lid}","${cid}",${JSON.stringify(qs.map(q=>({id:q.id,correct:q.correct,points:q.points})))},${totalPts})'>📤 ສົ່ງຄຳຕອບ</button>
  </div>`;
}

function pickA(qId,oi,n){
  _qA[qId]=oi;
  for(let i=0;i<n;i++){
    const l=el(`qo_${qId}_${i}`);const r=el(`qr_${qId}_${i}`);
    if(l){l.style.borderColor=i===oi?'var(--blue)':'var(--bdr)';l.style.background=i===oi?'#e3f2fd':'#fff'}
    if(r){r.style.borderColor=i===oi?'var(--blue)':'#ccc';r.style.background=i===oi?'var(--blue)':'#fff'}
  }
}

function submitQuiz(lid,cid,qData,totalPts){
  const unanswered=qData.filter(q=>_qA[q.id]===undefined);
  if(unanswered.length){toast(`ຍັງບໍ່ຕອບ ${unanswered.length} ຄຳຖາມ`,'warning');return}
  let score=0;qData.forEach(q=>{if(_qA[q.id]===q.correct)score+=q.points;});
  const pct=totalPts?Math.round(score/totalPts*100):0;
  const u=DATA.currentUser;const prog=getOrCreateProgress(u.id,cid);
  prog.quizScores[lid]=score;
  if(!prog.lessonsCompleted.includes(lid))prog.lessonsCompleted.push(lid);
  prog.pct=calcCoursePct(u.id,cid);prog.status='in_progress';
  prog.totalScore=(prog.totalScore||0)+score;
  if(prog.pct===100)checkCourseCompletion(u.id,cid);
  lsSave('courseProgress');FB.update('courseProgress',prog.id,prog);
  renderPage();
}

function retakeQuiz(lid,cid){
  const prog=getCourseProgress(DATA.currentUser.id,cid);
  if(prog){delete prog.quizScores[lid];const li=prog.lessonsCompleted.indexOf(lid);if(li>=0)prog.lessonsCompleted.splice(li,1);lsSave('courseProgress');}
  renderPage();
}

// ── Course Completion + Certificate ─────────────────────
function checkCourseCompletion(empId,cid){
  const course=getCourse(cid);const prog=getCourseProgress(empId,cid);
  if(!prog||!course)return;
  const qLessons=getCourseLessons(cid).filter(l=>l.type==='quiz');
  let earned=0,total=0;
  qLessons.forEach(l=>{
    const qs=DATA.quizQuestions.filter(q=>q.lessonId===l.id);
    total+=qs.reduce((s,q)=>s+q.points,0);earned+=prog.quizScores[l.id]||0;
  });
  const scorePct=total?Math.round(earned/total*100):100;
  const passed=scorePct>=course.passScore;
  prog.status=passed?'passed':'failed';prog.completedAt=new Date().toISOString();
  lsSave('courseProgress');FB.update('courseProgress',prog.id,prog);
  if(passed&&!getCertificate(empId,cid)){

function pgELeaderboard(){
  const emps=DATA.users.filter(u=>u.role==='employee'&&u.active);

    const progs=DATA.courseProgress.filter(p=>p.empId===emp.id);
    const passed=progs.filter(p=>p.status==='passed').length;
    const pts=progs.reduce((s,p)=>s+(p.totalScore||0),0);
    const certs=DATA.certificates.filter(c=>c.empId===emp.id).length;
    const assigned=getAssignedCourses(emp.id).length;
    return{emp,passed,pts,certs,assigned};

      <div style="display:flex;align-items:center;gap:12px;padding:14px;border-radius:10px;margin-bottom:6px;background:${i===0?'linear-gradient(135deg,#fff8e1,#fffde7);border:1px solid #ffd54f':i===1?'#f5f5f5':i===2?'linear-gradient(135deg,#fff3e0,#ffe0b2)':'#fafafa'}">

        <button onclick="togglePw('adminPwdInput')"
          style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--t3)">👁</button>
      </div>

    </div>
  `,`<button class="btn btn-g" onclick="closeModal()">ຍົກເລີກ</button>
     <button class="btn btn-d" onclick="confirmAdminPwd()" id="adminPwdBtn">✅ ຢືນຢັນ</button>`);
  window._adminPwdCallback = onConfirm;
  setTimeout(()=>el('adminPwdInput')?.focus(),150);
}

function confirmAdminPwd(){
  const inp = el('adminPwdInput');
  const err = el('adminPwdErr');
  const btn = el('adminPwdBtn');
  if(!inp)return;
  if(btoa(inp.value) === ADMIN_PWD){
    closeModal();
    if(typeof window._adminPwdCallback==='function') window._adminPwdCallback();
    window._adminPwdCallback = null;
    inp.value = '';
  } else {
    if(err){err.style.display='block';}
    if(btn){btn.style.animation='none';setTimeout(()=>{btn.style.animation='';},50);}
    inp.value='';inp.focus();
  }
}

const BACKUP_KEY = 'ttp_backup_log';
function getBackupLog(){ try{return JSON.parse(localStorage.getItem(BACKUP_KEY)||'[]')}catch{return[]} }
function addBackupLog(entry){ const log=getBackupLog(); log.unshift({...entry,at:new Date().toISOString()}); localStorage.setItem(BACKUP_KEY,JSON.stringify(log.slice(0,50))); }

async function gasSend(payload){
  const url=DATA.settings.gasBackupUrl;
  if(!url){toast('ຍັງບໍ່ຕັ້ງ GAS URL — ໄປ ⚙️ ຕັ້ງຄ່າ','error');return null;}
  try{
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    return await res.json();
  }catch(e){toast('❌ GAS error: '+e.message,'error');return null;}
}

async function runManualBackup(label){
  label=label||'Manual_'+today();
  toast('☁️ ກຳລັງ Backup...','warning');
  const res=await gasSend({type:'backup',...buildBackupPayload(label)});
  if(res?.success){
    addBackupLog({label,type:'manual',records:DATA.attendance.length,status:'success'});
    toast('✅ Backup → Google Drive ສຳເລັດ ('+DATA.attendance.length+' records)');
    addAudit('GDrive Backup','backup','Backup "'+label+'" ສຳເລັດ');
    if(currentPage==='archive')el('content').innerHTML=pgArchive();
  }else{
    addBackupLog({label,type:'manual',status:'failed',error:res?.error||'unknown'});
    toast('❌ Backup ລົ້ມ — ກວດ GAS URL','error');
  }
}

async function runMonthlyArchive(){
  const prev=new Date();prev.setMonth(prev.getMonth()-1);
  const moStr=prev.getFullYear()+'-'+String(prev.getMonth()+1).padStart(2,'0');
  const label='Monthly_'+moStr;
  const log=getBackupLog();
  if(log.find(l=>l.label===label&&l.status==='success')){toast('✅ '+moStr+' Archive ສຳເລັດແລ້ວ');return;}
  const srcAtt=DATA.attendance.filter(a=>a.date.startsWith(moStr));
  if(!srcAtt.length){toast('ບໍ່ມີຂໍ້ມູນ '+moStr,'warning');return;}
  toast('☁️ Archive '+moStr+' ('+srcAtt.length+' records)...','warning');
  const res=await gasSend({type:'backup',...buildBackupPayload(label,moStr)});
  if(res?.success){
    addBackupLog({label,type:'monthly',month:moStr,records:srcAtt.length,status:'success'});
    toast('✅ Archive '+moStr+' → Drive ສຳເລັດ');
    addAudit('Monthly Archive','backup','Archive '+moStr+': '+srcAtt.length+' records');
    if(currentPage==='archive')el('content').innerHTML=pgArchive();
  }else{
    addBackupLog({label,type:'monthly',month:moStr,status:'failed'});
    toast('❌ Archive ລົ້ມ','error');
  }
}

async function gasTestBackup(){
  toast('🧪 Testing GAS...','warning');
  const res=await gasSend({type:'test',company:DATA.settings.companyName,ts:new Date().toISOString()});
  if(res?.success)toast('✅ GAS Connected! Drive ພ້ອມ');
  else toast('❌ ເຊື່ອມບໍ່ໄດ້ — ກວດ GAS URL','error');
}

function checkAutoBackup(){
  if(!DATA.settings.gasBackupUrl||DATA.currentUser?.role!=='admin')return;
  const log=getBackupLog();
  const now=new Date();
  // Weekly: Monday
  if(now.getDay()===1){
    const lastW=log.find(l=>l.type==='weekly'&&l.status==='success');
    const weekAgo=new Date();weekAgo.setDate(weekAgo.getDate()-7);
    if(!lastW||new Date(lastW.at)<weekAgo)
      setTimeout(()=>runManualBackup('Weekly_'+today()).then(()=>{const l=getBackupLog();if(l[0]?.status==='success')l[0].type='weekly';localStorage.setItem(BACKUP_KEY,JSON.stringify(l));addBackupLog({label:'Weekly_'+today(),type:'weekly',records:DATA.attendance.length,status:'success'});}).catch(()=>{}),5000);
  }
  // Monthly: day 1
  if(now.getDate()===1){
    const mo=now.getFullYear()+'-'+String(now.getMonth(),).padStart(2,'0');
    if(!log.find(l=>l.type==='monthly'&&l.month===mo&&l.status==='success'))
      setTimeout(()=>runMonthlyArchive(),8000);
  }
}

function saveNews(existId){
  const title=(el('ntitle').value||'').trim();
  const body=(el('nbody').value||'').trim();
  if(!title||!body){toast('ໃສ່ຫົວຂໍ້ + ເນື້ອຫາ','error');return}
  const targetVal=el('ntarget').value;
  let target=['all'];
  if(targetVal==='specific'){
    const sel=el('nempsel');
    target=sel?Array.from(sel.selectedOptions).map(o=>o.value):['all'];
    if(!target.length){toast('ເລືອກພະນັກງານ','error');return}
  }
  const obj={
    id:existId||uid2(),
    title,body,
    category:el('ncat').value,
    imageUrl:el('nimgurl').value.trim(),
    pinned:el('npin').checked,
    active:el('nactive').checked,
    target,
    expiresAt:el('nexp').value||'',
    authorId:DATA.currentUser.id,
    createdAt:existId?(DATA.news.find(n=>n.id===existId)?.createdAt||new Date().toISOString()):new Date().toISOString(),
    updatedAt:new Date().toISOString(),
    readBy:existId?(DATA.news.find(n=>n.id===existId)?.readBy||[]):[],
  };
  if(existId){
    const i=DATA.news.findIndex(n=>n.id===existId);
    if(i>=0)DATA.news[i]=obj;
  }else{
    DATA.news.unshift(obj);
    // Notify targets
    const targets=target.includes('all')
      ?DATA.users.filter(u=>u.role==='employee'&&u.active)
      :target.map(id=>getUserById(id)).filter(Boolean);
    targets.forEach(u=>addNotif(u.id,`📰 ຂ່າວໃໝ່: "${obj.title}"${obj.pinned?' 📌 ດ່ວນ':''}  — ກົດເພື່ອອ່ານ`,'news'));
  }
  lsSave('news');FB.saveArray('news',DATA.news);
  addAudit(existId?'ແກ້ໄຂຂ່າວ':'ສ້າງຂ່າວ','news',`"${title}" → ${target.includes('all')?'ທຸກຄົນ':target.length+' ຄົນ'}`);
  closeModal();toast(existId?'✅ ອັບເດດຂ່າວ':'✅ ສ້າງຂ່າວ + ແຈ້ງ '+targets.length+' ຄົນ'||'');
  el('content').innerHTML=pgNews();
  updateNewsBadge();
}

function deleteNews(id){
  if(!confirm('ລຶບຂ່າວນີ້?'))return;
  const i=DATA.news.findIndex(n=>n.id===id);
  const n=DATA.news[i];
  if(i>=0)DATA.news.splice(i,1);
  lsSave('news');FB.remove('news',id);
  addAudit('ລຶບຂ່າວ','news',`"${n?.title||'?'}"`);
  toast('🗑️ ລຶບຂ່າວ');
  el('content').innerHTML=pgNews();
  updateNewsBadge();
}

function payrollItemRow(item, idx, type){

  const locked = item.required;
  const col2Label = isEarn ? 'ຕ້ອງເສຍພາສີ' : 'Auto (Attendance)';
  const col2Key   = isEarn ? 'taxable' : 'auto';
  const col2Tip   = isEarn ? '✅=ເສຍພາສີ, ☐=ຍົກເວັ້ນ' : '✅=ລະບົບຄຳນວນເອງ';
  const bgColor   = item.fixed ? '#f1f8e9' : '#fff8e1';
  const fixedTag  = item.fixed
    ? '<span style="font-size:.67rem;background:#c8e6c9;color:#1b5e20;border-radius:4px;padding:1px 5px">ຄົງທີ່</span>'
    : '<span style="font-size:.67rem;background:#ffe0b2;color:#e65100;border-radius:4px;padding:1px 5px">ປ່ຽນໄດ້</span>';

  return `<div id="pi_${type}_${idx}" style="display:grid;grid-template-columns:2fr 80px 100px 90px 32px;gap:6px;align-items:center;padding:7px 8px;border-radius:6px;background:${bgColor};margin-bottom:4px;border:1px solid ${item.fixed?'#c8e6c9':'#ffe0b2'}">
    <div style="display:flex;align-items:center;gap:6px">
      ${fixedTag}
      <input value="${item.name}" id="piname_${type}_${idx}" style="border:none;background:transparent;flex:1;font-size:.83rem;${locked?'color:var(--t2)':''}" ${locked?'readonly':''} placeholder="ຊື່ລາຍການ">
    </div>
    <div style="text-align:center">
      <label class="tog" title="${col2Tip}">
        <input type="checkbox" id="pi${col2Key}_${type}_${idx}" ${item[col2Key]?'checked':''} ${locked?'disabled':''}>
        <span class="tsl"></span>
      </label>
    </div>
    <div style="text-align:center">
      <label class="tog" title="ຄົງທີ່=ຕັ້ງໃນ Profile, ບໍ່ຄົງທີ່=ໃສ່ Monthly">
        <input type="checkbox" id="pifixed_${type}_${idx}" ${item.fixed?'checked':''} ${locked?'disabled':''} onchange="refreshFixedTag(this, 'pi_${type}_${idx}', ${locked})">
        <span class="tsl"></span>
      </label>
    </div>
    <div style="text-align:center">
      <label class="tog">
        <input type="checkbox" id="piactive_${type}_${idx}" ${item.active!==false?'checked':''} ${locked?'disabled':''}>
        <span class="tsl"></span>

  </div>`;
}

function refreshFixedTag(cb, rowId, locked){
  if(locked) return;
  const row = el(rowId); if(!row) return;
  const isFixed = cb.checked;
  row.style.background  = isFixed ? '#f1f8e9' : '#fff8e1';
  row.style.borderColor = isFixed ? '#c8e6c9' : '#ffe0b2';
  const tag = row.querySelector('span[style*="border-radius:4px"]');
  if(tag){
    tag.textContent = isFixed ? 'ຄົງທີ່' : 'ປ່ຽນໄດ້';
    tag.style.background = isFixed ? '#c8e6c9' : '#ffe0b2';
    tag.style.color      = isFixed ? '#1b5e20' : '#e65100';
  }
}

function addPayrollItem(type){
  const cfg = getPayrollConfig();
  const newId = type[0]+'_custom_'+Date.now();
  const newItem = type==='earnings'
    ? {id:newId, name:'ລາຍຮັບໃໝ່', taxable:true, fixed:false, active:true, required:false}
    : {id:newId, name:'ລາຍຈ່າຍໃໝ່', auto:false,  fixed:false, active:true, required:false};
  cfg[type].push(newItem);
  DATA.settings.payrollConfig = cfg;
  lsSave('settings');
  el('content').innerHTML = pgPayrollItemManager();
  toast('➕ ເພີ່ມລາຍການ — ແກ້ຊື່ ແລ້ວ 💾 ບັນທຶກ');

function saveAllPayrollItems(){
  const cfg = getPayrollConfig();

  // Read earnings
  cfg.earnings.forEach((item, idx) => {
    const nameEl = el(`piname_earnings_${idx}`);
    if(nameEl && !item.required) item.name = nameEl.value.trim()||item.name;
    const taxEl  = el(`pitaxable_earnings_${idx}`);
    if(taxEl && !item.required) item.taxable = taxEl.checked;
    const fixEl  = el(`pifixed_earnings_${idx}`);
    if(fixEl && !item.required) item.fixed = fixEl.checked;
    const actEl  = el(`piactive_earnings_${idx}`);
    if(actEl && !item.required) item.active = actEl.checked;
  });

  // Read deductions
  cfg.deductions.forEach((item, idx) => {
    const nameEl = el(`piname_deductions_${idx}`);
    if(nameEl && !item.required) item.name = nameEl.value.trim()||item.name;
    const autoEl = el(`piauto_deductions_${idx}`);
    if(autoEl && !item.required) item.auto = autoEl.checked;
    const fixEl  = el(`pifixed_deductions_${idx}`);
    if(fixEl && !item.required) item.fixed = fixEl.checked;
    const actEl  = el(`piactive_deductions_${idx}`);
    if(actEl && !item.required) item.active = actEl.checked;
  });

  DATA.settings.payrollConfig = cfg;
  lsSave('settings');
  addAudit('ຕັ້ງຄ່າ Payroll','settings','ອັບເດດລາຍຮັບ/ລາຍຈ່າຍ');

  // Return to step 2 if wizard was active, else step 1
  if(_pw.selectedEmpIds.length > 0) _pw.step = 2;
  navigate('salary');
}

function livePay(){
  const cfg=getPayrollConfig();
  let earn=0,taxable=0,manDed=0;
  cfg.earnings.forEach(i=>{const v=parseFloat(el('pe_'+i.id)?.value||0);earn+=v;if(i.taxable)taxable+=v;});
  cfg.deductions.forEach(i=>{manDed+=parseFloat(el('pe_'+i.id)?.value||0);});
  const ssoBase=parseFloat(el('pe_ssobase')?.value||1600000);
  const sso=calcSSO(ssoBase);const tax=calcLaoTax(taxable);
  const ded=sso.employee+tax+manDed;const net=earn-ded;
  if(el('live_sso'))el('live_sso').textContent=fmtMoney(sso.employee);
  if(el('live_tax'))el('live_tax').textContent=fmtMoney(tax);
  if(el('live_earn'))el('live_earn').textContent=fmtMoney(earn);
  if(el('live_taxable'))el('live_taxable').textContent=fmtMoney(taxable);
  if(el('live_ded'))el('live_ded').textContent=fmtMoney(ded);
  if(el('live_net'))el('live_net').textContent=fmtMoney(net);
}

function submitFullPayroll(){
  const empId=el('pe_emp')?.value,month=el('pe_month')?.value;
  const ssoBase=parseFloat(el('pe_ssobase')?.value||1600000);
  if(!empId||!month){toast('ເລືອກພະນັກງານ + ເດືອນ','error');return;}
  const cfg=getPayrollConfig();const vals={};
  cfg.earnings.forEach(i=>{vals[i.id]=parseFloat(el('pe_'+i.id)?.value||0);});
  cfg.deductions.forEach(i=>{vals[i.id]=parseFloat(el('pe_'+i.id)?.value||0);});
  const result=calcPayroll(empId,month,vals,ssoBase);
  const salId=el('pe_salid')?.value;
  const rec=buildSalaryRecord(result,vals);
  if(salId){const idx=DATA.salary.findIndex(s=>s.id===salId);if(idx>=0){DATA.salary[idx]={...rec,id:salId};}}
  else DATA.salary.push(rec);
  lsSave('salary');FB.saveArray('salary',DATA.salary);
  addAudit('ເງິນເດືອນ','salary',`${month} ${getUserById(empId)?.name}: ${fmtMoney(result.netSalary)}`);
  closeModal();toast('✅ '+fmtMoney(result.netSalary));el('content').innerHTML=pgSalary();
}

function buildSalaryRecord(result,vals){
  const{empId,month,totalEarnings,taxableEarnings,sso,tax,totalDeductions,netSalary,earnDetail,dedDetail,ssoBase}=result;
  return{id:uid2(),empId,month,ssoBase,baseSalary:earnDetail.e_base||0,
    otPay:(earnDetail.e_ot||0)+(earnDetail.e_site_ot||0),bonus:earnDetail.e_bonus||0,
    deduction:totalDeductions,total:netSalary,paid:false,approvedBy:'',approvedAt:'',
    earnings:earnDetail,deductions:{...dedDetail,d_sso:sso.employee,d_tax:tax},
    totalEarnings,taxableEarnings,nonTaxableEarnings:totalEarnings-taxableEarnings,
    ssoEmployee:sso.employee,ssoCompany:sso.company,tax,createdAt:new Date().toISOString()};
}

function bulkCreatePayroll(month){
  if(!confirm('ສ້າງ Auto ທຸກຄົນ? (ຕ້ອງແກ້ໄຂ ແລ້ວ Approve ທີຫຼັງ)'))return;
  const emps=DATA.users.filter(u=>u.role==='employee'&&u.active);
  const existing=DATA.salary.filter(s=>s.month===month).map(s=>s.empId);
  let added=0;
  emps.forEach(emp=>{
    if(existing.includes(emp.id))return;
    DATA.salary.push(buildSalaryRecord(calcPayroll(emp.id,month,{e_base:emp.baseSalary||0},emp.ssoBase||1600000),{}));
    added++;
  });
  if(added){lsSave('salary');FB.saveArray('salary',DATA.salary);}
  toast('✅ ສ້າງ '+added+' ຄົນ');el('content').innerHTML=pgSalary();
}

function exportSalaryFull(){
  const mo=window._salMo||(new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0'));
  const cfg=getPayrollConfig();
  const rows=DATA.salary.filter(s=>s.month===mo).map(r=>{
    const emp=getUserById(r.empId)||{name:'?',empId:'?',dept:'?'};
    const obj={ລະຫັດ:emp.empId,ຊື່:emp.name,ພະແນກ:emp.dept,ເດືອນ:r.month};
    cfg.earnings.forEach(i=>{obj[i.name]=r.earnings?.[i.id]||0;});
    obj['ລວມລາຍຮັບ']=r.totalEarnings||0;obj['ຕ້ອງເສຍພາສີ']=r.taxableEarnings||0;
    obj['ຍົກເວັ້ນພາສີ']=r.nonTaxableEarnings||0;
    obj['ປະກັນ(5.5%)']=r.ssoEmployee||0;obj['ປະກັນບໍລິສັດ(6%)']=r.ssoCompany||0;obj['ພາສີ']=r.tax||0;
    cfg.deductions.forEach(i=>{obj[i.name]=r.deductions?.[i.id]||0;});
    obj['ລວມຫັກ']=r.deduction||0;obj['ສຸດທິ']=r.total||0;
    obj['Status']=r.paid?'Approved':'Pending';obj['Approved By']=r.approvedBy||'';
    return obj;
  });
  if(typeof XLSX==='undefined'){toast('ກຳລັງໂຫຼດ','warning');return;}
  const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Salary '+mo);
  XLSX.writeFile(wb,'salary_'+mo+'.xlsx');
  toast('📥 Export '+rows.length+' ຄົນ');
}

// ── 3. SSO REPORT (ຮູບແບບຕົ້ນສະບັບ) ────────────────────────
function downloadSSOReport(month){
  if(typeof XLSX==='undefined'){toast('ກຳລັງໂຫຼດ','warning');return;}
  const rows = DATA.salary.filter(s=>s.month===month);
  if(!rows.length){toast('ບໍ່ມີຂໍ້ມູນ','warning');return;}
  const wb = XLSX.utils.book_new();

  const header0 = ['ປະກັນສັງຄົມ'];
  const header1 = ['ປະຈຳເດືອນ '+month];
  const header2 = [];
  const header3 = ['ລ/ດ','ລະຫັດພະນັກງານ','ຊື່ແລະນາມສະກຸນ','ເງິນພື້ນຖານ','ພ/ງສົມທົບ 5.5%','ບໍລິສັດ 6%'];

  const dataRows = rows.map((r,idx)=>{
    const emp = getUserById(r.empId)||{name:'?',empId:'?'};
    const base = r.ssoBase||1600000;
    return [idx+1, emp.empId, emp.name, base, r.ssoEmployee||Math.round(base*0.055), r.ssoCompany||Math.round(base*0.06)];
  });

  const totRow = ['','','ລວມ',
    dataRows.reduce((s,r)=>s+(r[3]||0),0),
    dataRows.reduce((s,r)=>s+(r[4]||0),0),
    dataRows.reduce((s,r)=>s+(r[5]||0),0),
  ];

  const wsData = [header0,header1,header2,header3,...dataRows,totRow];
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols']=[{wch:5},{wch:12},{wch:26},{wch:14},{wch:14},{wch:14}];

  XLSX.utils.book_append_sheet(wb, ws, 'SSO '+month);
  XLSX.writeFile(wb, 'SSO_'+month+'.xlsx');
  toast('📥 SSO Report '+month+' downloaded');
}

  cfg.earnings.filter(i=>i.fixed&&i.active!==false).forEach(i=>{
    const v=parseFloat(el('uf_'+i.id)?.value||0);
    out[i.id]=v; // store even 0 to preserve
  });
  return out;
}

  const cfg=getPayrollConfig();

    const v=parseFloat(el('uf_'+i.id)?.value||0);
    out[i.id]=v;
  });
  return out;
}

// ── Pre-fill when employee changes ──────────────────────────
function prefillFromEmployee(){
  const empId = el('pe_emp')?.value;
  const month = el('pe_month')?.value;
  const emp = getUserById(empId);
  if(!emp) return;
  const cfg = getPayrollConfig();

  // Fill fixed items from profile
  cfg.earnings.filter(i=>i.fixed).forEach(i=>{
    const inp = el('pe_'+i.id);
    if(inp && emp.fixedEarnings?.[i.id] !== undefined)
      inp.value = emp.fixedEarnings[i.id];
  });
  // Fill fixed deductions
  ['d_fund','d_water','d_elec','d_room'].forEach(k=>{
    const inp = el('pe_'+k);
    if(inp && emp.fixedDeductions?.[k]) inp.value = emp.fixedDeductions[k];
  });
  // Fill SSO base
  const ssoInp = el('pe_ssobase');
  if(ssoInp && emp.ssoBase) ssoInp.value = emp.ssoBase;

  // Update attendance banner
  const att = DATA.attendance.filter(a=>a.empId===empId&&a.date.startsWith(month));
  const worked = att.filter(a=>a.checkIn).length;
  const late = att.filter(a=>a.status==='late').length;
  const absent = att.filter(a=>a.status==='absent').length;
  const ot = DATA.ots.filter(o=>o.empId===empId&&o.date.startsWith(month)&&o.status==='approved').reduce((s,o)=>s+parseFloat(o.hours||0),0);
  const banner = el('attSummaryBanner');
  if(banner) banner.innerHTML = `📋 <b>${month}</b>: ມາ <b>${worked}</b> ວັນ · ມາຊ້າ <b style="color:#e65100">${late}</b> · ຂາດ <b style="color:#c62828">${absent}</b> · OT <b style="color:#7b1fa2">${ot}</b> ຊ.ມ.`;

  livePay();
}

// ── Override livePay to show sso base label ──────────────────
const _oldLivePay = livePay;
livePay = function(){
  _oldLivePay();
  const ssoBase = parseFloat(el('pe_ssobase')?.value||1600000);
  const lbl = el('live_ssobase_lbl');
  if(lbl) lbl.textContent = ssoBase.toLocaleString('lo-LA');
  // Update non-taxable display
  const cfg = getPayrollConfig();
  let earn=0, taxable=0;
  cfg.earnings.forEach(i=>{const v=parseFloat(el('pe_'+i.id)?.value||0);earn+=v;if(i.taxable)taxable+=v;});
  const nonTax = earn-taxable;
  const nt = el('live_nontax');
  if(nt) nt.textContent = nonTax.toLocaleString('lo-LA')+' ₭';
};

// ── Calculate OT Fixed from Attendance (Location-based) ──────
function calcOTFixed(empId, month, baseSalary, siteId){
  // Get site OT config
  const site = getSiteById(siteId || getUserById(empId)?.siteId);
  if(!site || !site.otFixedHours || site.otFixedHours <= 0) return 0;

  const otHoursPerDay = parseFloat(site.otFixedHours || 0);
  const otRate = parseFloat(site.otFixedRate || 1.5);

  // Get days actually checked in during this month
  const att = DATA.attendance.filter(a =>
    a.empId === empId &&
    a.date.startsWith(month) &&
    a.checkIn && // must have checked in
    a.status !== 'absent'
  );

  // Exclude approved leave days
  const leaves = DATA.leaves.filter(l =>
    l.empId === empId &&
    l.status === 'approved' &&
    l.startDate.slice(0,7) <= month &&
    l.endDate.slice(0,7) >= month
  );
  const leaveDates = new Set();
  leaves.forEach(l => {
    let d = new Date(l.startDate);
    const end = new Date(l.endDate);
    while(d <= end) {
      leaveDates.add(d.toISOString().split('T')[0]);
      d.setDate(d.getDate() + 1);
    }
  });

  // Exclude holidays
  const holidayDates = new Set((DATA.holidays || []).map(h => h.date));

  // Count valid OT days = checked in + not on leave + not holiday
  const validDays = att.filter(a =>
    !leaveDates.has(a.date) &&
    !holidayDates.has(a.date)
  ).length;

  if(!validDays || !baseSalary) return 0;

  // OT Pay = (base ÷ 26 ÷ 8) × otHoursPerDay × otRate × validDays
  const hourlyRate = baseSalary / 26 / 8;
  const otPay = Math.round(hourlyRate * otHoursPerDay * otRate * validDays);
  return otPay;
}

// ── OT Fixed Preview in Payroll Modal ───────────────────────
function previewOTFixed(){
  const empId = el('pe_emp')?.value;
  const month = el('pe_month')?.value;
  const base  = parseFloat(el('pe_e_base')?.value || 0);
  if(!empId || !month || !base) return;

  const emp = getUserById(empId);
  const site = getSiteById(emp?.siteId);
  if(!site || !site.otFixedHours) {
    toast('Location ນີ້ ບໍ່ມີ OT Fixed','warning');
    return;
  }

  const otPay = calcOTFixed(empId, month, base, emp.siteId);
  const att = DATA.attendance.filter(a => a.empId===empId && a.date.startsWith(month) && a.checkIn && a.status!=='absent');

  // Show breakdown
  const inp = el('pe_e_site_ot');
  if(inp) inp.value = otPay;
  livePay();

  toast(`✅ OT Fixed: ${att.length} ວັນ × ${site.otFixedHours}ຊ × ${site.otFixedRate}x = ${otPay.toLocaleString('lo-LA')} ₭`);
}

function importUsersExcel(input){
  if(!input.files[0]) return;
  if(typeof XLSX==='undefined'){toast('ກຳລັງໂຫຼດ XLSX','warning');return;}
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if(!rows.length){ toast('ບໍ່ພົບຂໍ້ມູນ','error'); return; }
      processImportPreview(rows);
    } catch(err) {
      toast('ອ່ານໄຟລ໌ຜິດພາດ: '+err.message, 'error');
    }
    input.value = ''; // reset
  };
  reader.readAsArrayBuffer(input.files[0]);
}

function processImportPreview(rows){
  const results = { ok:[], dup_id:[], dup_user:[], missing:[], rows:[] };
  const existingIds = new Set(DATA.users.map(u=>u.empId.toUpperCase()));
  const existingUsers = new Set(DATA.users.map(u=>u.username.toLowerCase()));
  const seenIds = new Set(); // within this import
  const seenUsers = new Set();

  rows.forEach((row, idx) => {
    const empId   = String(row['EmpID*']||row['EmpID']||'').trim().toUpperCase();
    const name    = String(row['ຊື່ລາວ*']||row['ຊື່ລາວ']||'').trim();
    const username= String(row['Username*']||row['Username']||'').trim().toLowerCase();
    const pass    = String(row['Password*']||row['Password']||'').trim();
    const role    = (row['Role(admin/supervisor/employee)']||row['Role']||'employee').trim();

    const r = {
      _row: idx+2, // Excel row number
      empId, name, nameEn: String(row['ຊື່ອັງກິດ']||'').trim(),
      username, password: pass,
      role: ['admin','supervisor','employee'].includes(role)?role:'employee',
      dept: String(row['ພະແນກ']||'').trim(),
      position: String(row['ຕຳແໜ່ງ']||'').trim(),
      empType: String(row['ປະເພດ(monthly/daily/parttime)']||row['ປະເພດ']||'monthly').trim(),
      shiftId: findShiftByCode(String(row['ກະ(ລະຫັດ)']||row['ກະ']||'')),
      siteId:  findSiteByCode(String(row['ສາຂາ(ລະຫັດ)']||row['ສາຂາ']||'')),
      phone:   String(row['ໂທລະສັບ']||'').trim(),
      email:   String(row['Email']||'').trim(),
      ssoBase: parseFloat(row['SSO_Base']||1600000)||1600000,
      fixedEarnings: {e_base: parseFloat(row['ເງິນເດືອນ_Base']||0)||0},
      _errors: [], _warns: [],
    };

    // Parse fixed salary from template columns
    const cfg2 = getPayrollConfig();
    const fixedEarnings = {};
    cfg2.earnings.filter(i=>i.fixed&&i.active!==false).forEach(i=>{
      const key = '[ລາຍຮັບ]'+i.name;
      const v = parseFloat(row[key]||row[i.name]||0);
      fixedEarnings[i.id] = isNaN(v)?0:v;
    });
    const fixedDeductions = {};
    cfg2.deductions.filter(i=>i.fixed&&i.active!==false).forEach(i=>{
      const key = '[ລາຍຫັກ]'+i.name;
      const v = parseFloat(row[key]||row[i.name]||0);
      fixedDeductions[i.id] = isNaN(v)?0:v;
    });
    r.fixedEarnings = fixedEarnings;
    r.fixedDeductions = fixedDeductions;
    r.ssoBase = parseFloat(row['[ເງິນເດືອນ]SSO_Base']||row['SSO_Base']||1600000)||1600000;

    // Validate required fields
    if(!empId)    r._errors.push('ບໍ່ມີ EmpID');
    if(!name)     r._errors.push('ບໍ່ມີຊື່');
    if(!username) r._errors.push('ບໍ່ມີ Username');
    if(!pass && !existingIds.has(empId)) r._errors.push('ບໍ່ມີ Password (ໃໝ່ຕ້ອງມີ)');

    // Check duplicates vs existing DB
    if(empId && existingIds.has(empId)) r._errors.push(`EmpID "${empId}" ມີຢູ່ແລ້ວໃນລະບົບ`);
    if(username && existingUsers.has(username)) r._errors.push(`Username "${username}" ມີຢູ່ແລ້ວໃນລະບົບ`);

    // Check duplicates within this import file
    if(empId && seenIds.has(empId)) r._errors.push(`EmpID "${empId}" ຊ້ຳກັນໃນໄຟລ໌`);
    if(username && seenUsers.has(username)) r._errors.push(`Username "${username}" ຊ້ຳກັນໃນໄຟລ໌`);

    if(empId) seenIds.add(empId);
    if(username) seenUsers.add(username);

    results.rows.push(r);
    if(r._errors.length) results.dup_id.push(r);
    else results.ok.push(r);
  });

  showImportPreview(results);
}

function findShiftByCode(code){
  if(!code) return DATA.shifts[0]?.id||'';
  const s = DATA.shifts.find(x=>(x.code||'').toUpperCase()===code.toUpperCase()||(x.id||'').toUpperCase()===code.toUpperCase());
  return s?.id || DATA.shifts[0]?.id || '';
}

function findSiteByCode(code){
  if(!code) return DATA.sites[0]?.id||'';
  const s = DATA.sites.find(x=>(x.code||'').toUpperCase()===code.toUpperCase()||(x.id||'').toUpperCase()===code.toUpperCase());
  return s?.id || DATA.sites[0]?.id || '';
}

function confirmImport(){
  try {
    const raw = el('importDataJson')?.value;
    if(!raw){ toast('ຂໍ້ມູນຫາຍ','error'); return; }
    const users = JSON.parse(raw.replace(/&#39;/g,"'"));
    let added = 0;
    users.forEach(r => {
      const existIdx = DATA.users.findIndex(u=>u.empId===r.empId);
      if(existIdx>=0){
        // Update existing employee's salary data (keep password if blank)
        const ex = DATA.users[existIdx];
        DATA.users[existIdx] = {...ex,
          name:r.name, nameEn:r.nameEn||ex.nameEn||'',
          role:r.role, dept:r.dept, position:r.position,
          empType:r.empType||'monthly',
          shiftId:r.shiftId||ex.shiftId, siteId:r.siteId||ex.siteId,
          phone:r.phone||ex.phone, email:r.email||ex.email,
          active: r.active !== false,
          ssoBase:r.ssoBase||ex.ssoBase||1600000,
          fixedEarnings:{...ex.fixedEarnings,...r.fixedEarnings},
          fixedDeductions:{...ex.fixedDeductions,...r.fixedDeductions},
          ...(r.password?{password:r.password}:{}),
        };
      } else {
        const newUser = {
          id: uid(), empId: r.empId, name: r.name, nameEn: r.nameEn||'',
          username: r.username, password: r.password||'1234',
          role: r.role, dept: r.dept, position: r.position,
          empType: r.empType||'monthly',
          shiftId: r.shiftId, siteId: r.siteId,
          phone: r.phone, email: r.email, lineId: '',
          approverId: '', active: r.active!==false,
          ssoBase: r.ssoBase||1600000,
          fixedEarnings: r.fixedEarnings||{},
          fixedDeductions: r.fixedDeductions||{},
        };
        DATA.users.push(newUser);
      }
      added++;
    });
    lsSave('users');
    FB.saveArray('users', DATA.users);
    addAudit('Import', 'users', `Bulk import ${added} employees`);
    closeModal();
    toast('✅ ນຳເຂົ້າ '+added+' ຄົນ ສຳເລັດ');
    el('content').innerHTML = pgUsers();
  } catch(e) {
    toast('ຜິດພາດ: '+e.message, 'error');
  }
}

// ── 1. Download Salary Template ──────────────────────────────
function exportSalaryTemplate(){
  if(typeof XLSX==='undefined'){toast('ກຳລັງໂຫຼດ','warning');return;}
  const mo = window._salMo||(new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0'));
  const cfg = getPayrollConfig();
  const wb = XLSX.utils.book_new();

  // ── Header row: fixed columns + dynamic earning/deduction items ──
  const fixedHeaders = ['EmpID*','ຊື່ພະນັກງານ','ເດືອນ*','SSO_Base'];
  const earnHeaders  = cfg.earnings.filter(i=>i.active!==false).map(i=>i.name+'('+i.id+')');
  const dedHeaders   = cfg.deductions.filter(i=>i.active!==false).map(i=>i.name+'('+i.id+')');
  const calcHeaders  = ['[AUTO]SSO_Employee','[AUTO]Tax','[AUTO]TotalEarnings','[AUTO]TotalDeductions','[AUTO]NetSalary'];
  const allHeaders   = [...fixedHeaders, ...earnHeaders, ...dedHeaders, ...calcHeaders];

  // ── Note row ──
  const noteRow = [
    'ໃສ່ EmpID ຂອງພະນັກງານ','ຂໍ້ມູນດຶງ Auto','YYYY-MM','ພື້ນຖານ SSO',
    ...cfg.earnings.filter(i=>i.active!==false).map(i=>`${i.fixed?'🟢Fixed':'🟡Variable'} ${i.taxable?'เสียภาษี':'ยกเว้น'}`),
    ...cfg.deductions.filter(i=>i.active!==false).map(i=>i.auto?'🤖Auto':'Manual'),
    'ລະບົບຄຳນວນເອງ','ລະບົບຄຳນວນເອງ','ລະບົບຄຳນວນເອງ','ລະບົບຄຳນວນເອງ','ລະບົບຄຳນວນເອງ',
  ];

  // ── Sample rows: one per active employee ──
  const emps = DATA.users.filter(u=>u.role==='employee'&&u.active);
  const sampleRows = emps.map(emp => {
    const existSal = DATA.salary.find(s=>s.empId===emp.id&&s.month===mo);
    const row = [emp.empId, emp.name, mo, emp.ssoBase||1600000];
    cfg.earnings.filter(i=>i.active!==false).forEach(i=>{
      row.push(existSal?.earnings?.[i.id] ?? emp.fixedEarnings?.[i.id] ?? 0);
    });
    cfg.deductions.filter(i=>i.active!==false).forEach(i=>{
      row.push(existSal?.deductions?.[i.id] ?? emp.fixedDeductions?.[i.id] ?? 0);
    });
    row.push('','','','',''); // auto cols
    return row;
  });

  const wsData = [allHeaders, noteRow, ...sampleRows];
  const ws = XLSX.utils.aoa_to_sheet(wsData);

  // Style: wide columns
  ws['!cols'] = allHeaders.map(()=>({wch:16}));
  ws['!cols'][0] = {wch:12};
  ws['!cols'][1] = {wch:22};

  // Sheet 2: Payroll Config reference
  const cfgRows = [
    ['=== ລາຍຮັບ (Earnings) ==='],
    ['ID','ຊື່','ເສຍພາສີ','ຄົງທີ່/ເຄື່ອນໄຫວ'],
    ...cfg.earnings.filter(i=>i.active!==false).map(i=>[i.id, i.name, i.taxable?'ເສຍ':'ຍົກເວັ້ນ', i.fixed?'🟢 ຄົງທີ່':'🟡 ເຄື່ອນໄຫວ']),
    [],
    ['=== ລາຍຈ່າຍ (Deductions) ==='],
    ['ID','ຊື່','Auto/Manual'],
    ...cfg.deductions.filter(i=>i.active!==false).map(i=>[i.id, i.name, i.auto?'🤖 Auto':'Manual']),
    [],
    ['=== ຫມາຍເຫດ ==='],
    ['- ຖັນ [AUTO] ລະບົບຄຳນວນເອງ ບໍ່ຕ້ອງໃສ່'],
    ['- ຖ້າ EmpID ຊ້ຳ = ອັບເດດ (overwrite)'],
    ['- SSO = Base × 5.5%, ພາສີ progressive 0-25%'],
  ];
  const ws2 = XLSX.utils.aoa_to_sheet(cfgRows);
  ws2['!cols'] = [{wch:18},{wch:26},{wch:14},{wch:18}];

  XLSX.utils.book_append_sheet(wb, ws, 'Salary '+mo);
  XLSX.utils.book_append_sheet(wb, ws2, 'Config Reference');
  XLSX.writeFile(wb, 'Salary_Template_'+mo+'.xlsx');
  toast('📥 Template ເດືອນ '+mo+' — '+emps.length+' ຄົນ');
}

// ── 2. Import Salary Excel ───────────────────────────────────
function importSalaryExcel(input){
  if(!input.files[0]) return;
  if(typeof XLSX==='undefined'){toast('ກຳລັງໂຫຼດ XLSX','warning');return;}
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:0});
      if(!rows.length){ toast('ບໍ່ພົບຂໍ້ມູນ','error'); return; }
      processSalaryImportPreview(rows);
    } catch(err) {
      toast('ອ່ານໄຟລ໌ຜິດ: '+err.message,'error');
    }
    input.value = '';
  };
  reader.readAsArrayBuffer(input.files[0]);
}

function processSalaryImportPreview(rows){
  const cfg = getPayrollConfig();
  const results = {ok:[], errors:[]};

  rows.forEach((row, idx) => {
    const empId = String(row['EmpID*']||row['EmpID']||'').trim().toUpperCase();
    const month = String(row['ເດືອນ*']||row['ເດືອນ']||'').trim();
    const ssoBase = parseFloat(row['SSO_Base']||1600000)||1600000;

    if(!empId||!month){ results.errors.push({_row:idx+2, empId, month, error:'ບໍ່ມີ EmpID ຫຼື ເດືອນ'}); return; }

    const emp = DATA.users.find(u=>u.empId===empId);
    if(!emp){ results.errors.push({_row:idx+2, empId, month, error:`ບໍ່ພົບ EmpID "${empId}"`}); return; }

    // Parse earnings
    const earnings = {};
    cfg.earnings.filter(i=>i.active!==false).forEach(i=>{
      const key = i.name+'('+i.id+')';
      const val = parseFloat(row[key]||row[i.name]||0);
      earnings[i.id] = isNaN(val)?0:val;
    });

    // Parse deductions (manual only)
    const deductions = {};
    cfg.deductions.filter(i=>i.active!==false&&!i.auto).forEach(i=>{
      const key = i.name+'('+i.id+')';
      const val = parseFloat(row[key]||row[i.name]||0);
      deductions[i.id] = isNaN(val)?0:val;
    });

    // Calculate auto fields
    const result = calcPayroll(emp.id, month, {...earnings,...deductions}, ssoBase);
    const isDuplicate = DATA.salary.some(s=>s.empId===emp.id&&s.month===month);

    results.ok.push({
      _row: idx+2, empId, name: emp.name, month, ssoBase,
      earnings, deductions, result, isDuplicate,
      empDbId: emp.id,
    });
  });

  showSalaryImportPreview(results);
}

function confirmSalaryImport(){
  try {
    const raw = el('salImportJson')?.value;
    if(!raw){ toast('ຂໍ້ມູນຫາຍ','error'); return; }
    const items = JSON.parse(raw.replace(/&#39;/g,"'"));
    let added=0, updated=0;

    items.forEach(r => {
      const rec = buildSalaryRecord(r.result, {...r.earnings,...r.deductions});
      rec.empId = r.empDbId;
      const idx = DATA.salary.findIndex(s=>s.empId===r.empDbId&&s.month===r.month);
      if(idx>=0){ DATA.salary[idx] = {...rec, id:DATA.salary[idx].id}; updated++; }
      else { DATA.salary.push(rec); added++; }
    });

    lsSave('salary');
    FB.saveArray('salary', DATA.salary);
    addAudit('Import Salary','salary',`Import ${added} new, ${updated} updated`);
    closeModal();
    toast(`✅ ສ້າງໃໝ່ ${added} · Update ${updated} ລາຍການ`);
    el('content').innerHTML = pgSalary();
  } catch(e){
    toast('ຜິດພາດ: '+e.message,'error');
  }
}

function pwToggleEmp(id, checked){

  const row = el('erow_'+id);
