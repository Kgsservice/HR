<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TimeTrack">
<meta name="theme-color" content="#1a237e">
<meta name="description" content="ລະບົບຈັດການເວລາ & ພະນັກງານ KGS">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>TimeTrack by KGS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<!-- Firebase SDK (compat v9) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
.cy{background:#fffde7;color:#f57f17}
.btn-navy{background:var(--navy);color:#fff}
</style>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --sw:220px;
  --navy:#1a237e;--navy2:#283593;--navy3:#3949ab;
  --green:#43a047;--green2:#e8f5e9;
  --blue:#1976d2;--blue2:#e3f2fd;
  --orange:#f57c00;--orange2:#fff3e0;
  --purple:#7b1fa2;--purple2:#f3e5f5;
  --red:#e53935;--red2:#ffebee;
  --teal:#00897b;--teal2:#e0f2f1;
  --bg:#f5f7fa;--sur:#fff;
  --bdr:#e0e0e0;--bdr2:#f5f5f5;
  --t1:#212121;--t2:#616161;--t3:#9e9e9e;
  --sh:0 2px 8px rgba(0,0,0,.07);
  --sh2:0 4px 20px rgba(0,0,0,.12);
  --r:8px;--r2:12px;
}
body{font-family:'Segoe UI',Tahoma,'Noto Sans Lao',sans-serif;background:var(--bg);color:var(--t1)}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:inherit;outline:none;border:1px solid var(--bdr);background:#fff;color:var(--t1);padding:9px 12px;border-radius:var(--r);font-size:.9rem;width:100%;box-sizing:border-box;transition:.2s}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(25,118,210,.08)}
textarea{resize:vertical;min-height:72px}
label{display:block;font-size:.82rem;font-weight:600;color:var(--t2);margin-bottom:4px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:10px}
.hide{display:none!important}

/* ===== LOGIN ===== */
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d1b6e 0%,#1a237e 40%,#0288d1 100%);padding:20px}
.lbox{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,.22)}
.lbrand{text-align:center;margin-bottom:28px}
.lbrand-icon{width:70px;height:70px;background:linear-gradient(135deg,var(--navy),var(--navy3));border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:30px;box-shadow:0 8px 20px rgba(26,35,126,.3)}
.lbrand h1{font-size:1.2rem;font-weight:700}
.lbrand p{font-size:.8rem;color:var(--t2);margin-top:3px}
.lfg{margin-bottom:14px}
.lfg .iw{position:relative}
.lfg .iw span{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
.lfg input{padding-left:38px;height:46px;border:1.5px solid var(--bdr)}
.lfg input:focus{border-color:var(--blue)}
.lbtn{width:100%;height:48px;background:linear-gradient(135deg,var(--navy),var(--navy3));color:#fff;border-radius:var(--r);font-size:.95rem;font-weight:700;letter-spacing:.3px;margin-top:8px;transition:.2s;box-shadow:0 4px 15px rgba(26,35,126,.3)}
.lbtn:hover{opacity:.93}.lbtn:active{transform:scale(.98)}
.lerr{background:#ffebee;border:1px solid #ffcdd2;color:#c62828;padding:10px 14px;border-radius:var(--r);font-size:.83rem;margin-top:10px;display:none}
.lerr.show{display:block}
.ldemo{text-align:center;margin-top:14px;font-size:.76rem;color:var(--t3);line-height:1.9;background:#f8f9fa;border-radius:var(--r);padding:10px}
.ldemo b{color:var(--t2)}

/* ===== APP SHELL ===== */
#app{display:none;height:100vh;overflow:hidden}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sw);background:var(--navy);color:#fff;display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.sb-brand{padding:0 16px;height:64px;display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.18);border-bottom:1px solid rgba(255,255,255,.09);flex-shrink:0}
.sb-brand .bl{width:34px;height:34px;background:rgba(255,255,255,.2);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.sb-brand .bt h2{font-size:.82rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-brand .bt p{font-size:.66rem;opacity:.6;margin-top:1px}
.sb-nav{flex:1;overflow-y:auto;padding:8px;scrollbar-width:none}
.sb-nav::-webkit-scrollbar{display:none}
.nav-sec{font-size:.63rem;font-weight:700;color:rgba(255,255,255,.38);letter-spacing:.8px;text-transform:uppercase;padding:10px 8px 4px;margin-top:2px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r);font-size:.84rem;font-weight:500;color:rgba(255,255,255,.72);cursor:pointer;transition:.15s;margin-bottom:1px;white-space:nowrap}
.ni:hover{background:rgba(255,255,255,.1);color:#fff}
.ni.on{background:#fff;color:var(--navy);font-weight:700}
.ni .ic{font-size:16px;width:18px;text-align:center;flex-shrink:0}
.ni .nb{background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-size:.67rem;font-weight:700;margin-left:auto}
.sb-bot{padding:8px;border-top:1px solid rgba(255,255,255,.09);flex-shrink:0}
.ni-out{color:#ff8a80!important;background:rgba(255,100,100,.08)!important}
.ni-out:hover{background:rgba(255,100,100,.18)!important}

/* ===== TOPBAR ===== */
.topbar{position:fixed;top:0;left:var(--sw);right:0;height:64px;background:#fff;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:99;box-shadow:var(--sh)}
.tb-l h2{font-size:1rem;font-weight:700}
.tb-l p{font-size:.75rem;color:var(--t2);margin-top:1px}
.tb-r{display:flex;align-items:center;gap:10px}
.online-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.tb-onl{display:flex;align-items:center;gap:5px;font-size:.76rem;color:var(--green);font-weight:500}
.tb-ref{width:32px;height:32px;background:var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:.95rem;border:1px solid var(--bdr);transition:.2s}
.tb-ref:hover{background:var(--bdr)}
.tb-user{display:flex;align-items:center;gap:8px;cursor:pointer}
.tb-ava{width:34px;height:34px;background:linear-gradient(135deg,var(--navy),var(--navy3));border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.88rem;flex-shrink:0}
.tb-uname{font-size:.84rem;font-weight:600;line-height:1.2}
.tb-urole{font-size:.72rem;color:var(--t2)}
.hamburger{display:none;width:32px;height:32px;align-items:center;justify-content:center;cursor:pointer;border-radius:var(--r);background:var(--bg);font-size:1.1rem;border:1px solid var(--bdr)}

/* ===== CONTENT ===== */
.content{margin-left:var(--sw);margin-top:64px;padding:20px;min-height:calc(100vh - 64px);overflow-y:auto;max-height:calc(100vh - 64px)}

/* ===== CARDS ===== */
.card{background:#fff;border-radius:var(--r2);box-shadow:var(--sh);padding:18px;margin-bottom:16px}
.card-t{font-size:.76rem;font-weight:700;color:var(--t2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bdr2);display:flex;align-items:center;gap:7px}

/* STAT CARDS */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:14px;margin-bottom:20px}
.sc{background:#fff;border-radius:var(--r2);box-shadow:var(--sh);padding:16px}
.sc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sc-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.sc-badge{font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:20px}
.sc-num{font-size:1.75rem;font-weight:700;line-height:1;margin-bottom:3px}
.sc-lbl{font-size:.77rem;color:var(--t2)}
.sc-sub{font-size:.72rem;color:var(--t3);margin-top:5px}

/* CHIPS */
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:.74rem;font-weight:600}
.cg{background:#e8f5e9;color:#2e7d32}
.cr{background:#ffebee;color:#c62828}
.co{background:#fff3e0;color:#e65100}
.cb{background:#e3f2fd;color:#1565c0}
.cp{background:#f3e5f5;color:#6a1b9a}
.cgr{background:#f5f5f5;color:#616161}
.ct{background:#e0f2f1;color:#00695c}
.cy{background:#fffde7;color:#f57f17}

/* TABLES */
.tw{overflow-x:auto;border-radius:var(--r2);border:1px solid var(--bdr)}
table{width:100%;border-collapse:collapse;font-size:.84rem;background:#fff}
th{background:#fafafa;padding:10px 14px;text-align:left;font-size:.76rem;font-weight:700;color:var(--t2);border-bottom:1px solid var(--bdr);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--bdr2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}

/* BUTTONS */
.btn{padding:8px 15px;border-radius:var(--r);font-size:.84rem;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:.15s;border:none}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--blue);color:#fff}.btn-p:hover{background:#1565c0}
.btn-s{background:var(--green);color:#fff}.btn-s:hover{background:#388e3c}
.btn-d{background:var(--red);color:#fff}.btn-d:hover{background:#c62828}
.btn-w{background:var(--orange);color:#fff}
.btn-g{background:transparent;border:1.5px solid var(--bdr);color:var(--t2)}.btn-g:hover{background:var(--bg)}
.btn-navy{background:var(--navy);color:#fff}
.btn-sm{padding:5px 11px;font-size:.77rem}
.btn-bl{width:100%;display:flex}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:300;align-items:center;justify-content:center;padding:20px}
.mo.show{display:flex}
.modal{background:#fff;border-radius:var(--r2);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.22);animation:mIn .22s ease}
@keyframes mIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.mh{padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.mh h3{font-size:.98rem;font-weight:700}
.mcl{width:28px;height:28px;background:#f5f5f5;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:1rem;border:none;transition:.15s}
.mcl:hover{background:#e0e0e0}
.mb{padding:18px 20px}
.mf{padding:12px 20px;border-top:1px solid var(--bdr);display:flex;gap:8px;justify-content:flex-end;background:#fafafa;border-radius:0 0 var(--r2) var(--r2)}
.mf .btn{min-width:80px}
.fg{margin-bottom:12px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:420px){.fr{grid-template-columns:1fr}}

/* TOAST */
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:10px 20px;border-radius:30px;font-size:.84rem;z-index:999;white-space:nowrap;pointer-events:none;animation:tIn .25s ease;box-shadow:0 4px 20px rgba(0,0,0,.2)}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.toast.success{background:var(--green)}.toast.error{background:var(--red)}.toast.warning{background:var(--orange)}

/* FILTER BAR */
.fbar{background:#fff;border-radius:var(--r2);box-shadow:var(--sh);padding:14px 16px;margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.fbar .fg{margin:0;flex:1;min-width:120px}
.fbar .fg label{margin-bottom:3px}
.fbar .actions{display:flex;gap:8px;align-self:flex-end}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--t3)}
.empty .ei{font-size:46px;margin-bottom:10px;opacity:.45}
.empty p{font-size:.88rem}

/* PAGE HEADER BANNER */
.phb{background:linear-gradient(135deg,#1a237e,#1976d2);border-radius:var(--r2);padding:18px 22px;color:#fff;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.phb h2{font-size:1.15rem;font-weight:700}
.phb p{font-size:.8rem;opacity:.85;margin-top:2px}

/* PHEAD */
.phead{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.phead h2{font-size:1.05rem;font-weight:700}

/* USER AVATAR */
.uav{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--navy3));color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;flex-shrink:0}

/* DONUT CHART */
.donut-wrap{width:160px;height:160px;margin:0 auto 14px;position:relative}
.donut-c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.donut-n{font-size:1.7rem;font-weight:700;line-height:1}
.donut-l{font-size:.72rem;color:var(--t2)}
.legend-item{display:flex;align-items:center;gap:7px;padding:5px 0;font-size:.82rem}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* CHECK-IN */
.ci-wrap{max-width:500px;margin:0 auto}
.ci-clock{background:linear-gradient(135deg,#1a237e,#3949ab);border-radius:var(--r2);padding:22px;color:#fff;text-align:center;margin-bottom:14px;position:relative;overflow:hidden}
.ci-clock::before{content:'';position:absolute;top:-25px;right:-25px;width:110px;height:110px;background:rgba(255,255,255,.06);border-radius:50%}
.ci-lbl{font-size:.76rem;opacity:.75;background:rgba(255,255,255,.12);display:inline-block;padding:3px 12px;border-radius:20px;margin-bottom:8px}
.ci-time{font-size:2.8rem;font-weight:700;letter-spacing:-2px;font-variant-numeric:tabular-nums;position:relative;z-index:1}
.ci-date{font-size:.82rem;opacity:.8;margin-top:4px}
.ci-st{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);padding:5px 14px;border-radius:20px;font-size:.8rem;margin:10px 0;position:relative;z-index:1}
.sd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sd0{background:#90a4ae}.sdi{background:#69f0ae;box-shadow:0 0 8px #69f0ae}.sdo{background:#ff8a80}
.gps-bar{padding:10px 13px;border-radius:var(--r);font-size:.81rem;font-weight:500;display:flex;align-items:center;gap:7px;margin-bottom:10px}
.gok{background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9}
.gerr{background:#ffebee;color:#c62828;border:1px solid #ffcdd2}
.gchk{background:#fff8e1;color:#f57f17;border:1px solid #ffe082}
.ci-card{background:#fff;border-radius:var(--r2);padding:14px;box-shadow:var(--sh);margin-bottom:12px}
.ci-card-t{font-size:.78rem;font-weight:700;color:var(--t2);margin-bottom:10px;display:flex;align-items:center;gap:6px;padding-bottom:8px;border-bottom:1px solid var(--bdr2)}
.selfie-box{width:100%;aspect-ratio:4/3;background:#f0f0f0;border-radius:var(--r);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.selfie-box video,.selfie-box img{width:100%;height:100%;object-fit:cover}
.selfie-ph{text-align:center;color:var(--t3);padding:20px}
.selfie-ph .ei{font-size:38px;margin-bottom:8px}
.ci-btn{width:100%;padding:15px;font-size:.98rem;font-weight:700;border-radius:var(--r2);cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s;letter-spacing:.3px}
.ci-in{background:linear-gradient(135deg,var(--green),#388e3c);color:#fff;box-shadow:0 4px 16px rgba(67,160,71,.32)}
.ci-out{background:linear-gradient(135deg,var(--orange),#e65100);color:#fff;box-shadow:0 4px 16px rgba(245,124,0,.32)}
.ci-done{background:#e0e0e0;color:#9e9e9e;cursor:not-allowed}
.ci-btn:active:not(.ci-done){transform:scale(.98)}

/* AUDIT TIMELINE */
.tl{padding-left:16px}
.tl-item{position:relative;padding:0 0 18px 22px;border-left:2px solid var(--bdr)}
.tl-item:last-child{border-left-color:transparent}
.tl-dot{position:absolute;left:-7px;top:3px;width:12px;height:12px;border-radius:50%;border:2px solid #fff}
.tl-t{font-size:.73rem;color:var(--t3);margin-bottom:3px}
.tl-box{background:#fff;border-radius:var(--r);padding:9px 13px;box-shadow:var(--sh);font-size:.84rem}
.tl-ac{font-weight:600}
.tl-de{color:var(--t2);font-size:.79rem;margin-top:2px}

/* SETTINGS TABS */
.stabs{display:flex;gap:3px;background:#f0f0f0;border-radius:var(--r);padding:3px;margin-bottom:18px;flex-wrap:wrap}
.stab{padding:7px 14px;border-radius:6px;font-size:.82rem;font-weight:500;cursor:pointer;color:var(--t2);transition:.15s;white-space:nowrap}
.stab.on{background:#fff;color:var(--navy);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* PROGRESS BAR */
.prog-bar{height:6px;background:#e0e0e0;border-radius:10px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:10px;transition:.3s}

/* TOGGLE */
.tog{position:relative;width:40px;height:22px;display:inline-block}
.tog input{opacity:0;width:0;height:0}
.tsl{position:absolute;inset:0;background:#ccc;border-radius:20px;cursor:pointer;transition:.3s}
.tsl::before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog input:checked+.tsl{background:var(--green)}
.tog input:checked+.tsl::before{transform:translateX(18px)}
.tog-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bdr2)}
.tog-row:last-child{border-bottom:none}

/* PROFILE */
.prof-cover{background:linear-gradient(135deg,#1976d2,#1a237e);height:100px;border-radius:var(--r2) var(--r2) 0 0;position:relative}
.prof-box{background:#fff;border-radius:var(--r2);box-shadow:var(--sh);margin-bottom:16px;overflow:visible;padding-top:0}
.prof-body{padding:0 20px 20px}
.prof-ava-wrap{position:relative;display:inline-block;margin-top:-36px;margin-bottom:10px}
.prof-ava{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--navy3));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1.5rem;border:3px solid #fff;box-shadow:var(--sh)}

/* MOBILE */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .topbar,.content{margin-left:0!important;left:0}
  .hamburger{display:flex!important}
  .sg{grid-template-columns:1fr 1fr}
  .ci-time{font-size:2rem}
  .fr{grid-template-columns:1fr}
  .phb{flex-direction:column}
  /* Mobile table fix */
  .tw{border-radius:0;border-left:none;border-right:none}
  table{font-size:.78rem}
  th,td{padding:8px 8px}
  /* Mobile fbar */
  .fbar{flex-direction:column;gap:8px}
  .fbar .fg{min-width:0;width:100%}
  .fbar .actions{flex-direction:row}
  /* Mobile content padding */
  .content{padding:10px;padding-bottom:70px}
  .acont{padding:10px}
  /* Hide topbar text on very small */
  .tb-uname,.tb-urole,.tb-l p{display:none}

<script>
// ============================================================

const DEFAULT_USERS = [

];
const DEFAULT_SHIFTS = [

const DEFAULT_SETTINGS = {
  systemName:'TimeTrack by KGS',companyName:'ບໍລິສັດ KGS ຈຳກັດ',departments:['HR','IT','ການຕະຫຼາດ','ການເງິນ','ຜະລິດ','ຂາຍ','ບໍລິການ','ອື່ນໆ'],positions:['ຜູ້ຈັດການ','ຫົວໜ້າ','Supervisor','Officer','Staff','ພະນັກງານທົ່ວໄປ'],
  address:'123 ຖະໜົນ...',phone:'021-xxx-xxx',
  requireGPS:true,requireSelfie:false,requireQR:false,
  lateMin:15,earlyMin:15,gasBackupUrl:'https://script.google.com/macros/s/AKfycbxATCTw6y63qF9T1oN5mk1dtWat2pEscivw3Yl0HwSqtyCGALjyvNCcuXYpBjof0TmMWA/exec',firebaseKey:'AIzaSyDlbnBoSMuDOW9wtEXG_1MAZoBNPLMZVUc',firebaseProject:'timetrack-by-kgs',firebaseDbUrl:'https://timetrack-by-kgs-default-rtdb.asia-southeast1.firebasedatabase.app',lineToken:'',
};

// ============================================================
// LOCALSTORAGE PERSISTENCE ENGINE
// ============================================================
const LS_KEY = 'ttp_v4_';
const LSKeys = ['users','sites','shifts','attendance','auditLog','settings','leaves','ots','fixreqs','holidays','leavequota','schedules','salary','notifications'];

function lsSave(key){
  try{ localStorage.setItem(LS_KEY+key, JSON.stringify(DATA[key])); }catch(e){ console.warn('LS save fail',key,e); }
}
function lsLoad(key){
  try{ const v=localStorage.getItem(LS_KEY+key); return v?JSON.parse(v):null; }catch(e){ return null; }
}
function saveAll(){ LSKeys.forEach(k=>{ if(DATA[k]!==undefined) lsSave(k); }); }

// Auto-save every 30 seconds
setInterval(saveAll, 30000);

// Proxy-style: patch write operations to auto-persist
function makeArrayProxy(key, arr){
  // wrap push, splice, and direct index sets
  return new Proxy(arr, {
    set(target, prop, value){
      target[prop] = value;
      if(prop !== 'length') lsSave(key);
      return true;
    }
  });
}

// ============================================================
// DATA STORE — loads from localStorage, falls back to defaults
// ============================================================
const DATA = {
  currentUser: null,
  users: lsLoad('users') || JSON.parse(JSON.stringify(DEFAULT_USERS)),
  sites: lsLoad('sites') || JSON.parse(JSON.stringify(DEFAULT_SITES)),
  shifts: lsLoad('shifts') || JSON.parse(JSON.stringify(DEFAULT_SHIFTS)),
  attendance: lsLoad('attendance') || [],
  auditLog: lsLoad('auditLog') || [],
  settings: (function(){ const saved=lsLoad('settings')||{}; const merged=Object.assign({}, DEFAULT_SETTINGS, saved); merged.firebaseKey=DEFAULT_SETTINGS.firebaseKey; merged.firebaseProject=DEFAULT_SETTINGS.firebaseProject; merged.firebaseDbUrl=DEFAULT_SETTINGS.firebaseDbUrl; merged.gasBackupUrl='https://script.google.com/macros/s/AKfycbxATCTw6y63qF9T1oN5mk1dtWat2pEscivw3Yl0HwSqtyCGALjyvNCcuXYpBjof0TmMWA/exec'; return merged; })(),
  leaves: lsLoad('leaves') || [],
  ots: lsLoad('ots') || [],
  fixreqs: lsLoad('fixreqs') || [],
  holidays: lsLoad('holidays') || [],
  leavequota: lsLoad('leavequota') || [],
  schedules: lsLoad('schedules') || [],
  salary: lsLoad('salary') || [],
  notifications: lsLoad('notifications') || [],
};

// Patch mutating operations to auto-save
['users','sites','shifts','attendance','auditLog','leaves','ots','fixreqs','holidays','leavequota','schedules','salary','notifications'].forEach(key=>{
  const orig = DATA[key];
  // Wrap push
  orig._push = orig.push.bind(orig);
  orig.push = function(...args){ const r=orig._push(...args); lsSave(key); return r; };
  // Wrap splice
  orig._splice = orig.splice.bind(orig);
  orig.splice = function(...args){ const r=orig._splice(...args); lsSave(key); return r; };
});

// Patch settings saves

// Production mode — no demo attendance data

// PRODUCTION INIT — Clear old demo localStorage data

// ============================================================

let _uid=200;
function uid(){return 'id'+(++_uid)+Math.random().toString(36).slice(2,5)}
function pad(n){return String(n).padStart(2,'0')}
function greeting(){const h=new Date().getHours();return h<12?'ສະວັດດີຕອນເຊົ້າ':h<17?'ສະວັດດີຕອນບ່າຍ':'ສະວັດດີຕອນແລງ'}
function today(){return new Date().toISOString().split('T')[0]}
function nowT(){const d=new Date();return pad(d.getHours())+':'+pad(d.getMinutes())}
function calcH(i,o){if(!i||!o)return 0;const[ih,im]=i.split(':').map(Number);const[oh,om]=o.split(':').map(Number);return Math.max(0,((oh*60+om)-(ih*60+im))/60).toFixed(2)}
function fmtDate(s){if(!s)return'—';try{return new Date(s+'T00:00').toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'numeric'})}catch{return s}}
function fmtDatetime(s){if(!s)return'—';try{return new Date(s).toLocaleString('th-TH',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}catch{return s}}
function haversine(a,b,c,d){const R=6371e3,p=Math.PI/180;const x=Math.sin((c-a)*p/2)**2+Math.cos(a*p)*Math.cos(c*p)*Math.sin((d-b)*p/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function toast(msg,type='success'){const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}
function el(id){return document.getElementById(id)}
function addAudit(action,table,detail){DATA.auditLog.unshift({id:uid(),userId:DATA.currentUser?.id||'sys',action,table,detail,at:new Date().toISOString()})}
function getUserById(id){return DATA.users.find(u=>u.id===id)}
function getSiteById(id){return DATA.sites.find(s=>s.id===id)}
function getShiftById(id){return DATA.shifts.find(s=>s.id===id)}
function empName(id){const u=getUserById(id);return u?u.name:'?'}

function statusBadge(s){const m={normal:'<span class="chip cg">ປົກກະຕິ</span>',late:'<span class="chip co">ມາຊ້າ</span>',earlyLeave:'<span class="chip cp">ກັບກ່ອນ</span>',outOfZone:'<span class="chip cr">ນອກພື້ນທີ່</span>',absent:'<span class="chip cgr">ຂາດ</span>'};return m[s]||s}

// ============================================================
// AUTH
// ============================================================
let currentPage='dashboard';
let cameraStream=null;
let clockInterval=null;

function doLogin(){
  const u=(el('lUser').value||'').trim();
  const p=(el('lPass').value||'').trim();
  const user=DATA.users.find(x=>x.username===u&&x.password===p&&x.active);
  if(!user){el('lErr').classList.add('show');return}
  DATA.currentUser=user;
  el('lErr').classList.remove('show');
  el('loginPage').style.display='none';
  el('app').style.display='block';
  addAudit('ເຂົ້າລະບົບ','sessions',user.name+' ເຂົ້າລະບົບ');
  initApp();
}

function logout(){
  // FIX: always stop camera on logout
  if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null}
  qrScanning=false;
  if(qrAnimFrame){cancelAnimationFrame(qrAnimFrame);qrAnimFrame=null}
  addAudit('ອອກລະບົບ','sessions',(DATA.currentUser?.name||'?')+' ອອກລະບົບ');
  saveAll(); // persist before logout
  DATA.currentUser=null;
  clearInterval(clockInterval);
  el('app').style.display='none';
  el('loginPage').style.display='flex';
  el('lUser').value='';el('lPass').value='';

  const bell=el('notifBell');if(bell&&bell.parentElement)bell.parentElement.remove();
}

function detectGPS(){
  const gBar=el('gpsBar');if(!gBar)return;

  // ── Step 1: Browser support check ──
  if(!navigator.geolocation){
    gBar.className='gps-bar gerr';
    gBar.innerHTML='❌ Browser ບໍ່ຮອງຮັບ GPS — ໃຊ້ Chrome / Safari';
    return;
  }

  // ── Step 2: Show requesting state ──
  gBar.className='gps-bar gchk';
  gBar.innerHTML='📡 ກຳລັງຂໍສິດ GPS... <span style="font-size:.76rem">(Browser ຈະ Popup ຖາມ — ກົດ Allow)</span>';

  navigator.geolocation.getCurrentPosition(
    // ✅ SUCCESS
    pos=>{
      ciGPS={status:'ok',lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:Math.round(pos.coords.accuracy)};

      // ── AUTO-SELECT nearest site ──
      const activeSites = DATA.sites.filter(s=>s.active);
      const sitesWithDist = activeSites.map(s=>({
        ...s,
        dist: Math.round(haversine(ciGPS.lat,ciGPS.lng,s.lat,s.lng))
      })).sort((a,b)=>a.dist-b.dist);

      const nearest = sitesWithDist[0];
      if(!nearest) return;

      // Auto-select in dropdown
      const ciSiteEl = el('ciSite');
      if(ciSiteEl) ciSiteEl.value = nearest.id;
      ciGPS.dist = nearest.dist;

      const inZone = nearest.dist <= nearest.radius;
      const requireGPS = DATA.settings.requireGPS;

      // ── Show site list with distance ──
      const sitePills = sitesWithDist.slice(0,4).map(s=>{
        const inside = s.dist <= s.radius;
        return `<span style="display:inline-flex;align-items:center;gap:4px;background:${inside?'rgba(46,125,50,.3)':'rgba(0,0,0,.15)'};
          border-radius:20px;padding:3px 10px;font-size:.74rem;margin:2px">
          ${inside?'✅':'📍'} ${s.name} <b>${s.dist<1000?s.dist+'ມ.':(s.dist/1000).toFixed(1)+'km'}</b>
        </span>`;
      }).join('');

      if(inZone){
        gBar.className='gps-bar gok';
        gBar.innerHTML=`
          <div style="width:100%">
            <div style="font-weight:700;font-size:.92rem;margin-bottom:6px">
              ✅ ຢູ່ໃນພື້ນທີ່ <b>${nearest.name}</b> · ຫ່າງ <b>${nearest.dist}ມ.</b>
              <span style="font-size:.74rem;opacity:.8">(±${ciGPS.accuracy}ມ.)</span>
            </div>
            <div style="margin-bottom:4px">${sitePills}</div>
          </div>`;
      } else {
        gBar.className='gps-bar gerr';
        gBar.innerHTML=`
          <div style="width:100%">
            <div style="font-weight:700;margin-bottom:6px">
              ⚠️ ສາຂາໃກ້ທີ່ສຸດ: <b>${nearest.name}</b> — ຫ່າງ <b style="font-size:1rem">${nearest.dist}ມ.</b>
              (ຕ້ອງຢູ່ໃນ ${nearest.radius}ມ.)
            </div>
            <div style="margin-bottom:6px">${sitePills}</div>

async function doCheckin(){
  const u=DATA.currentUser;
  const btn=el('ciBtn');if(btn)btn.disabled=true;
  const siteId=(el('ciSite')||{}).value||u.siteId;
  const site=getSiteById(siteId)||DATA.sites[0];
  const cfg=DATA.settings;

  // GPS validation with clear messages
  if(cfg.requireGPS){
    if(ciGPS.status!=='ok'){
      // Trigger GPS request on button click too
      detectGPS();
      toast('📡 ກຳລັງຂໍສິດ GPS — ກົດ Allow ໃນ Browser ກ່ອນ','warning');
      if(btn)btn.disabled=false;return;
    }
    if(ciGPS.dist>site.radius){
      const over=ciGPS.dist-site.radius;
      toast(`⚠️ ນອກພື້ນທີ່ ${ciGPS.dist}ມ. (ເກີນ ${over}ມ.) — ຕ້ອງຢູ່ໃນ ${site.radius}ມ.`,'error');
      if(btn)btn.disabled=false;return;
    }
  }
  if(cfg.requireSelfie&&!ciSelfie){toast('ກ່ອດຖ່າຍຮູບ Selfie ກ່ອນ','error');if(btn)btn.disabled=false;return}

  const todayRec=DATA.attendance.find(a=>a.empId===u.id&&a.date===today());
  const shift=getShiftById(u.shiftId)||DATA.shifts[0];
  const t=nowT();
  // ✅ FIX: treat absent record (no checkIn) as "not checked in"
  const hasCheckedIn=todayRec&&todayRec.checkIn;

  if(!hasCheckedIn){
    // Determine status
    const [sh,sm]=shift.startTime.split(':').map(Number);
    const [th,tm]=t.split(':').map(Number);
    const diffMin=(th*60+tm)-(sh*60+sm);
    const status=ciGPS.dist>site.radius?'outOfZone':diffMin>cfg.lateMin?'late':'normal';
    let rec;
    if(todayRec&&!todayRec.checkIn){
      // ✅ Update existing absent record → add checkIn
      const idx=DATA.attendance.findIndex(a=>a.id===todayRec.id);
      rec={...todayRec,checkIn:t,siteId:site.id,siteName:site.name,lat:ciGPS.lat,lng:ciGPS.lng,selfieUrl:ciSelfie||'',status};
      DATA.attendance[idx]=rec;
    } else {
      // Create new record
      rec={id:uid(),empId:u.id,date:today(),checkIn:t,checkOut:'',siteId:site.id,siteName:site.name,lat:ciGPS.lat,lng:ciGPS.lng,selfieUrl:ciSelfie||'',status,hours:'0.00'};
      DATA.attendance.push(rec);
    }
    addAudit('ເຊັກອິນ','attendance',`${u.name} ເຊັກອິນ ທີ່ ${site.name}`);
    showCheckinResult('in', t, site, rec.status);
  } else {
    const [eh,em]=shift.endTime.split(':').map(Number);
    const [th,tm]=t.split(':').map(Number);
    const diffMin=(eh*60+em)-(th*60+tm);
    if(diffMin>cfg.earlyMin&&todayRec.status==='normal')todayRec.status='earlyLeave';
    todayRec.checkOut=t;
    todayRec.hours=calcH(todayRec.checkIn,t);
    addAudit('ເຊັກເອົາທ໌','attendance',`${u.name} ເຊັກເອົາທ໌ ທີ່ ${site.name}`);
    showCheckinResult('out', t, site, todayRec);
  }
  ciSelfie=null;
}

function openCamera(){
  const box=el('selfieBox');if(!box)return;
  box.innerHTML='<video id="camVid" autoplay playsinline style="width:100%;height:100%;object-fit:cover"></video>';
  navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false}).then(s=>{
    cameraStream=s;
    el('camVid').srcObject=s;
    el('captureBtn').disabled=false;
  }).catch(()=>toast('ບໍ່ສາມາດເຂົ້າກ້ອງໄດ້','error'));
}

function captureSelfie(){
  const vid=el('camVid');if(!vid)return;
  const c=document.createElement('canvas');c.width=vid.videoWidth;c.height=vid.videoHeight;
  c.getContext('2d').drawImage(vid,0,0);
  ciSelfie=c.toDataURL('image/jpeg',0.8);
  if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null}
  const box=el('selfieBox');
  box.innerHTML=`<img src="${ciSelfie}" style="width:100%;height:100%;object-fit:cover">`;
  el('captureBtn').disabled=true;
  el('retakeBtn').style.display='';
  toast('📸 ຖ່າຍຮູບສຳເລັດ');
}

function retakeSelfie(){ciSelfie=null;openCamera();el('retakeBtn').style.display='none'}

function exportAttExcel(){
  if(typeof XLSX==='undefined'){toast('ກຳລັງໂຫຼດ XLSX...','warning');return}
  // ໃຊ້ filtered data ຖ້າ filter ຖືກ apply — ບໍ່ດັ່ງນັ້ນໃຊ້ all
  const src = window._attFiltered || [...DATA.attendance].sort((a,b)=>b.date.localeCompare(a.date));
  const meta = window._attFilterMeta||{};
  const statusLabel={normal:'ປົກກະຕິ',late:'ມາຊ້າ',earlyLeave:'ກັບກ່ອນ',outOfZone:'ນອກພື້ນທີ່',absent:'ຂາດ'};
  const rows=src.map(a=>{
    const u=getUserById(a.empId)||{name:'?',empId:'?',dept:'?',position:'?'};
    return{
      ລະຫັດ:u.empId, ຊື່ພະນັກງານ:u.name, ພະແນກ:u.dept, ຕຳແໜ່ງ:u.position||'—',
      ວັນທີ:a.date, ຫຼາຍງານ:a.siteName||'—',
      ເຊັກອິນ:a.checkIn||'—', ເຊັກເອົາທ໌:a.checkOut||'—',
      'ຊ.ມ. ທຳງານ':a.hours,
      ສະຖານະ:statusLabel[a.status]||a.status,
      GPS:a.lat?`${a.lat},${a.lng}`:'—'
    };
  });
  if(!rows.length){toast('ບໍ່ມີຂໍ້ມູນ','warning');return}
  // Build filename from active filters
  const emp=meta.emp?getUserById(meta.emp)?.name:'all';
  const ds=meta.s||'';const de=meta.e2||'';
  const fname=`attendance_${emp}_${ds}${de?'_to_'+de:''}_${today()}.xlsx`.replace(/\s/g,'_');
  const ws=XLSX.utils.json_to_sheet(rows);
  // Auto column width
  const cols=Object.keys(rows[0]).map(k=>({wch:Math.max(k.length,14)}));
  ws['!cols']=cols;
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Attendance');
  // Summary sheet
  const sumRows=[
    {ຂໍ້ມູນ:'ຈຳນວນ records',ຄ່າ:rows.length},
    {ຂໍ້ມູນ:'ວັນທີເລີ່ມ',ຄ່າ:meta.s||'ທັງໝົດ'},
    {ຂໍ້ມູນ:'ວັນທີສິ້ນສຸດ',ຄ່າ:meta.e2||'ທັງໝົດ'},
    {ຂໍ້ມູນ:'ພະນັກງານ',ຄ່າ:emp},
    {ຂໍ້ມູນ:'ສະຖານະ filter',ຄ່າ:statusLabel[meta.st]||'ທັງໝົດ'},
    {ຂໍ້ມູນ:'Export ເວລາ',ຄ່າ:new Date().toLocaleString('th-TH')},
  ];
  const ws2=XLSX.utils.json_to_sheet(sumRows);
  XLSX.utils.book_append_sheet(wb,ws2,'Summary');
  XLSX.writeFile(wb,fname);
  toast(`📥 Export ${rows.length} rows ສຳເລັດ`);
  addAudit('Export','attendance',`Export ${rows.length} attendance records`);
}

function saveAdminEditAtt(id){
  const ci=el('aeIn').value,co=el('aeOut').value,st=el('aeSt').value;
  const siteId=el('aeSite').value,reason=(el('aeReason').value||'').trim();
  if(!reason){toast('ໃສ່ເຫດຜົນ','error');return}
  const idx=DATA.attendance.findIndex(x=>x.id===id);if(idx<0)return;
  const site=getSiteById(siteId)||DATA.sites[0];
  const old=DATA.attendance[idx];
  DATA.attendance[idx]={...old,checkIn:ci,checkOut:co,siteId,siteName:site.name,status:st,hours:ci&&co?calcH(ci,co):'0.00',adminEdited:true,editedBy:DATA.currentUser.id,editedAt:new Date().toISOString()};
  lsSave('attendance');FB.update('attendance',id,DATA.attendance[idx]);
  addAudit('Admin Edit','attendance',`ແກ້ໄຂ ${getUserById(old.empId)?.name||'?'} ວັນ ${old.date}: ${reason}`);
  closeModal();toast('✅ ແກ້ໄຂສຳເລັດ');
  filterAtt();
}

function deleteAtt(id){
  if(!confirm('ລຶບ record ນີ້?'))return;
  const a=DATA.attendance.find(x=>x.id===id);
  const idx=DATA.attendance.findIndex(x=>x.id===id);
  if(idx>=0)DATA.attendance.splice(idx,1);
  lsSave('attendance');FB.remove('attendance',id);
  addAudit('Delete','attendance',`ລຶບ record ${getUserById(a?.empId)?.name||'?'} ວັນ ${a?.date}`);
  closeModal();toast('🗑️ ລຶບແລ້ວ');filterAtt();
}

function maCheckExist(){
  const empId=el('maEmp')?.value,date=el('maDate')?.value,w=el('maExistWarn');if(!w)return;
  if(!empId||!date){w.style.display='none';return}
  const exists=DATA.attendance.find(a=>a.empId===empId&&a.date===date);
  const emp=getUserById(empId);
  if(exists){
    w.style.display='block';
    w.innerHTML=`⚠️ <b>${emp?.name}</b> ມີ record ວັນ ${fmtDate(date)} ແລ້ວ (${exists.checkIn||'—'} → ${exists.checkOut||'—'}) — ຖ້າເພີ່ມໃໝ່ຈະມີ 2 records`;
  }else{w.style.display='none';}

function saveManualAtt(){

// ── Auto Absent Detection ───────────────────────────────
function runAbsentCheck(){
  const ds=el('fS')?.value||today();
  const de=el('fE')?.value||today();
  const empFilter=el('fEmp')?.value||'';
  const emps=DATA.users.filter(u=>u.role==='employee'&&u.active&&(!empFilter||u.id===empFilter));
  let d=new Date(ds),found=[];
  while(d<=new Date(de)){
    const ds2=d.toISOString().split('T')[0];
    const dow=d.getDay();
    const isHoliday=DATA.holidays.find(h=>h.date===ds2);
    if(dow>0&&dow<6&&!isHoliday){// weekday, not holiday
      emps.forEach(emp=>{
        const att=DATA.attendance.find(a=>a.empId===emp.id&&a.date===ds2);
        const onLeave=DATA.leaves.find(l=>l.empId===emp.id&&l.status==='approved'&&l.startDate<=ds2&&l.endDate>=ds2);
        if(!att&&!onLeave) found.push({emp,date:ds2,type:'absent'});
        else if(att&&!att.checkOut&&ds2<today()) found.push({emp,date:ds2,type:'no_checkout',att});
      });
    }
    d.setDate(d.getDate()+1);
  }
  if(!found.length){toast('✅ ບໍ່ມີ ຂາດ/ລືມ ໃນຊ່ວງທີ່ເລືອກ');return}
  openModal(`🔍 ພົບ ${found.length} ລາຍການ`,`
    <div style="max-height:360px;overflow-y:auto">
      ${found.map((f,i)=>`
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px;border-radius:8px;background:${f.type==='absent'?'#ffebee':'#fff8e1'};margin-bottom:6px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:1.1rem">${f.type==='absent'?'🔴':'🟡'}</span>
          <div>
            <div style="font-weight:600;font-size:.86rem">${f.emp.name}</div>
            <div style="font-size:.76rem;color:var(--t2)">${fmtDate(f.date)} · ${f.type==='absent'?'ບໍ່ມາທຳງານ':'ລືມ CHECK-OUT'}</div>
          </div>
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0">
          ${f.type==='absent'
            ?`<button class="btn btn-sm" style="background:#e8f5e9;color:#2e7d32;font-size:.72rem" onclick="quickMarkAbsentInModal('${f.emp.id}','${f.date}',this)">ໝາຍ ຂາດ</button>
              <button class="btn btn-sm" style="background:#e3f2fd;color:#1565c0;font-size:.72rem" onclick="closeModal();adminAddAtt('${f.emp.id}','${f.date}')">ເພີ່ມ</button>`
            :`<button class="btn btn-sm" style="background:#fff3e0;color:#e65100;font-size:.72rem" onclick="quickFixCheckout('${f.att.id}',${i})">ແກ້ CHECK-OUT</button>`}
          <button class="btn btn-sm" style="background:#fce4ec;color:#c62828;font-size:.72rem" onclick="sendAbsentNotifFromModal('${f.emp.id}','${f.date}','${f.type}',this)">📢 ແຈ້ງ</button>
        </div>
      </div>`).join('')}
    </div>
    <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap">
      <button class="btn btn-sm" style="background:#ffebee;color:#c62828" onclick="markAllAbsent(${JSON.stringify(found.filter(f=>f.type==='absent').map(f=>({empId:f.emp.id,date:f.date})))})">🔴 ໝາຍ ຂາດ ທັງໝົດ</button>
      <button class="btn btn-sm" style="background:#fff3e0;color:#e65100" onclick="notifyAllAbsent(${JSON.stringify(found.map(f=>({empId:f.emp.id,date:f.date,type:f.type})))})">📢 ແຈ້ງເຕືອນ ທັງໝົດ</button>
      <button class="btn btn-g btn-sm" onclick="closeModal()">ປິດ</button>
    </div>
  `,'');
}

function quickMarkAbsent(empId,date,idx){
  if(DATA.attendance.find(a=>a.empId===empId&&a.date===date))return;
  const rec={id:uid2(),empId,date,checkIn:'',checkOut:'',siteId:'',siteName:'—',lat:null,lng:null,selfieUrl:'',status:'absent',hours:'0.00',markedBy:DATA.currentUser.id,markedAt:new Date().toISOString()};
  DATA.attendance.push(rec);lsSave('attendance');FB.push('attendance',rec);
  addAudit('ໝາຍຂາດ','attendance',`${getUserById(empId)?.name} ຂາດ ວັນ ${date}`);
  sendAbsentNotif(empId,date,'absent',idx);
  toast(`✅ ໝາຍ ຂາດ: ${getUserById(empId)?.name} ວັນ ${fmtDate(date)}`);
}

function quickMarkAbsentInModal(empId,date,btnEl){
  quickMarkAbsent(empId,date,-1);
  // ລຶບ row ຈາກ modal ທັນທີ
  const row=btnEl?.closest('div[style]');
  if(row){
    row.style.transition='opacity .3s';
    row.style.opacity='0';
    setTimeout(()=>{
      row.remove();
      // ອັບເດດ header count
      const mh=document.querySelector('#modalBox .mh h3');
      if(mh){
        const rows=document.querySelectorAll('#mBody>div>div[style]');
        if(!rows.length){
          document.querySelector('#mBody').innerHTML='<div style="text-align:center;padding:24px;color:var(--green);font-size:.9rem">✅ ບໍ່ມີ ຂາດ/ລືມ ທີ່ຕ້ອງດຳເນີນການ</div>';
          mh.textContent='✅ ສຳເລັດ';
        } else {
          mh.textContent=`🔍 ພົບ ${rows.length} ລາຍການ`;
        }
      }
    },300);
  }
  filterAtt();
}

function quickFixCheckout(attId,idx){
  const a=DATA.attendance.find(x=>x.id===attId);if(!a)return;
  const sh=getShiftById(DATA.users.find(u=>u.id===a.empId)?.shiftId);
  const defOut=sh?.endTime||'17:00';
  const t=prompt(`ໃສ່ເວລາ CHECK-OUT ສຳລັບ ${getUserById(a.empId)?.name} ວັນ ${fmtDate(a.date)}:`,defOut);
  if(!t)return;
  const ai=DATA.attendance.findIndex(x=>x.id===attId);
  DATA.attendance[ai]={...a,checkOut:t,hours:calcH(a.checkIn,t),adminEdited:true,editedBy:DATA.currentUser.id,editedAt:new Date().toISOString()};
  lsSave('attendance');FB.update('attendance',attId,DATA.attendance[ai]);
  addAudit('Fix Checkout','attendance',`ແກ້ CHECK-OUT ${getUserById(a.empId)?.name} ວັນ ${a.date} → ${t}`);
  toast(`✅ ແກ້ CHECK-OUT: ${t}`);filterAtt();
}

function sendAbsentNotif(empId,date,type,idx){
  const emp=getUserById(empId)||{name:'?'};
  // Dedup: don't send if already notified for this emp+date+type
  const dedupKey = '_notif_'+type+'_'+empId+'_'+date;
  if(localStorage.getItem(dedupKey)) return;
  localStorage.setItem(dedupKey,'1');
  const msg=type==='absent'
    ?`⚠️ ທ່ານ ບໍ່ໄດ້ CHECK-IN ວັນ ${fmtDate(date)} — ກະລຸນາຕິດຕໍ່ HR ຖ້າມີເຫດຜົນ`
    :`⚠️ ທ່ານ ລືມ CHECK-OUT ວັນ ${fmtDate(date)} — HR ຈະທຳການແກ້ໄຂ`;
  addNotif(empId,msg,'system');
  DATA.users.filter(u=>u.role==='admin').forEach(u=>addNotif(u.id,`📢 ແຈ້ງ ${emp.name}: ${type==='absent'?'ຂາດ':'ລືມ checkout'} ວັນ ${fmtDate(date)}`,'system'));
  toast(`📢 ແຈ້ງ ${emp.name} ແລ້ວ`);
}

function sendAbsentNotifFromModal(empId,date,type,btnEl){
  sendAbsentNotif(empId,date,type,-1);
  // Grey out the button to show sent
  if(btnEl){btnEl.style.background='#e8f5e9';btnEl.style.color='#2e7d32';btnEl.textContent='✅ ແຈ້ງແລ້ວ';btnEl.disabled=true;}
}

function markAllAbsent(list){
  list.forEach(({empId,date})=>quickMarkAbsent(empId,date,-1));
  closeModal();toast(`✅ ໝາຍ ຂາດ ${list.length} ລາຍການ`);filterAtt();
}

function notifyAllAbsent(list){
  list.forEach(({empId,date,type})=>sendAbsentNotif(empId,date,type,-1));
  toast(`📢 ແຈ້ງ ${list.length} ຄົນ ສຳເລັດ`);
}

// ── Auto absent check on dashboard load ────────────────
function autoAbsentAlert(){
  if(DATA.currentUser?.role==='employee')return;
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const yd=yesterday.toISOString().split('T')[0];
  if(yesterday.getDay()===0||yesterday.getDay()===6)return; // skip weekend
  if(DATA.holidays.find(h=>h.date===yd))return;
  const emps=DATA.users.filter(u=>u.role==='employee'&&u.active);
  const missing=emps.filter(emp=>{
    const att=DATA.attendance.find(a=>a.empId===emp.id&&a.date===yd);
    const onLeave=DATA.leaves.find(l=>l.empId===emp.id&&l.status==='approved'&&l.startDate<=yd&&l.endDate>=yd);
    return !att&&!onLeave;
  });
  if(missing.length){
    const prev=localStorage.getItem('_absentAlerted_'+yd);
    if(prev)return;
    localStorage.setItem('_absentAlerted_'+yd,'1');
    addNotif(DATA.currentUser.id,`🔴 เมื่อวาน (${fmtDate(yd)}) ມີ ${missing.length} ຄົນ ບໍ່ໄດ້ CHECK-IN: ${missing.slice(0,3).map(e=>e.name).join(', ')}${missing.length>3?'...':''}  — ໄປ ກວດ ຂາດ/ລືມ`,'system');
  }
}

// ── Patch dashboard: show absence alert box ─────────────
const _pgDashV8=pgDashboard;
pgDashboard=function(){
  const base=_pgDashV8();
  const u=DATA.currentUser;
  if(u.role==='employee')return base;
  // Today's missing (employees without check-in today, not on leave, not weekend)
  const dow=new Date().getDay();
  if(dow===0||dow===6)return base;
  const todayHol=DATA.holidays.find(h=>h.date===today());if(todayHol)return base;
  const emps=DATA.users.filter(x=>x.role==='employee'&&x.active);
  const missing=emps.filter(emp=>{
    const att=DATA.attendance.find(a=>a.empId===emp.id&&a.date===today());
    const onLeave=DATA.leaves.find(l=>l.empId===emp.id&&l.status==='approved'&&l.startDate<=today()&&l.endDate>=today());
    return !att&&!onLeave&&new Date().getHours()>=9;
  });
  const noOut=DATA.attendance.filter(a=>{
    const emp=getUserById(a.empId);
    return a.date===today()&&a.checkIn&&!a.checkOut&&emp?.role==='employee'&&new Date().getHours()>=18;
  });
  if(!missing.length&&!noOut.length)return base;
  const alertBox=`
  <div style="background:linear-gradient(135deg,#ffebee,#fce4ec);border:1px solid #ffcdd2;border-radius:12px;padding:16px 20px;margin-bottom:18px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <span style="font-size:1.4rem">🚨</span>
      <div><b style="color:#c62828">ພົບ ຂາດ/ລືມ ວັນນີ້</b>
      <div style="font-size:.78rem;color:#e57373">ຕ້ອງດຳເນີນການ</div></div>
      <button class="btn btn-sm" style="margin-left:auto;background:#c62828;color:#fff" onclick="navigate('attendance');setTimeout(()=>runAbsentCheck(),300)">🔍 ກວດ + ແກ້ໄຂ</button>
    </div>
    ${missing.length?`<div style="margin-bottom:8px">
      <div style="font-size:.78rem;font-weight:700;color:#c62828;margin-bottom:5px">🔴 ຍັງບໍ່ CHECK-IN (${missing.length} ຄົນ)</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${missing.map(e=>`<span style="background:#fff;border:1px solid #ffcdd2;border-radius:20px;padding:3px 10px;font-size:.76rem;color:#c62828">${e.name}</span>`).join('')}</div>
    </div>`:''}
    ${noOut.length?`<div>
      <div style="font-size:.78rem;font-weight:700;color:#e65100;margin-bottom:5px">🟡 ລືມ CHECK-OUT (${noOut.length} ຄົນ)</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${noOut.map(a=>{const e=getUserById(a.empId);return`<span style="background:#fff;border:1px solid #ffe082;border-radius:20px;padding:3px 10px;font-size:.76rem;color:#e65100">${e?.name||'?'} (${a.checkIn})</span>`}).join('')}</div>
    </div>`:''}
  </div>`;
  return alertBox+base;
};

function uSwitchTab(tab){
  ['info','salary'].forEach(t=>{
    const btn=el('utab_'+t); const content=el('utab_content_'+t);
    if(!btn||!content)return;
    const active = t===tab;
    content.style.display = active?'block':'none';
    const colors = {info:'var(--blue)', salary:'#2e7d32'};
    btn.style.borderBottomColor = active ? colors[t] : 'transparent';
    btn.style.color = active ? colors[t] : 'var(--t2)';
  });
  if(tab==='salary') uUpdateSalaryPreview();
}

function uUpdateSalaryPreview(){
  const cfg = getPayrollConfig();
  const ssoBase = parseFloat(el('uSsoBase')?.value||1600000);
  const ssoEmp = Math.round(ssoBase*0.055);
  const ssoEl = el('u_sso_preview');
  if(ssoEl) ssoEl.textContent = ssoEmp.toLocaleString('lo-LA')+' ₭';

  let earn=0, taxable=0, ded=0;
  cfg.earnings.filter(i=>i.fixed&&i.active!==false).forEach(i=>{
    const v = parseFloat(el('uf_'+i.id)?.value||0);
    earn += v;
    if(i.taxable) taxable += v;
  });
  cfg.deductions.filter(i=>i.fixed&&i.active!==false).forEach(i=>{
    ded += parseFloat(el('uf_'+i.id)?.value||0);
  });
  const totalDed = ded + ssoEmp + calcLaoTax(taxable);
  const net = earn - totalDed;

  const preview = el('u_salary_preview');
  if(preview) preview.style.display = earn>0?'block':'none';
  if(el('u_earn_preview')) el('u_earn_preview').textContent = earn.toLocaleString('lo-LA')+' ₭';
  if(el('u_ded_preview'))  el('u_ded_preview').textContent  = totalDed.toLocaleString('lo-LA')+' ₭';
  if(el('u_net_preview'))  el('u_net_preview').textContent  = net.toLocaleString('lo-LA')+' ₭';
}

function genQRCode(){return Math.random().toString(36).toUpperCase().slice(2,10)}

function saveSite(existId){
  const name=(el('sName').value||'').trim(),code=(el('sCode').value||'').trim().toUpperCase();
  const lat=parseFloat(el('sLat').value),lng=parseFloat(el('sLng').value),radius=parseInt(el('sRadius').value);
  if(!name||!code||isNaN(lat)||isNaN(lng)){toast('ຕື່ມຂໍ້ມູນທີ່ຈຳເປັນ','error');return}
  if(!existId&&DATA.sites.find(s=>s.code===code)){toast('ລະຫັດ ມີຢູ່ແລ້ວ','error');return}
  const obj={name,code,lat,lng,radius,qrCode:el('sQR').value||genQRCode(),active:el('sActive').checked,otFixedHours:parseFloat(el('sOtHours')?.value||0),otFixedRate:parseFloat(el('sOtRate')?.value||1.5)};
  if(existId){const i=DATA.sites.findIndex(s=>s.id===existId);if(i>=0)DATA.sites[i]={...DATA.sites[i],...obj}}
  else DATA.sites.push({id:uid(),...obj});
  addAudit(existId?'ແກ້ໄຂ':'ສ້າງ','sites',(existId?'ແກ້ໄຂ':'ສ້າງ')+' ຫຼາຍງານ '+name);
  closeModal();toast('✅ ບັນທຶກສຳເລັດ');el('content').innerHTML=pgSites();
}

function deleteSite(id){
  if(!confirm('ຢືນຢັນລຶບຫຼາຍງານ?'))return;
  const i=DATA.sites.findIndex(s=>s.id===id);if(i>=0){addAudit('ລຶບ','sites','ລຶບ '+DATA.sites[i].name);DATA.sites.splice(i,1)}
  toast('🗑️ ລຶບສຳເລັດ');el('content').innerHTML=pgSites();
}

function showQR(siteId){
  const site=getSiteById(siteId);if(!site)return;
  openModal('QR Code — '+site.name,`
    <div style="text-align:center;padding:10px 6px">
      <div style="background:linear-gradient(135deg,#1a237e,#1565c0);color:#fff;border-radius:10px;padding:10px 16px;margin-bottom:14px">
        <div style="font-size:.78rem;opacity:.7">ສະຖານທີ</div>
        <div style="font-size:1rem;font-weight:700">${site.name}</div>
        <div style="font-size:.76rem;opacity:.7">${DATA.settings.companyName}</div>
      </div>
      <div id="qrContainer" style="display:inline-block;padding:16px;background:#fff;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,.15);margin-bottom:12px"></div>
      <div style="font-family:monospace;font-size:1rem;font-weight:700;color:#1a237e;letter-spacing:2px;margin-bottom:4px">${site.qrCode}</div>
      <div style="font-size:.78rem;color:var(--t2);margin-bottom:14px">ສະແກນ QR ນີ້ເພື່ອ CHECK-IN · ${site.name}</div>
      <div style="display:flex;gap:8px;justify-content:center">
        <button class="btn btn-sm" style="background:#e8f5e9;color:#2e7d32" onclick="downloadQR('${site.qrCode}','${site.name}')">📥 ດາວໂຫຼດ</button>
        <button class="btn btn-sm" style="background:#e3f2fd;color:#1565c0" onclick="printQR('${site.qrCode}','${site.name}')">🖨️ ພິມ</button>
      </div>
    </div>`);
  setTimeout(()=>{
    const container = el('qrContainer');
    if(!container) return;
    if(typeof QRCode !== 'undefined'){
      new QRCode(container, {
        text: site.qrCode,
        width: 200, height: 200,
        colorDark: '#1a237e',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
    } else {
      // Fallback: Google Charts QR API
      container.innerHTML = `<img src="https://chart.googleapis.com/chart?cht=qr&chs=200x200&chl=${encodeURIComponent(site.qrCode)}&choe=UTF-8" style="width:200px;height:200px;border-radius:8px">`;
    }
  }, 150);
}

function downloadQR(code, name){
  const canvas = el('qrContainer')?.querySelector('canvas');
  if(!canvas){ toast('ກຳລັງ Generate...','warning'); return; }
  const link = document.createElement('a');
  link.download = 'QR_'+name+'_'+code+'.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  toast('📥 ດາວໂຫຼດ QR Code '+name);
}

function printQR(code, name){
  const canvas = el('qrContainer')?.querySelector('canvas');
  const imgSrc = canvas ? canvas.toDataURL() : `https://chart.googleapis.com/chart?cht=qr&chs=300x300&chl=${encodeURIComponent(code)}`;
  const w = window.open('','_blank','width=400,height=500');
  if(!w) return;
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>QR ${name}</title>
    <style>body{font-family:Arial;text-align:center;padding:30px;margin:0}
    .site{font-size:14px;font-weight:bold;margin-bottom:4px}
    .code{font-family:monospace;font-size:18px;letter-spacing:3px;color:#1a237e;margin:8px 0}
    .hint{font-size:11px;color:#666;margin-top:6px}
    img{border:4px solid #1a237e;border-radius:12px;padding:8px;background:#fff}</style></head>
    <body onload="window.print();window.close()">
    <div style="color:#1a237e;font-size:13px;margin-bottom:8px">${DATA.settings.companyName}</div>
    <img src="${imgSrc}" width="200" height="200">
    <div class="site">${name}</div>
    <div class="code">${code}</div>
    <div class="hint">ສະແກນ QR ນີ້ເພື່ອ CHECK-IN</div>
    </body></html>`);
  w.document.close();
}

function getMyLocation(){
  navigator.geolocation.getCurrentPosition(p=>{
    el('sLat').value=p.coords.latitude.toFixed(6);el('sLng').value=p.coords.longitude.toFixed(6);
    toast('📡 ໄດ້ຕຳແໜ່ງ GPS ແລ້ວ');
  },()=>toast('ບໍ່ສາມາດໄດ້ GPS','error'));
}

function saveSettings(){
  const c=DATA.settings;
  if(el('cfgSys'))c.systemName=el('cfgSys').value;
  if(el('cfgCo'))c.companyName=el('cfgCo').value;
  if(el('cfgAddr'))c.address=el('cfgAddr').value;
  if(el('cfgPhone'))c.phone=el('cfgPhone').value;
  if(el('cfgGPS'))c.requireGPS=el('cfgGPS').checked;
  if(el('cfgSelfie'))c.requireSelfie=el('cfgSelfie').checked;
  if(el('cfgQR'))c.requireQR=el('cfgQR').checked;
  if(el('cfgLate'))c.lateMin=parseInt(el('cfgLate').value);
  if(el('cfgEarly'))c.earlyMin=parseInt(el('cfgEarly').value);
  if(el('cfgFbKey'))c.firebaseKey=el('cfgFbKey').value;
  if(el('cfgFbProj'))c.firebaseProject=el('cfgFbProj').value;
  if(el('cfgFbDbUrl'))c.firebaseDbUrl=el('cfgFbDbUrl').value;
  c.gasBackupUrl='https://script.google.com/macros/s/AKfycbxATCTw6y63qF9T1oN5mk1dtWat2pEscivw3Yl0HwSqtyCGALjyvNCcuXYpBjof0TmMWA/exec'; // always hardcoded
  if(el('cfgLine'))c.lineToken=el('cfgLine').value;
  el('sbSysName').textContent=c.systemName;
  addAudit('ຕັ້ງຄ່າ','config','ອັບເດດການຕັ້ງຄ່າລະບົບ');
  toast('✅ ບັນທຶກການຕັ້ງຄ່າ');
}

function changePassword(){
  const np=el('pwNew').value,nc=el('pwConf').value;
  if(!np){toast('ໃສ່ລະຫັດຜ່ານໃໝ່','error');return}
  if(np!==nc){toast('ລະຫັດຜ່ານບໍ່ຕົງ','error');return}
  DATA.currentUser.password=np;
  const i=DATA.users.findIndex(u=>u.id===DATA.currentUser.id);if(i>=0)DATA.users[i].password=np;
  addAudit('ປ່ຽນລະຫັດ','users','ປ່ຽນລະຫັດຜ່ານ');
  el('pwNew').value='';el('pwConf').value='';
  toast('✅ ປ່ຽນລະຫັດຜ່ານສຳເລັດ');
}

function leaveStatusBadge(s){return {pending:'<span class="chip cy">⏳ ລໍຖ້າ</span>',approved:'<span class="chip cg">✅ ອະນຸມັດ</span>',rejected:'<span class="chip cr">❌ ປະຕິເສດ</span>'}[s]||s}
function getQuota(empId){return DATA.leavequota.find(q=>q.empId===empId&&q.year===new Date().getFullYear())||{sick:30,annual:6,personal:4,maternity:60}}
function usedLeave(empId,type){return DATA.leaves.filter(l=>l.empId===empId&&l.type===type&&l.status==='approved'&&l.date&&new Date(l.startDate).getFullYear()===new Date().getFullYear()).reduce((a,b)=>a+(b.days||1),0)}
function countWorkdays(s,e){let d=new Date(s),c=0;const ed=new Date(e);while(d<=ed){const dw=d.getDay();if(dw!==0&&dw!==6)c++;d.setDate(d.getDate()+1)}return c||1}

function calcLvDays(){
  const s=el('lvStart'),e=el('lvEnd'),d=el('lvDays');
  if(s&&e&&d){const days=countWorkdays(s.value,e.value);d.value=days<1?1:days}
}

function submitLeave(){
  const type=el('lvType').value,start=el('lvStart').value,end=el('lvEnd').value,reason=(el('lvReason').value||'').trim();
  if(!start||!end||!reason){toast('ຕື່ມຂໍ້ມູນທີ່ຈຳເປັນ','error');return}
  if(start>end){toast('ວັນທີຜິດ','error');return}
  const days=countWorkdays(start,end);
  const q=getQuota(DATA.currentUser.id);const used=usedLeave(DATA.currentUser.id,type);
  if(used+days>(q[type]||0)){toast('ສິດທິ໌ລາ '+LEAVE_TYPES[type]+' ບໍ່ພໍ','error');return}
  DATA.leaves.push({id:uid(),empId:DATA.currentUser.id,type,startDate:start,endDate:end,days,reason,attachUrl:'',status:'pending',approverId:'',approvedAt:'',created:new Date().toISOString()});
  addAudit('ສ້າງ','leaves','ຂໍລາ '+LEAVE_TYPES[type]+' '+days+' ວັນ');
  el('lvReason').value='';
  toast('✅ ສົ່ງຄຳຂໍລາສຳເລັດ');
  el('content').innerHTML=pgLeaveReq();
}

function actFix(id,action){
  const r=DATA.fixreqs.find(x=>x.id===id);if(!r)return;

    const att=DATA.attendance.find(a=>a.empId===r.empId&&a.date===r.date);

    if(att&&r.type==='forgot_out'){att.checkOut=r.reqTime;att.hours=calcH(att.checkIn,r.reqTime)}

}

  toast('✅ ສົ່ງສຳເລັດ');el('content').innerHTML=pgApproveFix();

function showHdModal(hd){

function uid2(){return 'id'+(Math.random()*999999|0)+Math.random().toString(36).slice(2,5)}

// NOTIFICATIONS SYSTEM
// ============================================================
function getMyNotifs(){
  return DATA.notifications.filter(n=>n.toUserId===DATA.currentUser.id).sort((a,b)=>b.at.localeCompare(a.at));
}
function unreadCount(){return getMyNotifs().filter(n=>!n.read).length}

function addNotif(toUserId, msg, type){
  DATA.notifications.push({id:uid2(),toUserId,msg,type,read:false,at:new Date().toISOString()});
  updateNotifBadge();
}
function updateNotifBadge(){
  const cnt=unreadCount();
  const badge=el('notifBadge');
  if(badge){badge.textContent=cnt;badge.style.display=cnt?'':'none'}
}

// Patch topbar to show notification bell
function patchTopbar(){
  const tbr=document.querySelector('.tb-r');
  if(!tbr||el('notifBell')) return;
  const bell=document.createElement('div');
  bell.style.cssText='position:relative;cursor:pointer';
  bell.innerHTML=`<div id="notifBell" style="width:32px;height:32px;background:var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;border:1px solid var(--bdr)" onclick="toggleNotifPanel()">🔔</div>
  <span id="notifBadge" style="position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;border-radius:10px;padding:1px 5px;font-size:.65rem;font-weight:700;display:none">0</span>
  <div id="notifPanel" style="display:none;position:absolute;right:0;top:38px;width:300px;background:#fff;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.15);z-index:200;border:1px solid var(--bdr);max-height:380px;overflow-y:auto">
    <div style="padding:10px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between">
      <b style="font-size:.88rem">🔔 ແຈ້ງເຕືອນ</b>
      <button class="btn btn-g btn-sm" onclick="markAllRead()">ອ່ານທັງໝົດ</button>
    </div>
    <div id="notifList"></div>
  </div>`;
  tbr.insertBefore(bell, tbr.querySelector('.tb-ref'));
  updateNotifBadge();
  renderNotifList();
}

function renderNotifList(){
  const list=el('notifList'); if(!list) return;
  const notifs=getMyNotifs();
  const icons={leave:'🌴',ot:'⏰',fix:'🛠️',system:'⚙️'};
  list.innerHTML=notifs.length?notifs.slice(0,10).map(n=>`
    <div onclick="readNotif('${n.id}')" style="padding:10px 14px;border-bottom:1px solid #f5f5f5;cursor:pointer;background:${n.read?'#fff':'#f0f7ff'};display:flex;align-items:flex-start;gap:8px" onmouseover="this.style.background='#f8f9fa'" onmouseout="this.style.background='${n.read?'#fff':'#f0f7ff'}'">
      <span style="font-size:1.2rem">${icons[n.type]||'📢'}</span>
      <div style="flex:1"><div style="font-size:.82rem;${n.read?'':'font-weight:600'}">${n.msg}</div>
      <div style="font-size:.72rem;color:var(--t3);margin-top:2px">${fmtDatetime(n.at)}</div></div>
      ${!n.read?'<div style="width:7px;height:7px;background:var(--blue);border-radius:50%;margin-top:4px;flex-shrink:0"></div>':''}
    </div>`).join('')
    :'<div style="text-align:center;padding:24px;color:var(--t3);font-size:.85rem">✅ ບໍ່ມີແຈ້ງເຕືອນ</div>';
}

function toggleNotifPanel(){
  const p=el('notifPanel');if(!p)return;
  p.style.display=p.style.display==='none'?'block':'none';
  if(p.style.display==='block')renderNotifList();
}
document.addEventListener('click',e=>{
  const bell=el('notifBell');const panel=el('notifPanel');
  if(panel&&bell&&!bell.parentElement.contains(e.target))panel.style.display='none';
});
function readNotif(id){
  const n=DATA.notifications.find(x=>x.id===id);if(n)n.read=true;
  updateNotifBadge();renderNotifList();
}
function markAllRead(){
  getMyNotifs().forEach(n=>n.read=true);
  updateNotifBadge();renderNotifList();
}

function saveQuota(empId){

function saveBulkQuota(){
  const yr=new Date().getFullYear();
  const vals={sick:parseInt(el('bqSick').value),annual:parseInt(el('bqAnnual').value),personal:parseInt(el('bqPersonal').value),maternity:parseInt(el('bqMaternity').value)};
  DATA.users.filter(u=>u.active).forEach(u=>{

function pgShiftSchedule(){
  const emps=DATA.users.filter(u=>u.role==='employee'&&u.active);
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const dayLao={'Mon':'ຈັນ','Tue':'ອັງຄານ','Wed':'ພຸດ','Thu':'ພະຫັດ','Fri':'ສຸກ','Sat':'ເສົາ','Sun':'ອາທິດ'};
  return `
  <div class="phb"><div><h2>📅 ຕາຕະລາງກະ</h2><p>ກຳໜົດກະວຽກລາຍຄົນ</p></div></div>
  <div style="overflow-x:auto">
  <table style="width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:var(--sh);font-size:.83rem">
    <thead>
      <tr style="background:var(--navy);color:#fff">
        <th style="padding:12px 14px;text-align:left;min-width:140px">ພະນັກງານ</th>
        ${days.map(d=>`<th style="padding:12px 10px;text-align:center;min-width:90px">${dayLao[d]}</th>`).join('')}
      </tr>
    </thead>
    <tbody>
      ${emps.map((emp,ri)=>`
      <tr style="background:${ri%2?'#fafafa':'#fff'}">
        <td style="padding:10px 14px;border-bottom:1px solid #f0f0f0">
          <div style="display:flex;align-items:center;gap:7px">
            <div class="uav" style="width:26px;height:26px;font-size:.75rem">${emp.name.charAt(0)}</div>
            <div><div style="font-size:.84rem;font-weight:600">${emp.name.split(' ')[0]}</div>
            <div style="font-size:.72rem;color:var(--t3)">${emp.empId}</div></div>
          </div>
        </td>
        ${days.map(d=>{
          const sch=DATA.schedules.find(s=>s.empId===emp.id&&s.dayOfWeek===d);
          const shift=sch?getShiftById(sch.shiftId):null;
          const isWknd=d==='Sat'||d==='Sun';
          return `<td style="padding:6px;text-align:center;border-bottom:1px solid #f0f0f0;border-left:1px solid #f0f0f0">
            ${shift?`<div onclick="editScheduleCell('${emp.id}','${d}')" style="background:${shift.code==='NORMAL'?'#e8f5e9':shift.code==='MORNING'?'#e3f2fd':shift.code==='AFTERNOON'?'#fff3e0':'#f3e5f5'};border-radius:6px;padding:4px 6px;cursor:pointer;font-size:.75rem;font-weight:600;color:${shift.code==='NORMAL'?'#2e7d32':shift.code==='MORNING'?'#1565c0':shift.code==='AFTERNOON'?'#e65100':'#6a1b9a'}">
              ${shift.name}<div style="font-size:.68rem;opacity:.8">${shift.startTime}–${shift.endTime}</div>
            </div>`
            :`<div onclick="editScheduleCell('${emp.id}','${d}')" style="background:${isWknd?'#ffebee':'#f5f5f5'};border-radius:6px;padding:4px;cursor:pointer;color:var(--t3);font-size:.75rem">${isWknd?'🔴 ຫຍຸດ':'+ ເພີ່ມ'}</div>`}
          </td>`;
        }).join('')}
      </tr>`).join('')}
    </tbody>
  </table>
  </div>
  <div style="margin-top:12px;font-size:.8rem;color:var(--t2);display:flex;gap:12px;flex-wrap:wrap">
    ${DATA.shifts.map(s=>`<span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:${s.code==='NORMAL'?'#e8f5e9':s.code==='MORNING'?'#e3f2fd':s.code==='AFTERNOON'?'#fff3e0':'#f3e5f5'};display:inline-block"></span>${s.name} ${s.startTime}–${s.endTime}</span>`).join('')}
  </div>`;
}

function editScheduleCell(empId,day){
  const sch=DATA.schedules.find(s=>s.empId===empId&&s.dayOfWeek===day);
  const emp=getUserById(empId)||{name:'?'};
  const dayLao={'Mon':'ຈັນ','Tue':'ອັງຄານ','Wed':'ພຸດ','Thu':'ພະຫັດ','Fri':'ສຸກ','Sat':'ເສົາ','Sun':'ອາທິດ'};
  openModal(`ກຳໜົດກະ — ${emp.name.split(' ')[0]} (${dayLao[day]})`,`
    <div class="fg"><label>ເລືອກກະ</label>
      <select id="scShift">
        <option value="">🔴 ວັນຫຍຸດ / ບໍ່ທຳງານ</option>
        ${DATA.shifts.map(s=>`<option value="${s.id}" ${sch&&sch.shiftId===s.id?'selected':''}>${s.name} (${s.startTime}–${s.endTime})</option>`).join('')}
      </select>
    </div>`,
    `<button class="btn btn-g" onclick="closeModal()">ຍົກເລີກ</button>
     <button class="btn btn-p" onclick="saveScheduleCell('${empId}','${day}')">💾 ບັນທຶກ</button>`);
}

function saveScheduleCell(empId,day){
  const shiftId=el('scShift').value;
  const i=DATA.schedules.findIndex(s=>s.empId===empId&&s.dayOfWeek===day);
  if(shiftId){
    const obj={id:uid2(),empId,dayOfWeek:day,shiftId,active:true};
    if(i>=0)DATA.schedules[i]=obj; else DATA.schedules.push(obj);
  } else {
    if(i>=0)DATA.schedules.splice(i,1);
  }
  closeModal();toast('✅ ບັນທຶກ');el('content').innerHTML=pgShiftSchedule();
}

function getPayrollConfig(){
  const cfg = DATA.settings.payrollConfig || JSON.parse(JSON.stringify(DEFAULT_PAYROLL_ITEMS));
  // Ensure all items have active field
  ['earnings','deductions'].forEach(type=>{
    cfg[type].forEach(item=>{ if(item.active===undefined) item.active=true; });
  });
  return cfg;
}

// ── LAO Progressive Tax ──────────────────────────────────────
function calcLaoTax(grossTaxable){
  if(grossTaxable <= 1300000) return 0;
  const b1 = Math.min(grossTaxable, 5000000)  - 1300000;
  const b2 = Math.max(0, Math.min(grossTaxable, 15000000)  - 5000000);
  const b3 = Math.max(0, Math.min(grossTaxable, 25000000)  - 15000000);
  const b4 = Math.max(0, Math.min(grossTaxable, 65000000)  - 25000000);
  const b5 = Math.max(0, grossTaxable - 65000000);
  return Math.round(b1*0.05 + b2*0.10 + b3*0.15 + b4*0.20 + b5*0.25);
}

// Tax breakdown by bracket
function calcLaoTaxBreakdown(grossTaxable){
  if(grossTaxable <= 1300000) return {t0:grossTaxable,t5:0,t10:0,t15:0,t20:0,t25:0,total:0};
  return {
    t0:  1300000,
    t5:  Math.round((Math.min(grossTaxable,5000000)  - 1300000)   * 0.05),
    t10: Math.round(Math.max(0,Math.min(grossTaxable,15000000) - 5000000)  * 0.10),
    t15: Math.round(Math.max(0,Math.min(grossTaxable,25000000) - 15000000) * 0.15),
    t20: Math.round(Math.max(0,Math.min(grossTaxable,65000000) - 25000000) * 0.20),
    t25: Math.round(Math.max(0,grossTaxable-65000000) * 0.25),
    total: calcLaoTax(grossTaxable)
  };
}

// ── SSO Calculation ──────────────────────────────────────────
function calcSSO(ssoBase){
  const b = Math.max(1600000, ssoBase || 1600000);
  return { base:b, employee: Math.round(b*0.055), company: Math.round(b*0.06) };
}

// ── Full Payroll Calculate ───────────────────────────────────
function calcPayroll(empId, month, itemValues, ssoBase){
  const cfg = getPayrollConfig();

  // Sum earnings
  let totalEarnings = 0, taxableEarnings = 0;
  const earnDetail = {};
  cfg.earnings.forEach(item => {
    const val = parseFloat(itemValues[item.id] || 0);
    earnDetail[item.id] = val;
    totalEarnings += val;
    if(item.taxable) taxableEarnings += val;
  });

  // SSO
  const sso = calcSSO(ssoBase);

  // Tax on taxable earnings only
  const tax = calcLaoTax(taxableEarnings);
  const taxBreakdown = calcLaoTaxBreakdown(taxableEarnings);

  // Sum deductions (manual entries)
  let totalDeductions = sso.employee + tax;
  const dedDetail = { d_sso: sso.employee, d_tax: tax };
  cfg.deductions.forEach(item => {
    const val = parseFloat(itemValues[item.id] || 0);
    dedDetail[item.id] = val;
    totalDeductions += val;
  });

  const netSalary = totalEarnings - totalDeductions;

  return {
    empId, month,
    totalEarnings, taxableEarnings, nonTaxableEarnings: totalEarnings - taxableEarnings,
    sso, tax, taxBreakdown,
    totalDeductions, netSalary,
    earnDetail, dedDetail,
    ssoBase
  };
}

// ── Save Payroll Record ──────────────────────────────────────
function saveSalaryFull(result, rawValues){
  const { empId, month, totalEarnings, totalDeductions, netSalary,
          earnDetail, dedDetail, sso, tax, ssoBase } = result;

  const rec = {
    id: uid2(), empId, month, ssoBase,
    // Legacy fields for compatibility
    baseSalary: earnDetail.e_base || 0,
    otPay: (earnDetail.e_ot||0) + (earnDetail.e_site_ot||0),
    bonus: earnDetail.e_bonus || 0,
    deduction: totalDeductions,
    total: netSalary,
    paid: false, approvedBy: '', approvedAt: '',
    // Full detail
    earnings: earnDetail, deductions: { ...dedDetail, d_sso: sso.employee, d_tax: tax },
    totalEarnings, taxableEarnings: result.taxableEarnings,
    ssoEmployee: sso.employee, ssoCompany: sso.company, tax,
    createdAt: new Date().toISOString(),
  };

  // Upsert
  const idx = DATA.salary.findIndex(s => s.empId === empId && s.month === month);
  if(idx >= 0) DATA.salary[idx] = { ...DATA.salary[idx], ...rec, id: DATA.salary[idx].id };
  else DATA.salary.push(rec);

  lsSave('salary'); FB.saveArray('salary', DATA.salary);
  addAudit('ບັນທຶກເງິນເດືອນ', 'salary', `${month} - ${getUserById(empId)?.name||empId}: ${fmtMoney(netSalary)}`);
}

function pgPayStep3(){
  const mo = _pw.month;
  const cfg = getPayrollConfig();
  const emps = _pw.selectedEmpIds.map(id=>DATA.users.find(u=>u.id===id)).filter(Boolean);
  if(!emps.length) return `<div class="empty"><button class="btn btn-p" onclick="pwGo(1)">← ກັບ</button></div>`;

  // Compute all
  const results = emps.map(u=>{
    const vals={};
    cfg.earnings.filter(i=>i.active!==false).forEach(i=>{
      vals[i.id] = i.fixed ? (u.fixedEarnings?.[i.id]||0) : (_pw.varItems[u.id]?.[i.id]||0);
    });
    cfg.deductions.filter(i=>i.active!==false&&!i.auto).forEach(i=>{
      vals[i.id] = i.fixed ? (u.fixedDeductions?.[i.id]||0) : (_pw.varItems[u.id]?.[i.id]||0);
    });
    // Auto deductions from attendance
    const att = DATA.attendance.filter(a=>a.empId===u.id&&a.date.startsWith(mo));
    vals['d_late']   = _pw.varItems[u.id]?.['d_late']  || 0;
    vals['d_absent'] = _pw.varItems[u.id]?.['d_absent']|| 0;
    vals['d_early']  = _pw.varItems[u.id]?.['d_early'] || 0;
    const worked = att.filter(a=>a.checkIn).length;
    return {emp:u, vals, worked, result: calcPayroll(u.id, mo, vals, u.ssoBase||1600000)};
  });

  const totalEarn = results.reduce((s,r)=>s+r.result.totalEarnings,0);
  const totalNet  = results.reduce((s,r)=>s+r.result.netSalary,0);
  const totalSSO  = results.reduce((s,r)=>s+r.result.sso.employee,0);
  const totalSSOco= results.reduce((s,r)=>s+r.result.sso.company,0);
  const totalTax  = results.reduce((s,r)=>s+r.result.tax,0);

  const rows = results.map((r,idx)=>`
    <tr>
      <td style="font-size:.75rem;color:var(--t3)">${idx+1}</td>
      <td><div style="font-weight:600;font-size:.84rem">${r.emp.name}</div>
          <div style="font-size:.7rem;color:var(--t2)">${r.emp.empId} · ${r.emp.dept||''}</div></td>
      <td style="text-align:right;font-size:.82rem">${fmtMoney(r.result.totalEarnings)}</td>
      <td style="text-align:right;font-size:.82rem;color:#c62828">${fmtMoney(r.result.taxableEarnings)}</td>
      <td style="text-align:right;font-size:.82rem;color:#7b1fa2">${fmtMoney(r.result.sso.employee)}</td>
      <td style="text-align:right;font-size:.82rem;color:#c62828">${fmtMoney(r.result.tax)}</td>
      <td style="text-align:right;font-size:.82rem;color:var(--red)">${fmtMoney(r.result.totalDeductions)}</td>
      <td style="text-align:right;font-weight:700;color:var(--green)">${fmtMoney(r.result.netSalary)}</td>
    </tr>`).join('');

  // Store results for export
  window._pwResults = results;

  return `
  ${pwHeader(3,mo)}

  <!-- Dashboard cards -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:16px">
    <div style="background:linear-gradient(135deg,#1a237e,#1565c0);color:#fff;border-radius:12px;padding:14px">
      <div style="font-size:.72rem;opacity:.7">👥 ຈຳນວນ</div>
      <div style="font-size:1.5rem;font-weight:800">${emps.length}</div>
      <div style="font-size:.72rem;opacity:.7">ຄົນ</div>
    </div>
    <div style="background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#fff;border-radius:12px;padding:14px">
      <div style="font-size:.72rem;opacity:.7">💰 ຍອດສຸດທິ</div>
      <div style="font-size:1rem;font-weight:800">${fmtMoney(totalNet)}</div>
      <div style="font-size:.68rem;opacity:.7">₭</div>
    </div>
    <div style="background:#f3e5f5;border-radius:12px;padding:14px">
      <div style="font-size:.72rem;color:#7b1fa2">🏥 SSO ພ/ງ</div>
      <div style="font-size:1rem;font-weight:800;color:#7b1fa2">${fmtMoney(totalSSO)}</div>
      <div style="font-size:.68rem;color:#7b1fa2">ບໍລິສັດ ${fmtMoney(totalSSOco)}</div>
    </div>
    <div style="background:#ffebee;border-radius:12px;padding:14px">
      <div style="font-size:.72rem;color:#c62828">📋 ພາສີລວມ</div>
      <div style="font-size:1rem;font-weight:800;color:#c62828">${fmtMoney(totalTax)}</div>
    </div>
  </div>

  <!-- Table -->
  <div class="card" style="margin-bottom:14px">
    <div class="card-t" style="margin-bottom:10px">📊 ສະຫຼຸບ ${emps.length} ຄົນ</div>
    <div class="tw" style="max-height:380px;overflow-y:auto">
      <table>
        <thead><tr style="position:sticky;top:0;background:#fff">
          <th>#</th><th>ພະນັກງານ</th>
          <th style="text-align:right">ລາຍຮັບ</th>
          <th style="text-align:right;color:#c62828">ເສຍພາສີ</th>
          <th style="text-align:right;color:#7b1fa2">SSO</th>
          <th style="text-align:right;color:#c62828">ພາສີ</th>
          <th style="text-align:right">ຫັກລວມ</th>
          <th style="text-align:right;color:var(--green)">ສຸດທິ</th>
        </tr></thead>
        <tbody>${rows}
          <tr style="background:#f0f4f8;font-weight:700">
            <td colspan="2" style="text-align:right;font-size:.84rem">ລວມ</td>
            <td style="text-align:right">${fmtMoney(totalEarn)}</td>
            <td></td>
            <td style="text-align:right;color:#7b1fa2">${fmtMoney(totalSSO)}</td>
            <td style="text-align:right;color:#c62828">${fmtMoney(totalTax)}</td>
            <td></td>
            <td style="text-align:right;color:var(--green)">${fmtMoney(totalNet)}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Download cards -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:16px">
    <div style="background:#e8eaf6;border-radius:12px;padding:14px;text-align:center">
      <div style="font-size:1.5rem;margin-bottom:6px">📋</div>
      <div style="font-weight:700;font-size:.86rem;margin-bottom:8px">Salary Tracking</div>
      <button class="btn btn-sm" style="width:100%;background:#1a237e;color:#fff" onclick="pw3DownloadSalary()">📥 Download</button>
    </div>
    <div style="background:#ffebee;border-radius:12px;padding:14px;text-align:center">
      <div style="font-size:1.5rem;margin-bottom:6px">🧾</div>
      <div style="font-weight:700;font-size:.86rem;margin-bottom:8px">TAX Report</div>
      <button class="btn btn-sm" style="width:100%;background:#c62828;color:#fff" onclick="pw3DownloadTax()">📥 Download</button>
    </div>
    <div style="background:#f3e5f5;border-radius:12px;padding:14px;text-align:center">
      <div style="font-size:1.5rem;margin-bottom:6px">🏥</div>
      <div style="font-weight:700;font-size:.86rem;margin-bottom:8px">SSO Report</div>
      <button class="btn btn-sm" style="width:100%;background:#7b1fa2;color:#fff" onclick="pw3DownloadSSO()">📥 Download</button>
    </div>
  </div>

  <div style="display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap">
    <button class="btn btn-g" onclick="pwGo(2)">← ກັບ</button>
    <div style="display:flex;gap:8px">
      <button class="btn btn-sm btn-g" onclick="pwGo(1)">🔄 ເລີ່ມໃໝ່</button>
      <button class="btn btn-p" onclick="pw3Save()">💾 ບັນທຶກເງິນເດືອນ ${emps.length} ຄົນ</button>
    </div>
  </div>`;
}

function filterSalary(){
  const q=(el('salSearch')?.value||'').toLowerCase();
  const mo=window._salMo||(new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0'));
  const rows=DATA.salary.filter(s=>s.month===mo).filter(r=>{
    if(!q)return true;
    const emp=getUserById(r.empId)||{};
    return (emp.name||'').toLowerCase().includes(q)||(emp.empId||'').toLowerCase().includes(q);
  });

// ── Auto-calculate salary from Attendance ──────────────────
function autoCalcSalary(empId, month){
  const emp = getUserById(empId); if(!emp) return;
  const att = DATA.attendance.filter(a=>a.empId===empId&&a.date.startsWith(month));
  const otApproved = DATA.ots.filter(o=>o.empId===empId&&o.date.startsWith(month)&&o.status==='approved');
  const leaves = DATA.leaves.filter(l=>l.empId===empId&&l.startDate.startsWith(month)&&l.status==='approved');

  // Count working days (attendance with checkIn)
  const workedDays = att.filter(a=>a.checkIn).length;
  const totalHours = att.reduce((s,a)=>s+parseFloat(a.hours||0),0);
  const lateCount  = att.filter(a=>a.status==='late').length;
  const absCount   = att.filter(a=>a.status==='absent').length;
  const otHours    = otApproved.reduce((s,o)=>s+parseFloat(o.hours||0),0);
  const leaveUsed  = leaves.reduce((s,l)=>s+(l.days||0),0);

  // Show auto-calc summary in modal
  const box=el('salAutoSummary'); if(!box) return;
  box.innerHTML=`
    <div style="background:#e3f2fd;border-radius:8px;padding:12px;margin-bottom:10px">
      <div style="font-size:.78rem;font-weight:700;color:#1565c0;margin-bottom:8px">📊 ສະຫຼຸບຈາກ Attendance — ${month}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:.8rem">
        <div>✅ ວັນທີ່ມາ: <b>${workedDays} ວັນ</b></div>
        <div>⏱ ຊ.ມ.ລວມ: <b>${totalHours.toFixed(1)} ຊ.ມ.</b></div>
        <div>⏰ ມາຊ້າ: <b style="color:var(--orange)">${lateCount} ຄັ້ງ</b></div>
        <div>🔴 ຂາດ: <b style="color:var(--red)">${absCount} ວັນ</b></div>
        <div>⏰ OT approved: <b style="color:var(--purple)">${otHours} ຊ.ມ.</b></div>
        <div>🌴 ລາ approved: <b>${leaveUsed} ວັນ</b></div>
      </div>
      <div style="border-top:1px solid #bbdefb;margin-top:8px;padding-top:6px;font-size:.76rem;color:#1565c0">
        💡 ກວດ ແລ້ວ ກົດ "ໃຊ້ OT" ເພື່ອ fill ຊ່ອງ OT ອັດຕະໂນມັດ
      </div>
    </div>`;

  // Auto-fill OT if hourly rate available
  const otInput = el('slOT');
  if(otInput && otHours>0){
    // Suggest OT pay (can override)
    const baseHourly = parseFloat(el('slBase').value||0) / 26 / 8;
    const suggestOT = Math.round(baseHourly * otHours * 1.5);
    el('slOTSuggest').textContent = otHours > 0 ? `💡 OT ${otHours} ຊ.ມ. → ≈ ${suggestOT.toLocaleString()} ₭ (1.5x)` : '';
  }
}

function fillOTFromAttendance(){
  const empId=el('slEmp').value, month=el('slMo').value, base=parseFloat(el('slBase').value||0);
  if(!empId||!month||!base){toast('ເລືອກພະນັກງານ + ເດືອນ + ໃສ່ base ກ່ອນ','warning');return;}
  const otH=DATA.ots.filter(o=>o.empId===empId&&o.date.startsWith(month)&&o.status==='approved').reduce((s,o)=>s+parseFloat(o.hours||0),0);
  const baseHourly=base/26/8;
  const otPay=Math.round(baseHourly*otH*1.5);
  const otInput=el('slOT');
  if(otInput){otInput.value=otPay;}
  toast(`✅ OT ${otH} ຊ.ມ. → ${otPay.toLocaleString()} ₭`);
  recalcTotal();
}

function recalcTotal(){
  const b=parseFloat(el('slBase')?.value||0);

}
